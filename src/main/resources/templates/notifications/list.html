<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{notif.title})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">

    <div class="page-header" style="display:flex; justify-content:space-between; align-items:center;">
        <h2><span th:text="#{notif.title}">🔔 Notifications</span>
            <span th:if="${unreadCount > 0}"
                  class="badge-count" th:text="${unreadCount + ' unread'}"></span>
        </h2>
        <div style="display:flex; gap:0.5rem;">
            <form th:action="@{/notifications/read-all}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline" th:text="#{notif.mark_all}">Mark all read</button>
            </form>
            <form th:action="@{/notifications/clear-read}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline" th:text="#{notif.clear_read}">Clear read</button>
            </form>
        </div>
    </div>

    <div class="notif-full-list">
        <div th:if="${notifications.content.isEmpty()}" class="empty-state">
            <p th:text="#{notif.none}">You have no notifications yet.</p>
        </div>
        <div th:each="n : ${notifications.content}"
             class="notif-full-item"
             th:classappend="${n.isRead} ? 'notif-full-item--read' : 'notif-full-item--unread'">
            <div class="notif-full-icon" th:text="${n.icon}">🔔</div>
            <div class="notif-full-body">
                <p th:text="${n.message}">Message</p>
                <div class="notif-full-meta">
                    <small th:text="${#temporals.format(n.createdAt, 'dd MMMM yyyy, HH:mm')}">time</small>
                    <span th:if="${n.actor != null}"
                          th:text="'from ' + ${n.actor.fullName}"
                          class="notif-from"></span>
                </div>
            </div>
            <div class="notif-full-actions">
                <a th:if="${n.link != null}" th:href="${n.link}"
                   class="btn btn-sm btn-outline" th:text="#{common.view}">Open</a>
                <form th:if="${!n.isRead}"
                      th:action="@{/notifications/{id}/read(id=${n.id})}"
                      method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline" th:text="#{notif.mark_read}">Read</button>
                </form>
                <span th:if="${n.isRead}" class="text-muted" style="font-size:0.8rem;" th:text="#{notif.read}">Read</span>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" th:if="${notifications.totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/notifications(page=${currentPage - 1})}"
           class="btn btn-outline" th:text="#{page.prev}">← Prev</a>
        <span th:text="${'Page ' + (currentPage + 1) + ' of ' + notifications.totalPages}">1 of 1</span>
        <a th:if="${currentPage + 1 < notifications.totalPages}"
           th:href="@{/notifications(page=${currentPage + 1})}"
           class="btn btn-outline" th:text="#{page.next}">Next →</a>
    </div>

</main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
