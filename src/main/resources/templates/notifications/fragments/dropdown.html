<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="dropdown">
    <th:block th:if="${not #lists.isEmpty(notifications)}">
        <a th:each="n : ${notifications}"
           th:href="${n.link != null ? n.link : '#'}"
           class="notif-item"
           th:classappend="${!n.isRead} ? ' unread'"
           onclick="markNotifRead(this, event)"
           th:attr="data-id=${n.id}">
            <span class="notif-color-dot"
                  th:style="${!n.isRead} ? 'background:var(--navy);' : 'background:#ccc;'"></span>
            <div class="notif-text">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
                    <span th:text="${n.icon != null ? n.icon : '🔔'}">🔔</span>
                    <span style="font-size:11px;color:var(--muted);"
                          th:text="${#temporals.format(n.createdAt, 'dd MMM, HH:mm')}">time</span>
                </div>
                <span th:text="${n.message}">Message</span>
            </div>
        </a>
    </th:block>
    <div th:if="${#lists.isEmpty(notifications)}"
         style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">
        &#127881; No new notifications
    </div>
</div>
<script th:inline="none">
    /*<![CDATA[*/
    function markNotifRead(el, e) {
        var id = el.dataset.id;
        if (!id) return;
        fetch('/notifications/' + id + '/read', {method: 'POST'})
            .then(function() { loadNotifCount(); })
            .catch(function(){});
    }
    /*]]>*/
</script>
</body>
</html>
