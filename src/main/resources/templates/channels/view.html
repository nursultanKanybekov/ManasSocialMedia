<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${room.name})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content" style="padding:0;display:flex;flex-direction:column;height:calc(100vh - 60px);">

    <!-- Channel Header -->
    <div style="background:linear-gradient(135deg,#1b2a6b,#111c4e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:14px;">
            <a th:href="@{/channels}" style="color:rgba(255,255,255,0.7);font-size:18px;text-decoration:none;">&#8592;</a>
            <div style="width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;">&#128226;</div>
            <div>
                <h2 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:15px;color:white;margin:0 0 3px;" th:text="${room.name}">Channel</h2>
                <!-- Clickable member count -->
                <button onclick="toggleMembersPanel()"
                        style="background:none;border:none;padding:0;cursor:pointer;display:flex;align-items:center;gap:5px;">
                    <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="rgba(255,255,255,0.7)" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>
                    <span id="member-count-label"
                          style="font-size:11px;color:rgba(255,255,255,0.7);font-family:Montserrat,sans-serif;font-weight:600;text-decoration:underline;text-underline-offset:2px;"
                          th:text="${memberCount} + ' members'">0 members</span>
                </button>
            </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
            <span th:if="${isOwner}" style="background:rgba(255,255,255,0.15);color:white;padding:4px 12px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;">Owner</span>
            <form th:if="${isMember and not isOwner}" th:action="@{/channels/{id}/leave(id=${room.id})}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:rgba(192,57,43,0.7);color:white;border:none;padding:7px 16px;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">Leave</button>
            </form>
            <form th:unless="${isMember}" th:action="@{/channels/{id}/join(id=${room.id})}" method="post" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" style="background:#27ae60;color:white;border:none;padding:7px 16px;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">Join</button>
            </form>
        </div>
    </div>

    <!-- Members slide-in panel -->
    <div id="members-panel"
         style="position:fixed;top:60px;right:0;width:280px;height:calc(100vh - 60px);background:#fff;border-left:1.5px solid #e8eaf6;z-index:500;display:none;flex-direction:column;box-shadow:-6px 0 24px rgba(0,0,0,0.10);transition:transform .25s ease;">
        <!-- Panel header -->
        <div style="padding:16px 18px 14px;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
                <span style="font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;color:#fff;">
                    Members (<span th:text="${memberCount}">0</span>)
                </span>
            <button onclick="toggleMembersPanel()"
                    style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">&#x2715;</button>
        </div>
        <!-- Member list -->
        <div style="flex:1;overflow-y:auto;padding:8px;">
            <div th:each="member : ${members}">
                <a th:href="@{/profile/{id}(id=${member.user.id})}"
                   style="display:flex;align-items:center;gap:11px;padding:10px 10px;border-radius:10px;text-decoration:none;color:inherit;transition:background .15s;"
                   onmouseover="this.style.background='#f0f2f8'" onmouseout="this.style.background='transparent'">
                    <!-- Avatar -->
                    <div style="flex-shrink:0;position:relative;">
                        <img th:if="${member.user.profile != null and member.user.profile.avatarUrl != null}"
                             th:src="${member.user.profile.avatarUrl}"
                             style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #e8eaf6;" alt="avatar"/>
                        <div th:if="${member.user.profile == null or member.user.profile.avatarUrl == null}"
                             style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);color:#fff;display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-weight:700;font-size:16px;"
                             th:text="${#strings.substring(member.user.fullName,0,1)}">A</div>
                        <!-- Owner crown badge -->
                        <span th:if="${member.user.id == room.createdBy.id}"
                              style="position:absolute;bottom:-2px;right:-2px;background:#f59e0b;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;">&#128081;</span>
                    </div>
                    <!-- Info -->
                    <div style="flex:1;min-width:0;">
                        <div style="font-family:Montserrat,sans-serif;font-weight:600;font-size:13px;color:#1b2a6b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                             th:text="${member.user.fullName}">Name</div>
                        <div style="font-size:11px;color:#8a91a8;margin-top:1px;"
                             th:text="${member.user.role}">STUDENT</div>
                    </div>
                    <!-- Arrow -->
                    <span style="color:#cbd5e1;font-size:13px;">&#8250;</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div id="chatMessages" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;background:#f7f8fc;">
        <div th:each="msg : ${messages}" style="display:flex;gap:12px;align-items:flex-start;"
             th:classappend="${msg.sender.id == currentUser.id} ? 'own-msg'">
            <img th:src="${msg.sender.profile != null and msg.sender.profile.avatarUrl != null ? msg.sender.profile.avatarUrl : '/images/default-avatar.svg'}"
                 style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;" alt="avatar"/>
            <div>
                <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px;">
                    <span style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#1b2a6b;" th:text="${msg.sender.fullName}">Name</span>
                    <span style="font-size:10px;color:#8a91a8;" th:text="${#temporals.format(msg.createdAt,'HH:mm dd MMM')}">Time</span>
                </div>
                <div th:unless="${msg.isDeleted}" style="background:white;border-radius:0 12px 12px 12px;padding:10px 14px;font-size:13px;color:#2c3e50;box-shadow:0 1px 4px rgba(0,0,0,0.06);" th:text="${msg.content}">Message</div>
                <div th:if="${msg.isDeleted}" style="font-size:12px;color:#aaa;font-style:italic;">Message deleted</div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(messages)}" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#8a91a8;padding:60px 0;">
            <div style="font-size:40px;margin-bottom:12px;">💬</div>
            <p style="font-family:Montserrat,sans-serif;font-size:14px;">No messages yet. Say hello!</p>
        </div>
    </div>

    <!-- Input -->
    <div th:if="${isMember}" style="padding:16px 24px;background:white;border-top:1px solid #e2e5f0;display:flex;gap:12px;flex-shrink:0;">
        <input type="text" id="msgInput" placeholder="Write a message..."
               style="flex:1;padding:11px 16px;border:1.5px solid #e2e5f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:13px;color:#1b2a6b;outline:none;"
               onkeydown="if(event.key==='Enter') sendMsg()"/>
        <button onclick="sendMsg()" style="background:#1b2a6b;color:white;border:none;padding:11px 20px;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;cursor:pointer;">Send</button>
    </div>
    <div th:unless="${isMember}" style="padding:16px 24px;background:#f7f8fc;border-top:1px solid #e2e5f0;text-align:center;font-family:Montserrat,sans-serif;font-size:13px;color:#8a91a8;">
        Join this channel to send messages.
    </div>
</main>
</div>

<script th:inline="javascript">
    const roomId = /*[[${room.id}]]*/ '';
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ '';

    function sendMsg() {
        const input = document.getElementById('msgInput');
        const content = input.value.trim();
        if (!content) return;
        input.value = '';
        fetch('/channels/' + roomId + '/send', {
            method: 'POST',
            headers: {'Content-Type':'application/json', [csrfHeader]: csrfToken},
            body: JSON.stringify({content})
        }).then(() => {
            // reload messages area
            location.reload();
        });
    }

    // Auto scroll to bottom
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;

    // Members panel toggle
    function toggleMembersPanel() {
        var panel = document.getElementById('members-panel');
        if (!panel) return;
        var open = panel.style.display === 'flex';
        panel.style.display = open ? 'none' : 'flex';
    }

    // Close panel on outside click
    document.addEventListener('click', function(e) {
        var panel = document.getElementById('members-panel');
        if (!panel || panel.style.display !== 'flex') return;
        if (!panel.contains(e.target) && !e.target.closest('button[onclick="toggleMembersPanel()"]')) {
            panel.style.display = 'none';
        }
    });
</script>
</body>
</html>
