<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Create Channel')}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <a th:href="@{/channels}" style="display:inline-flex;align-items:center;gap:6px;color:#1b2a6b;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:20px;">← Back to Channels</a>
        <div style="max-width:520px;">
            <div style="background:white;border-radius:16px;padding:32px;box-shadow:0 2px 16px rgba(27,42,107,0.09);">
                <h2 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:20px;color:#1b2a6b;margin-bottom:24px;">📢 Create Channel</h2>
                <form th:action="@{/channels/new}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div style="margin-bottom:18px;">
                        <label style="display:block;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#8a91a8;text-transform:uppercase;margin-bottom:8px;">Channel Name *</label>
                        <input type="text" name="name" required maxlength="100" placeholder="e.g. Class of 2020, Engineering Alumni..."
                               style="width:100%;padding:12px 16px;border:1.5px solid #e2e5f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:14px;color:#1b2a6b;outline:none;box-sizing:border-box;"/>
                    </div>
                    <div style="margin-bottom:24px;">
                        <label style="display:block;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#8a91a8;text-transform:uppercase;margin-bottom:8px;">Description (optional)</label>
                        <textarea name="description" maxlength="300" placeholder="What is this channel about?"
                                  style="width:100%;padding:12px 16px;border:1.5px solid #e2e5f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:14px;color:#1b2a6b;outline:none;box-sizing:border-box;min-height:90px;resize:vertical;"></textarea>
                    </div>
                    <button type="submit" style="width:100%;padding:13px;background:#1b2a6b;color:white;border:none;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;cursor:pointer;">Create Channel</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
