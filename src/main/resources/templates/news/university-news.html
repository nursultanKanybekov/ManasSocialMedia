<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{nav.university_news})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <h1 style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;color:#1b2a6b;margin-bottom:24px;" th:text="#{nav.university_news}">University News</h1>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;" th:if="${posts != null and not posts.empty}">
            <div th:each="post : ${posts.content}" style="background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(27,42,107,0.08);">
                <div style="background:linear-gradient(135deg,#1b2a6b,#111c4e);padding:20px;">
                    <div style="font-size:11px;padding:3px 10px;background:rgba(192,57,43,0.25);color:#e74c3c;border-radius:20px;font-family:Montserrat,sans-serif;font-weight:700;display:inline-block;margin-bottom:10px;"
                         th:text="${post.postType}">UNIVERSITY_NEWS</div>
                    <h3 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:14px;color:white;"
                        th:text="${post.contentI18n != null and post.contentI18n.get(#locale.language) != null ? post.contentI18n.get(#locale.language) : (post.contentI18n != null ? post.contentI18n.get('en') : '')}">Content</h3>
                </div>
                <div style="padding:14px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <img th:src="${post.author.profile != null and post.author.profile.avatarUrl != null ? post.author.profile.avatarUrl : '/images/default-avatar.svg'}"
                             style="width:28px;height:28px;border-radius:50%;object-fit:cover;" alt="avatar"/>
                        <span style="font-size:12px;font-weight:600;color:#1b2a6b;" th:text="${post.author.fullName}">Author</span>
                        <span style="font-size:11px;color:#8a91a8;margin-left:auto;" th:text="${#temporals.format(post.createdAt,'dd MMM yyyy')}">Date</span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${posts == null or posts.empty}" style="background:white;border-radius:16px;padding:60px;text-align:center;box-shadow:0 2px 12px rgba(27,42,107,0.08);">
            <div style="font-size:48px;margin-bottom:16px;">🏛</div>
            <h3 style="font-family:Montserrat,sans-serif;font-weight:800;color:#1b2a6b;margin-bottom:8px;" th:text="#{main.no_news}">No News Yet</h3>
        </div>

        <!-- Pagination -->
        <div th:if="${posts != null and posts.totalPages > 1}" style="display:flex;justify-content:center;gap:8px;margin-top:24px;">
            <a th:if="${not posts.first}" th:href="@{/university-news(page=${posts.number - 1})}"
               style="padding:8px 16px;background:white;border:1.5px solid #e0e3ef;border-radius:8px;text-decoration:none;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#1b2a6b;">← Prev</a>
            <span style="padding:8px 16px;background:#1b2a6b;color:white;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;"
                  th:text="${posts.number + 1} + ' / ' + ${posts.totalPages}">1/1</span>
            <a th:if="${not posts.last}" th:href="@{/university-news(page=${posts.number + 1})}"
               style="padding:8px 16px;background:white;border:1.5px solid #e0e3ef;border-radius:8px;text-decoration:none;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#1b2a6b;">Next →</a>
        </div>
    </main>
</div>
</body>
</html>
