<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{nav.articles})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <a th:href="@{/articles}" style="display:inline-flex;align-items:center;gap:6px;color:#1b2a6b;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:20px;">← Back to Articles</a>

        <div style="max-width:760px;">
            <div style="background:white;border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(27,42,107,0.08);margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                    <img th:src="${post.author.profile != null and post.author.profile.avatarUrl != null ? post.author.profile.avatarUrl : '/images/default-avatar.svg'}"
                         style="width:44px;height:44px;border-radius:50%;object-fit:cover;" alt="avatar"/>
                    <div>
                        <div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:14px;color:#1b2a6b;" th:text="${post.author.fullName}">Author</div>
                        <div style="font-size:12px;color:#8a91a8;" th:text="${#temporals.format(post.createdAt,'dd MMMM yyyy')}">Date</div>
                    </div>
                    <span style="margin-left:auto;font-size:11px;padding:4px 12px;background:#e8ecf8;color:#1b2a6b;border-radius:20px;font-family:Montserrat,sans-serif;font-weight:700;" th:text="${post.postType}">ARTICLE</span>
                </div>
                <div style="font-size:15px;color:#2c3e50;line-height:1.7;white-space:pre-wrap;"
                     th:text="${post.contentI18n != null and post.contentI18n.get(#locale.language) != null ? post.contentI18n.get(#locale.language) : (post.contentI18n != null ? post.contentI18n.get('en') : '')}">Content</div>
                <div style="display:flex;gap:16px;margin-top:20px;padding-top:20px;border-top:1px solid #f0f2f8;">
                    <button id="likeBtn"
                            th:style="${liked ? 'color:#c0392b;font-weight:700;' : 'color:#8a91a8;'}"
                            style="background:none;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:6px;"
                            th:onclick="'toggleLike(\'' + ${post.id} + '\')'"
                            th:text="'❤️ ' + ${post.likesCount}">❤️ 0</button>
                    <span style="font-size:14px;color:#8a91a8;">💬 <span id="commentCount" th:text="${#lists.size(comments)}">0</span></span>
                </div>
            </div>

            <!-- Comments -->
            <div style="background:white;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(27,42,107,0.08);">
                <h3 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:15px;color:#1b2a6b;margin-bottom:16px;">Comments</h3>
                <div th:each="comment : ${comments}" style="padding:12px 0;border-bottom:1px solid #f0f2f8;display:flex;gap:10px;align-items:flex-start;">
                    <img th:src="${comment.author.profile != null and comment.author.profile.avatarUrl != null ? comment.author.profile.avatarUrl : '/images/default-avatar.svg'}"
                         style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;" alt="avatar"/>
                    <div>
                        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#1b2a6b;" th:text="${comment.author.fullName}">Author</div>
                        <div style="font-size:13px;color:#2c3e50;margin-top:3px;" th:text="${comment.body}">Comment</div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(comments)}" style="text-align:center;color:#8a91a8;padding:20px 0;">No comments yet. Be the first!</div>
                <!-- Add Comment -->
                <form th:action="@{/feed/post/{id}/comment(id=${post.id})}" method="post" style="margin-top:16px;display:flex;gap:10px;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="text" name="body" placeholder="Write a comment..." required style="flex:1;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:13px;"/>
                    <button type="submit" style="padding:10px 20px;background:#1b2a6b;color:white;border:none;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;cursor:pointer;">Post</button>
                </form>
            </div>
        </div>
    </main>
</div>
<script th:inline="javascript">
function toggleLike(id) {
    fetch('/feed/post/' + id + '/like', {method: 'POST', headers: {'X-CSRF-TOKEN': document.cookie.match(/XSRF-TOKEN=([^;]+)/)?.[1] || ''}});
}
</script>
</body>
</html>
