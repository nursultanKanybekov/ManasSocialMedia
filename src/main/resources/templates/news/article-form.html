<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Write Article')}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <a th:href="@{/articles}" style="display:inline-flex;align-items:center;gap:6px;color:#1b2a6b;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:20px;">← Back to Articles</a>

        <div style="max-width:760px;">
            <div style="background:white;border-radius:16px;padding:32px;box-shadow:0 2px 16px rgba(27,42,107,0.09);">
                <h2 style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;color:#1b2a6b;margin:0 0 28px;">✍️ Write an Article</h2>

                <form th:action="@{/articles/new}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div style="margin-bottom:20px;">
                        <label style="display:block;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#8a91a8;text-transform:uppercase;margin-bottom:8px;">Title *</label>
                        <input type="text" name="title" required maxlength="200" placeholder="Enter article title..."
                               style="width:100%;padding:12px 16px;border:1.5px solid #e2e5f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:14px;color:#1b2a6b;outline:none;box-sizing:border-box;"/>
                    </div>

                    <div style="margin-bottom:20px;">
                        <label style="display:block;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#8a91a8;text-transform:uppercase;margin-bottom:8px;">Language</label>
                        <select name="lang" style="width:100%;padding:12px 16px;border:1.5px solid #e2e5f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:14px;color:#1b2a6b;outline:none;box-sizing:border-box;">
                            <option value="en">🇬🇧 English</option>
                            <option value="ru">🇷🇺 Русский</option>
                            <option value="ky">🇰🇬 Кыргызча</option>
                            <option value="tr">🇹🇷 Türkçe</option>
                        </select>
                    </div>

                    <div style="margin-bottom:28px;">
                        <label style="display:block;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#8a91a8;text-transform:uppercase;margin-bottom:8px;">Content *</label>
                        <textarea name="content" required placeholder="Write your article here..."
                                  style="width:100%;min-height:300px;padding:14px 16px;border:1.5px solid #e2e5f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:14px;color:#1b2a6b;outline:none;box-sizing:border-box;resize:vertical;line-height:1.7;"></textarea>
                    </div>

                    <div style="display:flex;gap:12px;align-items:center;">
                        <button type="submit" style="background:#1b2a6b;color:white;border:none;border-radius:10px;padding:13px 32px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;cursor:pointer;">
                            🚀 Publish Article
                        </button>
                        <a th:href="@{/articles}" style="background:#f0f2f8;color:#1b2a6b;border-radius:10px;padding:13px 24px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;text-decoration:none;">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
