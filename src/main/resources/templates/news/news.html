<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{nav.feed})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <h1 style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;color:#1b2a6b;margin-bottom:24px;" th:text="#{nav.feed}">News</h1>

        <div style="display:flex;flex-direction:column;gap:16px;" th:if="${posts != null and not posts.empty}">
            <div th:each="post : ${posts.content}" style="background:white;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(27,42,107,0.08);border-left:3px solid #e74c3c;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                    <img th:src="${post.author.profile != null and post.author.profile.avatarUrl != null ? post.author.profile.avatarUrl : '/images/default-avatar.svg'}"
                         style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt="avatar"/>
                    <div>
                        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;color:#1b2a6b;" th:text="${post.author.fullName}">Author</div>
                        <div style="font-size:11px;color:#8a91a8;" th:text="${#temporals.format(post.createdAt,'dd MMM yyyy HH:mm')}">Date</div>
                    </div>
                    <span style="margin-left:auto;font-size:10px;padding:3px 10px;background:#e8ecf8;color:#1b2a6b;border-radius:20px;font-family:Montserrat,sans-serif;font-weight:700;" th:text="${post.postType}">NEWS</span>
                </div>
                <p style="font-size:14px;color:#2c3e50;line-height:1.6;"
                   th:text="${post.contentI18n != null and post.contentI18n.get(#locale.language) != null ? post.contentI18n.get(#locale.language) : (post.contentI18n != null ? post.contentI18n.get('en') : '')}">Content</p>
                <div style="margin-top:10px;display:flex;gap:12px;font-size:12px;color:#8a91a8;">
                    <span>❤️ <span th:text="${post.likesCount}">0</span></span>
                    <span>💬 <span th:text="${post.commentsCount}">0</span></span>
                </div>
            </div>
        </div>

        <div th:if="${posts == null or posts.empty}" style="background:white;border-radius:16px;padding:60px;text-align:center;box-shadow:0 2px 12px rgba(27,42,107,0.08);">
            <div style="font-size:48px;margin-bottom:16px;">📰</div>
            <h3 style="font-family:Montserrat,sans-serif;font-weight:800;color:#1b2a6b;margin-bottom:8px;">No News Yet</h3>
        </div>
    </main>
</div>
</body>
</html>
