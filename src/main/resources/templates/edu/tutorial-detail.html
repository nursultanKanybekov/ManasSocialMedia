<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Tutorial')}"></head>
<style>
.tut-wrapper { max-width:800px; }
.tut-hero { background:white; border-radius:16px; padding:32px; box-shadow:0 2px 16px rgba(27,42,107,0.09); margin-bottom:24px; }
.tut-content-card { background:white; border-radius:16px; padding:32px; box-shadow:0 2px 16px rgba(27,42,107,0.09); }
.tut-content-card h1, .tut-content-card h2, .tut-content-card h3 { font-family:Montserrat,sans-serif; color:#1b2a6b; }
.tut-content-card p { line-height:1.75; color:#2c3e50; }
.tut-content-card ul, .tut-content-card ol { line-height:1.8; color:#2c3e50; }
.tut-content-card pre { background:#f7f8fc; border-radius:8px; padding:16px; overflow-x:auto; font-size:13px; }
.tut-content-card code { background:#f0f2f8; padding:2px 6px; border-radius:4px; font-size:12px; }
.badge-text  { background:#e3f2fd; color:#1565c0; padding:5px 13px; border-radius:20px; font-size:12px; font-weight:700; font-family:Montserrat,sans-serif; }
.badge-video { background:#fce4ec; color:#c62828; padding:5px 13px; border-radius:20px; font-size:12px; font-weight:700; font-family:Montserrat,sans-serif; }
.badge-audio { background:#e8f5e9; color:#2e7d32; padding:5px 13px; border-radius:20px; font-size:12px; font-weight:700; font-family:Montserrat,sans-serif; }
.video-wrapper { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:12px; background:#000; margin-bottom:24px; }
.video-wrapper iframe, .video-wrapper video { position:absolute; top:0; left:0; width:100%; height:100%; border-radius:12px; }
.audio-player { background:linear-gradient(135deg,#1b2a6b,#27ae60); border-radius:16px; padding:32px; text-align:center; margin-bottom:24px; }
.audio-player audio { width:100%; margin-top:16px; }
</style>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <a th:href="@{/edu}" style="display:inline-flex;align-items:center;gap:6px;color:#1b2a6b;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;text-decoration:none;margin-bottom:20px;">← Back to Tutorials</a>

        <div class="tut-wrapper">

            <!-- Hero -->
            <div class="tut-hero">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
                    <span th:if="${tutorial.category}" style="font-size:10px;padding:3px 9px;background:#e8ecf8;color:#1b2a6b;border-radius:20px;font-family:Montserrat,sans-serif;font-weight:700;" th:text="${tutorial.category}">Cat</span>
                    <span th:if="${tutorial.mediaType.name() == 'TEXT'}"  class="badge-text">📖 Read</span>
                    <span th:if="${tutorial.mediaType.name() == 'VIDEO'}" class="badge-video">🎬 Watch</span>
                    <span th:if="${tutorial.mediaType.name() == 'AUDIO'}" class="badge-audio">🎧 Listen</span>
                </div>
                <h1 style="font-family:Montserrat,sans-serif;font-weight:900;font-size:24px;color:#1b2a6b;margin:0 0 12px;" th:text="${tutorial.getLocalizedTitle(lang)}">Title</h1>
                <p th:if="${tutorial.description}" style="font-size:14px;color:#8a91a8;margin:0 0 16px;" th:text="${tutorial.description}">Desc</p>
                <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:#8a91a8;font-family:Montserrat,sans-serif;">
                    <span th:if="${tutorial.author != null}">✍️ <strong th:text="${tutorial.author.fullName}">Author</strong></span>
                    <span>📅 <span th:text="${#temporals.format(tutorial.createdAt,'dd MMM yyyy')}">Date</span></span>
                    <span>👁 <span th:text="${tutorial.viewCount}">0</span> views</span>
                </div>
            </div>

            <!-- VIDEO player -->
            <div th:if="${tutorial.mediaType.name() == 'VIDEO' and tutorial.mediaUrl != null and !tutorial.mediaUrl.isBlank()}">
                <!-- YouTube embed -->
                <div th:if="${tutorial.mediaUrl.contains('youtube.com') or tutorial.mediaUrl.contains('youtu.be')}" class="video-wrapper">
                    <iframe th:src="${'https://www.youtube.com/embed/' + #strings.replace(#strings.replace(tutorial.mediaUrl,'https://www.youtube.com/watch?v=',''),'https://youtu.be/','')}"
                            frameborder="0" allowfullscreen></iframe>
                </div>
                <!-- Direct MP4 -->
                <div th:unless="${tutorial.mediaUrl.contains('youtube.com') or tutorial.mediaUrl.contains('youtu.be')}" class="video-wrapper">
                    <video controls>
                        <source th:src="${tutorial.mediaUrl}" type="video/mp4"/>
                        Your browser does not support video.
                    </video>
                </div>
            </div>

            <!-- AUDIO player -->
            <div th:if="${tutorial.mediaType.name() == 'AUDIO' and tutorial.mediaUrl != null and !tutorial.mediaUrl.isBlank()}"
                 class="audio-player">
                <div style="font-size:48px;margin-bottom:8px;">🎧</div>
                <h3 style="font-family:Montserrat,sans-serif;font-weight:800;color:white;margin:0 0 4px;" th:text="${tutorial.getLocalizedTitle(lang)}">Title</h3>
                <p style="color:rgba(255,255,255,0.7);font-size:13px;margin:0 0 16px;">Press play to listen</p>
                <audio controls preload="metadata" th:src="${tutorial.mediaUrl}" style="width:100%;border-radius:8px;">
                    Your browser does not support audio. <a th:href="${tutorial.mediaUrl}" style="color:white;">Download</a>
                </audio>
                <a th:href="${tutorial.mediaUrl}" target="_blank"
                   style="display:inline-block;margin-top:12px;color:rgba(255,255,255,0.8);font-size:12px;font-family:Montserrat,sans-serif;">
                    🔗 Open in new tab
                </a>
            </div>

            <!-- TEXT / Article content -->
            <div th:if="${tutorial.mediaType.name() == 'TEXT' or tutorial.getLocalizedContent(lang) != ''}"
                 class="tut-content-card">
                <div th:utext="${tutorial.getLocalizedContent(lang)}">Content here</div>
                <div th:if="${tutorial.mediaUrl != null and !tutorial.mediaUrl.isBlank()}" style="margin-top:20px;padding-top:16px;border-top:1px solid #f0f2f8;">
                    <a th:href="${tutorial.mediaUrl}" target="_blank"
                       style="display:inline-flex;align-items:center;gap:6px;background:#1b2a6b;color:white;padding:10px 18px;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;text-decoration:none;">
                        🔗 External Resource
                    </a>
                </div>
            </div>

            <!-- Quizzes -->
            <div th:if="${not #lists.isEmpty(tutorial.quizzes)}" style="background:white;border-radius:16px;padding:24px;box-shadow:0 2px 16px rgba(27,42,107,0.09);margin-top:24px;">
                <h3 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:16px;color:#1b2a6b;margin-bottom:16px;">🧠 Test Your Knowledge</h3>
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <a th:each="quiz : ${tutorial.quizzes}"
                       th:href="@{/edu/quiz/{id}(id=${quiz.id})}"
                       style="display:flex;align-items:center;gap:12px;padding:14px 18px;background:#f7f8fc;border-radius:12px;text-decoration:none;border:1.5px solid #e0e3ef;transition:.2s;">
                        <span style="font-size:24px;">📝</span>
                        <div>
                            <div style="font-family:Montserrat,sans-serif;font-weight:800;font-size:14px;color:#1b2a6b;" th:text="${quiz.titleI18n?.get(lang) ?: quiz.titleI18n?.get('en') ?: 'Quiz'}">Quiz Title</div>
                            <div style="font-size:11px;color:#8a91a8;" th:text="${quiz.questions?.size() ?: 0} + ' questions'">0 questions</div>
                        </div>
                        <span style="margin-left:auto;background:#1b2a6b;color:white;padding:5px 14px;border-radius:20px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:700;">Take Quiz →</span>
                    </a>
                </div>
            </div>

        </div>
    </main>
</div>
</body>
</html>
