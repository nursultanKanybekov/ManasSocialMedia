<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${quiz.getLocalizedTitle(lang)})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="main-content">

    <div class="quiz-page">
      <h2 th:text="${quiz.getLocalizedTitle(lang)}">Quiz Title</h2>
      <p th:text="#{quiz.pass_score} + ': ' + ${quiz.passScore} + '%'">Pass Score: 70%</p>

      <!-- Already passed -->
      <div th:if="${alreadyPassed}" class="alert alert-success">
        <p th:text="#{quiz.already_passed}">✅ You have already passed this quiz!</p>
        <p th:if="${bestAttempt != null}" th:text="#{quiz.your_score} + ': ' + ${bestAttempt.score} + '%'">Score: 85%</p>
      </div>

      <!-- Quiz form -->
      <form th:if="${!alreadyPassed}"
            th:action="@{/edu/quiz/{id}/submit(id=${quiz.id})}" method="post"
            class="quiz-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div th:each="question, qi : ${quiz.questions}" class="question-block">
          <h4 th:text="${qi.index + 1} + '. ' + ${question.getLocalizedQuestion(lang)}">Question</h4>
          <div class="options-list">
            <label th:each="option, oi : ${question.getLocalizedOptions(lang)}"
                   class="option-label">
              <input type="radio"
                     th:name="${'answers[' + question.id + ']'}"
                     th:value="${oi.index}"
                     required/>
              <span th:text="${option}">Option</span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" th:text="#{quiz.submit}">Submit Quiz</button>
      </form>
    </div>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
