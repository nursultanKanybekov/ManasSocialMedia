<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(#{auth.pending.title})}"></head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card pending-card">
    <div class="pending-icon">⏳</div>
    <h2 th:text="#{auth.pending.title}">Account Pending Validation</h2>
    <p th:text="#{auth.pending.message}">
      Your account has been submitted and is awaiting review by the university secretary.
      You will be able to log in once your account is approved.
    </p>
    <p th:text="#{auth.pending.contact}">
      If you have questions, please contact the admissions office.
    </p>
    <a th:href="@{/auth/login}" class="btn btn-secondary" th:text="#{auth.back_to_login}">
      Back to Login
    </a>
  </div>
</div>
</body>
</html>
