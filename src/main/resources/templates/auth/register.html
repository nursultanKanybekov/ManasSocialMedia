<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head(#{auth.register.title})}"></head>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<body class="auth-page">
<div class="auth-container auth-container--wide">

    <div class="auth-brand">
        <div class="auth-logo">M</div>
        <h1>Manas Ecosystem</h1>
    </div>

    <div class="auth-card">
        <h2 th:text="#{auth.register.title}">Create Account</h2>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <form th:action="@{/auth/register}" method="post" enctype="multipart/form-data"
              th:object="${registerRequest}" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- First Name / Last Name -->
            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" th:field="*{firstName}"
                           class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                           placeholder="e.g. Aizat" required/>
                    <div th:if="${#fields.hasErrors('firstName')}" class="field-error"
                         th:errors="*{firstName}"></div>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" th:field="*{lastName}"
                           class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                           placeholder="e.g. Karimova" required/>
                    <div th:if="${#fields.hasErrors('lastName')}" class="field-error"
                         th:errors="*{lastName}"></div>
                </div>
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" th:field="*{gender}" class="form-control" required>
                    <option value="">-- Select gender --</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                    <option value="OTHER">Other / Prefer not to say</option>
                </select>
                <div th:if="${#fields.hasErrors('gender')}" class="field-error"
                     th:errors="*{gender}"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="regEmail" th:text="#{auth.field.email}">Email</label>
                <input type="email" id="regEmail" th:field="*{email}"
                       class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       required/>
                <div th:if="${#fields.hasErrors('email')}" class="field-error"
                     th:errors="*{email}"></div>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label th:text="#{auth.field.role}">I am a...</label>
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" th:field="*{role}" value="STUDENT"/>
                        <span th:text="#{role.student}">Current Student</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" th:field="*{role}" value="MEZUN"/>
                        <span th:text="#{role.mezun}">Alumni (Mezun)</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" th:field="*{role}" value="TEACHER"/>
                        <span>Teacher</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" th:field="*{role}" value="FACULTY_ADMIN"/>
                        <span>Faculty Administration</span>
                    </label>
                    <label class="role-option">
                        <input type="radio" th:field="*{role}" value="EMPLOYER"/>
                        <span>Employer</span>
                    </label>
                </div>
                <div th:if="${#fields.hasErrors('role')}" class="field-error"
                     th:errors="*{role}"></div>
            </div>

            <!-- Faculty — shown for all except EMPLOYER -->
            <div class="form-group" id="facultyGroup">
                <label for="facultyId" th:text="#{auth.field.faculty}">Faculty</label>
                <select id="facultyId" th:field="*{facultyId}" class="form-control">
                    <option value="" th:text="#{auth.field.select_faculty}">Select faculty...</option>
                    <option th:each="f : ${faculties}"
                            th:value="${f.id}"
                            th:text="${f.name}">Faculty</option>
                </select>
                <small style="color:#94a3b8;font-size:11px;" id="facultyHint">
                    Required for Teachers and Faculty Administrators.
                </small>
            </div>

            <!-- Student ID — hidden for EMPLOYER / FACULTY_ADMIN -->
            <div class="form-group" id="studentIdGroup">
                <label for="studentIdNumber" th:text="#{auth.field.student_id}">Student ID</label>
                <input type="text" id="studentIdNumber" th:field="*{studentIdNumber}"
                       class="form-control"
                       th:placeholder="#{auth.field.student_id_placeholder}"/>
            </div>

            <!-- Graduation Year — only for MEZUN -->
            <div class="form-group" id="graduationYearGroup" style="display:none">
                <label for="graduationYear" th:text="#{auth.field.graduation_year}">Graduation Year</label>
                <input type="number" id="graduationYear" th:field="*{graduationYear}"
                       class="form-control" min="1993" th:max="${#dates.year(#dates.createNow())}"/>
            </div>

            <!-- Work Place — only for MEZUN -->
            <div class="form-group" id="workPlaceGroup" style="display:none">
                <label for="workPlace">Current Place of Work</label>
                <input type="text" id="workPlace" th:field="*{workPlace}"
                       class="form-control" placeholder="e.g. Google LLC, Bishkek City Hall"/>
                <small style="color:#94a3b8;font-size:11px;">Please specify where you currently work.</small>
            </div>

            <!-- Employer fields — hidden unless EMPLOYER selected -->
            <div class="form-group" id="companyNameGroup" style="display:none">
                <label for="companyName">Company / Organization Name</label>
                <input type="text" id="companyName" th:field="*{companyName}"
                       class="form-control" placeholder="e.g. Google LLC, Manas Tech"/>
            </div>

            <div class="form-group" id="companyFieldGroup" style="display:none">
                <label for="companyField">Field of Operation</label>
                <select id="companyField" th:field="*{companyField}" class="form-control">
                    <option value="">-- Select field --</option>
                    <option value="Technology">Technology / IT</option>
                    <option value="Engineering">Engineering</option>
                    <option value="Healthcare">Healthcare / Medicine</option>
                    <option value="Finance">Finance / Banking</option>
                    <option value="Education">Education</option>
                    <option value="Government">Government / Public Sector</option>
                    <option value="Manufacturing">Manufacturing / Industry</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Media">Media / Communications</option>
                    <option value="Retail">Retail / Commerce</option>
                    <option value="Construction">Construction / Real Estate</option>
                    <option value="Transportation">Transportation / Logistics</option>
                    <option value="Energy">Energy / Mining</option>
                    <option value="Tourism">Tourism / Hospitality</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group" id="companyDocGroup" style="display:none">
                <label for="companyDocument">Proof of Employment <span style="color:#94a3b8;font-size:12px;">(business card, contract, letter — image or PDF)</span></label>
                <input type="file" id="companyDocument" name="companyDocument"
                       class="form-control" accept="image/*,.pdf"/>
                <small style="color:#94a3b8;font-size:11px;">Max 5MB. This will be reviewed by the secretary.</small>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="regPassword" th:text="#{auth.field.password}">Password</label>
                <div style="position:relative;">
                    <input type="password" id="regPassword" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           style="padding-right: 42px;"
                           required minlength="8"/>
                    <button type="button" onclick="togglePwd('regPassword','eyeReg')"
                            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#94a3b8;font-size:16px;">
                        <span id="eyeReg">👁</span>
                    </button>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="field-error"
                     th:errors="*{password}"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword" th:text="#{auth.field.confirm_password}">Confirm Password</label>
                <div style="position:relative;">
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                           class="form-control"
                           style="padding-right: 42px;"
                           required/>
                    <button type="button" onclick="togglePwd('confirmPassword','eyeConfirm')"
                            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#94a3b8;font-size:16px;">
                        <span id="eyeConfirm">👁</span>
                    </button>
                </div>
                <div th:if="${#fields.hasErrors('confirmPassword')}" class="field-error"
                     th:errors="*{confirmPassword}"></div>
            </div>

            <!-- reCAPTCHA widget -->
            <div class="g-recaptcha" th:attr="data-sitekey=${recaptchaSiteKey}" style="margin-bottom: 16px;"></div>

            <button type="submit" class="btn btn-primary btn-full" th:text="#{auth.register.submit}">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            <p>
                <span th:text="#{auth.has_account}">Already have an account?</span>
                <a th:href="@{/auth/login}" th:text="#{auth.login.link}">Sign In</a>
            </p>
        </div>
    </div>
</div>

<script>
    function updateRoleFields() {
        const role = document.querySelector('input[name="role"]:checked')?.value;
        const isEmployer     = role === 'EMPLOYER';
        const isMezun        = role === 'MEZUN';
        const isTeacher      = role === 'TEACHER';
        const isFacultyAdmin = role === 'FACULTY_ADMIN';
        const needsFaculty   = isTeacher || isFacultyAdmin || !isEmployer;

        // Faculty — always shown except for EMPLOYER
        const facultyGroup  = document.getElementById('facultyGroup');
        const facultySelect = document.getElementById('facultyId');
        facultyGroup.style.display = isEmployer ? 'none' : 'block';
        // Required for teacher / faculty admin
        facultySelect.required = isTeacher || isFacultyAdmin;

        // Student ID — shown for STUDENT and MEZUN only
        const showStudentId = !isEmployer && !isTeacher && !isFacultyAdmin;
        document.getElementById('studentIdGroup').style.display = showStudentId ? 'block' : 'none';

        // Graduation year — only for MEZUN
        document.getElementById('graduationYearGroup').style.display = isMezun ? 'block' : 'none';

        // Work place — only for MEZUN
        document.getElementById('workPlaceGroup').style.display = isMezun ? 'block' : 'none';

        // Employer-only fields
        document.getElementById('companyNameGroup').style.display = isEmployer ? 'block' : 'none';
        document.getElementById('companyFieldGroup').style.display = isEmployer ? 'block' : 'none';
        document.getElementById('companyDocGroup').style.display  = isEmployer ? 'block' : 'none';
    }
    document.querySelectorAll('input[name="role"]').forEach(r => r.addEventListener('change', updateRoleFields));
    updateRoleFields();

    function togglePwd(inputId, eyeId) {
        const input = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        if (input.type === 'password') {
            input.type = 'text';
            eye.textContent = '🙈';
        } else {
            input.type = 'password';
            eye.textContent = '👁';
        }
    }
</script>
</body>
</html>
