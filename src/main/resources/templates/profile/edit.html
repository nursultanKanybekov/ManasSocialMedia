<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(#{profile.edit})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="main-content">
  <div class="edit-page">

    <h1 class="edit-page-title">✏️ <span th:text="#{profile.edit}">Edit Profile</span></h1>

    <!-- Alerts -->
    <div th:if="${successMsg}" class="ep-alert ep-alert-success">
      ✅ <span th:text="#{${successMsg}}">Saved.</span>
    </div>
    <div th:if="${errorMsg}" class="ep-alert ep-alert-error">
      ⚠️ <span th:text="${errorMsg}">Error.</span>
    </div>

    <!-- Avatar Hero -->
    <div class="ep-avatar-hero">
      <div class="ep-avatar-wrap" onclick="document.getElementById('avatarFile').click()">
        <img th:src="${profile.avatarUrl != null ? profile.avatarUrl : '/images/default-avatar.svg'}"
             class="ep-avatar-img" id="avatarPreview" alt="avatar"/>
        <div class="ep-avatar-overlay">📷</div>
      </div>
      <div class="ep-avatar-info">
        <div class="ep-avatar-name" th:text="${user.fullName}">Name</div>
        <div class="ep-avatar-sub" th:text="${user.email}">email</div>
        <label for="avatarFile" class="ep-avatar-btn">
          📷 <span th:text="#{profile.change_avatar}">Change Photo</span>
        </label>
        <input type="file" id="avatarFile" name="avatar" accept="image/*"
               style="display:none" onchange="uploadAvatar(this)"/>
      </div>
    </div>

    <!-- Profile Info -->
    <form th:action="@{/profile/me/edit}" method="post" th:object="${profileUpdateRequest}">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="ep-card">
        <div class="ep-card-title">👤 Personal Information</div>
        <div class="ep-form-grid two-col">

          <div class="ep-form-group">
            <label class="ep-label" th:text="#{profile.full_name}">Full Name</label>
            <input type="text" class="ep-input" th:field="*{fullName}" th:value="${user.fullName}"/>
          </div>

          <div class="ep-form-group">
            <label class="ep-label" th:text="#{profile.headline}">Headline</label>
            <input type="text" class="ep-input" th:field="*{headline}"
                   th:value="${profile.headline}"
                   th:placeholder="#{profile.headline_placeholder}"/>
          </div>

          <div class="ep-form-group">
            <label class="ep-label">Current Job Title</label>
            <input type="text" class="ep-input" th:field="*{currentJobTitle}"
                   th:value="${profile.currentJobTitle}"
                   placeholder="e.g. Backend Developer"/>
          </div>

          <div class="ep-form-group">
            <label class="ep-label">Current Company / Organization</label>
            <input type="text" class="ep-input" th:field="*{currentCompany}"
                   th:value="${profile.currentCompany}"
                   placeholder="e.g. Google, Freelance"/>
          </div>

          <div class="ep-form-group" style="grid-column: 1 / -1;">
            <label class="ep-label" th:text="#{profile.about}">About</label>
            <textarea class="ep-textarea" th:field="*{bio}" rows="4"
                      th:placeholder="#{profile.bio_placeholder}"
                      th:text="${profile.bio}"></textarea>
          </div>

          <div class="ep-form-group" style="grid-column: 1 / -1;">
            <label class="ep-label" th:text="#{profile.skills}">Skills</label>
            <input type="text" class="ep-input" name="skillsInput"
                   th:value="${#strings.listJoin(profile.skills, ', ')}"
                   th:placeholder="#{profile.skills_placeholder}"/>
            <span class="ep-hint" th:text="#{profile.skills_hint}">Separate with commas</span>
          </div>

        </div>
        <div class="ep-actions" style="margin-top:20px;">
          <button type="submit" class="ep-btn-save">
            💾 <span th:text="#{profile.save}">Save Changes</span>
          </button>
          <a th:href="@{/mezun/{id}(id=${user.id})}" class="ep-btn-cancel"
             th:text="#{common.cancel}">Cancel</a>
        </div>
      </div>
    </form>

    <!-- Mentorship (MEZUN only) -->
    <div sec:authorize="hasRole('MEZUN')" class="ep-card">
      <div class="ep-card-title">🤝 Mentorship Settings</div>
      <form th:action="@{/profile/me/edit}" method="post" th:object="${profileUpdateRequest}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="ep-mentor-toggle">
          <label class="ep-toggle-switch">
            <input type="checkbox" id="canMentor" name="canMentor" value="true"
                   th:checked="${profile.canMentor}"/>
            <span class="ep-toggle-slider"></span>
          </label>
          <div class="ep-toggle-text">
            <strong>Be a Mentor</strong>
            <span>Allow students to find and contact you as a mentor</span>
          </div>
        </div>
        <div class="ep-form-group">
          <label class="ep-label">Job Title / Field (shown in mentor directory)</label>
          <input type="text" class="ep-input" name="mentorJobTitle"
                 th:value="${profile.mentorJobTitle}"
                 placeholder="e.g. Senior Software Engineer at Google"/>
        </div>
        <div class="ep-actions" style="margin-top:16px;">
          <button type="submit" class="ep-btn-save">💾 Save Mentorship</button>
        </div>
      </form>
    </div>

    <!-- Change Password -->
    <div class="ep-card">
      <div class="ep-card-title">🔒 <span th:text="#{profile.change_password}">Change Password</span></div>
      <form th:action="@{/profile/me/password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="ep-form-grid">
          <div class="ep-form-group">
            <label class="ep-label" th:text="#{profile.old_password}">Current Password</label>
            <input type="password" name="oldPassword" class="ep-input" required/>
          </div>
          <div class="ep-form-group">
            <label class="ep-label" th:text="#{profile.new_password}">New Password</label>
            <input type="password" name="newPassword" class="ep-input" required minlength="8"/>
          </div>
          <div class="ep-form-group">
            <label class="ep-label" th:text="#{profile.confirm_password}">Confirm New Password</label>
            <input type="password" name="confirmPassword" class="ep-input" required/>
          </div>
        </div>
        <div class="ep-actions" style="margin-top:20px;">
          <button type="submit" class="ep-btn-save">
            🔑 <span th:text="#{profile.update_password}">Update Password</span>
          </button>
        </div>
      </form>
    </div>

  </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
