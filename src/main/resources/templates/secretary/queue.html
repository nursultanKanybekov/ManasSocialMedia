<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{secretary.title})}"></head>
<style>
  /* Live indicator dot */
  .live-dot {
    display: inline-block; width: 8px; height: 8px;
    background: #22c55e; border-radius: 50%; margin-left: 6px;
    animation: pulseDot 1.5s infinite;
    vertical-align: middle;
  }
  @keyframes pulseDot {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(1.5); }
  }
  #pending-count-badge { transition: background 0.3s, transform 0.2s; }
  #pending-count-badge.bump { background:#7c3aed !important; transform:scale(1.3); }
</style>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="main-content">

  <div class="page-header">
    <h2>
      <span th:text="#{secretary.title}">Validation Queue</span>
      <span class="live-dot" title="Live notifications active"></span>
    </h2>
    <span id="pending-count-badge" class="badge-count"
          th:text="${pendingCount} + ' ' + #{secretary.pending}">5 pending</span>
  </div>

  <div th:if="${#lists.isEmpty(pending)}" class="empty-state" id="empty-state">
    <p th:text="#{secretary.queue_empty}">No pending validations.</p>
  </div>

  <div class="validation-list" id="validation-list">
    <div th:each="val : ${pending}" class="validation-card">
      <div class="validation-info">
        <strong th:text="${val.user.fullName}">Name</strong>
        <!-- First + Last name -->
        <span th:if="${val.user.firstName != null or val.user.lastName != null}"
              style="font-size:12px;color:#64748b;"
              th:text="'👤 ' + (${val.user.firstName} ?: '') + ' ' + (${val.user.lastName} ?: '')">Name</span>
        <!-- Gender -->
        <span th:if="${val.user.gender != null}"
              style="font-size:12px;color:#64748b;"
              th:text="'⚧ ' + ${val.user.gender}">Gender</span>
        <span class="role-badge" th:text="${val.user.role}">STUDENT</span>
        <span th:text="${val.user.email}">email</span>
        <span th:if="${val.user.faculty}" th:text="${val.user.faculty.name}">Faculty</span>
        <span th:if="${val.user.role.name() != 'EMPLOYER' and val.user.role.name() != 'FACULTY_ADMIN'}"
              th:text="#{secretary.student_id} + ': ' + ${val.user.studentIdNumber}">ID: 123</span>
        <span th:if="${val.user.graduationYear}"
              th:text="#{secretary.grad_year} + ': ' + ${val.user.graduationYear}">Year: 2020</span>
        <!-- Mezun work place -->
        <span th:if="${val.user.role.name() == 'MEZUN' and val.user.workPlace != null}"
              style="font-weight:600;color:#374151;"
              th:text="'💼 Works at: ' + ${val.user.workPlace}">WorkPlace</span>
        <!-- Employer fields -->
        <span th:if="${val.user.role.name() == 'EMPLOYER' and val.user.companyName != null}"
              style="font-weight:600;color:#1b2a6b;"
              th:text="'🏢 ' + ${val.user.companyName}">Company</span>
        <span th:if="${val.user.role.name() == 'EMPLOYER' and val.user.companyField != null}"
              style="font-size:12px;color:#64748b;"
              th:text="'📊 Field: ' + ${val.user.companyField}">Field</span>
        <a th:if="${val.user.role.name() == 'EMPLOYER' and val.user.companyDocumentUrl != null}"
           th:href="${val.user.companyDocumentUrl}" target="_blank"
           style="color:#7c3aed;font-size:12px;font-weight:700;">📄 View Employment Proof</a>
        <span th:if="${val.user.role.name() == 'EMPLOYER' and val.user.companyDocumentUrl == null}"
              style="color:#f59e0b;font-size:11px;">⚠ No document uploaded</span>
        <span th:text="#{secretary.submitted} + ': ' + ${#temporals.format(val.submittedAt, 'dd MMM yyyy HH:mm')}">Submitted</span>
      </div>
      <div class="validation-actions">
        <form th:action="@{/secretary/approve/{id}(id=${val.id})}" method="post" style="display:inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-success" th:text="#{secretary.approve}">✅ Approve</button>
        </form>
        <form th:action="@{/secretary/reject/{id}(id=${val.id})}" method="post" style="display:inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="text" name="reason" class="form-control-inline"
                 th:placeholder="#{secretary.reject_reason}" required/>
          <button type="submit" class="btn btn-danger" th:text="#{secretary.reject}">❌ Reject</button>
        </form>
      </div>
    </div>
  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  // Bump the pending badge when a new user toast fires (listens to custom event)
  document.addEventListener('secretaryNewUser', function(e) {
    var badge = document.getElementById('pending-count-badge');
    if (!badge) return;
    var n = (parseInt(badge.textContent) || 0) + 1;
    badge.textContent = n + ' pending';
    badge.classList.add('bump');
    setTimeout(function() { badge.classList.remove('bump'); }, 700);
    var empty = document.getElementById('empty-state');
    if (empty) empty.style.display = 'none';
  });
</script>
</body>
</html>
