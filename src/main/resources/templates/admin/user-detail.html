<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Admin - User Detail')}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">

    <div class="page-header">
        <h2 th:text="${user.fullName}">User Name</h2>
        <a th:href="@{/admin/users}" class="btn btn-outline">← All Users</a>
    </div>

    <div class="form-card">
        <div class="user-info-grid">
            <div><strong>Email:</strong> <span th:text="${user.email}">email</span></div>
            <div><strong>Role:</strong> <span class="role-badge" th:text="${user.role}">ROLE</span></div>
            <div><strong>Status:</strong> <span class="status-badge" th:text="${user.status}">STATUS</span></div>
            <div><strong>Faculty:</strong> <span th:text="${user.faculty != null ? user.faculty.name : '-'}">Faculty</span></div>
            <div><strong>Student ID:</strong> <span th:text="${user.studentIdNumber ?: '-'}">ID</span></div>
            <div><strong>Joined:</strong> <span th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</span></div>
        </div>

        <hr/>
        <h4>Actions</h4>
        <div class="action-buttons">
            <!-- Activate -->
            <form th:action="@{/admin/users/{id}/activate(id=${user.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-primary"
                        th:disabled="${user.status.name() == 'ACTIVE'}">Activate</button>
            </form>

            <!-- Suspend -->
            <form th:action="@{/admin/users/{id}/suspend(id=${user.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline"
                        th:disabled="${user.status.name() == 'SUSPENDED'}"
                        onclick="return confirm('Suspend this user?')">Suspend</button>
            </form>

            <!-- Change Role -->
            <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <select name="role" class="form-control" style="display:inline;width:auto">
                    <option value="STUDENT">STUDENT</option>
                    <option value="MEZUN">MEZUN</option>
                    <option value="EMPLOYER">EMPLOYER</option>
                    <option value="SECRETARY">SECRETARY</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
                <button type="submit" class="btn btn-outline">Change Role</button>
            </form>

            <!-- Delete User -->
            <form th:if="${user.role.name() != 'SUPER_ADMIN'}"
                  th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn"
                        style="background:#dc2626;color:#fff;border:none;"
                        th:attr="onclick=|return confirm('Delete user [[${user.fullName}]]? This cannot be undone.')|">
                    🗑 Delete User
                </button>
            </form>
        </div>
    </div>

</main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
