<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Create Secretary')}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">

  <div class="page-header">
    <h2>👤 Create Secretary Account</h2>
    <a th:href="@{/admin}" class="btn btn-secondary">← Back to Dashboard</a>
  </div>

  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>

  <div style="max-width:480px;">
    <div class="card" style="padding:28px;">
      <p style="color:#64748b;font-size:13px;margin:0 0 20px;">
        Secretaries are created directly by admins and are immediately active.
        They can approve/reject user registrations.
      </p>

      <form th:action="@{/admin/create-secretary}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label th:text="#{admin.sec.fullname}">Full Name</label>
          <input type="text" name="fullName" class="form-control" required placeholder="e.g. Aizat Bekova"/>
        </div>

        <div class="form-group">
          <label th:text="#{admin.sec.email}">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="secretary@manas.edu.kg"/>
        </div>

        <div class="form-group">
          <label th:text="#{admin.sec.password}">Temporary Password</label>
          <div style="position:relative;">
            <input type="password" name="password" id="secPwd" class="form-control"
                   required minlength="8" th:placeholder="#{admin.sec.password_ph}"
                   style="padding-right:42px;"/>
            <button type="button" onclick="togglePwd('secPwd','secEye')"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;">
              <span id="secEye">👁</span>
            </button>
          </div>
          <small style="color:#94a3b8;font-size:11px;">The secretary should change this on first login.</small>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">
          Create Secretary Account
        </button>
      </form>
    </div>
  </div>

</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script>
  function togglePwd(id, eyeId) {
    var el = document.getElementById(id), eye = document.getElementById(eyeId);
    el.type = el.type === 'password' ? 'text' : 'password';
    eye.textContent = el.type === 'password' ? '👁' : '🙈';
  }
</script>
</body>
</html>
