<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/header :: head('Translations')}"></head>
<style>
  .trans-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px; }
  .trans-stats  { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
  .stat-chip    { background:#1b2a6b; color:#fff; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:600; }
  .stat-chip span { opacity:.75; font-weight:400; margin-left:4px; }
  .search-bar   { display:flex; gap:8px; margin-bottom:18px; }
  .search-bar input  { flex:1; padding:9px 14px; border:1px solid #dde3f0; border-radius:8px; font-size:14px; }
  .search-bar button { padding:9px 20px; background:#1b2a6b; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
  .new-key-form { display:flex; gap:8px; margin-bottom:24px; }
  .new-key-form input  { flex:1; padding:9px 14px; border:1px solid #dde3f0; border-radius:8px; font-size:13px; font-family:monospace; }
  .new-key-form button { padding:9px 18px; background:#16a34a; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:13px; }
  .keys-table   { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(27,42,107,.07); }
  .keys-table th { background:#f0f2fa; color:#1b2a6b; font-size:12px; text-transform:uppercase; letter-spacing:.5px; padding:12px 16px; text-align:left; }
  .keys-table td { padding:10px 16px; border-bottom:1px solid #f0f2fa; font-size:13px; vertical-align:middle; }
  .keys-table tr:last-child td { border-bottom:none; }
  .keys-table tr:hover td { background:#f8f9ff; }
  .key-code     { font-family:monospace; font-size:12px; color:#7c3aed; background:#f5f0ff; padding:2px 8px; border-radius:4px; }
  .preview-val  { color:#555; max-width:320px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .edit-btn     { padding:5px 14px; background:#1b2a6b; color:#fff; border:none; border-radius:6px; font-size:12px; cursor:pointer; text-decoration:none; display:inline-block; }
  .edit-btn:hover { background:#2d3fa3; }
  .locale-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; margin-right:3px; }
  .loc-en { background:#dbeafe; color:#1d4ed8; }
  .loc-ru { background:#fce7f3; color:#9d174d; }
  .loc-ky { background:#d1fae5; color:#065f46; }
  .loc-tr { background:#fef3c7; color:#92400e; }
  .empty-msg { text-align:center; padding:40px; color:#94a3b8; }
  .result-count { font-size:13px; color:#64748b; margin-bottom:10px; }
</style>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="main-content">
  <div class="trans-header">
    <div>
      <h2 style="margin:0;color:#1b2a6b;">🌐 Translation Management</h2>
      <p style="margin:4px 0 0;color:#64748b;font-size:14px;">Edit UI text across all languages without redeploying</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="trans-stats">
    <div class="stat-chip">Total Keys <span th:text="${totalKeys}">0</span></div>
    <div th:each="entry : ${countByLocale}" class="stat-chip"
         th:text="${entry.key.toUpperCase()} + ': ' + ${entry.value} + ' entries'">EN: 570</div>
  </div>

  <!-- Flash messages -->
  <div th:if="${successMsg}" class="alert alert-success" style="margin-bottom:16px;"
       th:text="${successMsg}"></div>
  <div th:if="${errorMsg}" class="alert alert-error" style="margin-bottom:16px;"
       th:text="${errorMsg}"></div>

  <!-- Search -->
  <form method="get" action="/admin/translations" class="search-bar">
    <input type="text" name="q" th:value="${q}" placeholder="Search by key (e.g. nav.feed, auth...)"/>
    <button type="submit">🔍 Search</button>
    <a th:if="${q != null}" href="/admin/translations"
       style="padding:9px 14px;background:#f1f5f9;border-radius:8px;color:#555;text-decoration:none;font-size:14px;">✕ Clear</a>
  </form>

  <!-- Add new key -->
  <form method="post" action="/admin/translations/new" class="new-key-form">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="text" name="newKey" placeholder="Add new key (e.g. nav.timetable)" required/>
    <button type="submit">+ Add Key</button>
  </form>

  <!-- Result count -->
  <p class="result-count" th:text="${keys.size()} + ' keys found'">0 keys found</p>

  <!-- Keys table -->
  <table class="keys-table" th:if="${!keys.isEmpty()}">
    <thead>
    <tr>
      <th>Key</th>
      <th><span class="locale-badge loc-en">EN</span> English</th>
      <th><span class="locale-badge loc-ru">RU</span> Russian</th>
      <th><span class="locale-badge loc-ky">KY</span> Kyrgyz</th>
      <th><span class="locale-badge loc-tr">TR</span> Turkish</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="key : ${keys}">
      <td><span class="key-code" th:text="${key}">nav.feed</span></td>
      <td>
          <span class="preview-val"
                th:text="${#messages.msgOrNull(key)} ?: '—'">Feed</span>
      </td>
      <td><span class="preview-val" style="color:#9d174d;">—</span></td>
      <td><span class="preview-val" style="color:#065f46;">—</span></td>
      <td><span class="preview-val" style="color:#92400e;">—</span></td>
      <td>
        <a th:href="@{/admin/translations/edit(key=${key})}" class="edit-btn">✏️ Edit</a>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="empty-msg" th:if="${keys.isEmpty()}">
    <p>No translation keys found<span th:if="${q != null}"> matching "<strong th:text="${q}"></strong>"</span>.</p>
  </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
