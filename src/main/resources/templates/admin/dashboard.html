<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{admin.title})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="main-content">

    <h2 th:text="#{admin.dashboard}">Admin Dashboard</h2>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <h4 th:text="#{admin.total_users}">Total Users</h4>
        <span class="stat-number" th:text="${totalUsers}">0</span>
      </div>
      <div class="stat-card stat-card--warning">
        <h4 th:text="#{admin.pending_users}">Pending Validation</h4>
        <span class="stat-number" th:text="${pendingUsers}">0</span>
        <a th:href="@{/secretary}" class="stat-link" th:text="#{admin.review}">Review</a>
      </div>
      <div class="stat-card stat-card--success">
        <h4 th:text="#{admin.active_users}">Active Users</h4>
        <span class="stat-number" th:text="${activeUsers}">0</span>
      </div>
      <div class="stat-card stat-card--danger">
        <h4 th:text="#{admin.suspended_users}">Suspended</h4>
        <span class="stat-number" th:text="${suspendedUsers}">0</span>
      </div>
      <div class="stat-card">
        <h4 th:text="#{admin.total_posts}">Total Posts</h4>
        <span class="stat-number" th:text="${totalPosts}">0</span>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="admin-actions">
      <a th:href="@{/admin/users}" class="btn btn-secondary" th:text="#{admin.manage_users}">Manage Users</a>
      <a th:href="@{/secretary}" class="btn btn-secondary" th:text="#{admin.validation_queue}">Validation Queue</a>
      <a th:href="@{/admin/create-secretary}" class="btn btn-primary">+ Create Secretary</a>

                <!-- University News -->
                <a th:href="@{/admin/news}" style="display:block;text-decoration:none;">
                    <div class="stat-card" style="cursor:pointer;">
                        <div class="stat-icon" style="background:#FEF3C7;">
                            <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#F59E0B" stroke-width="2">
                                <path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/>
                            </svg>
                        </div>
                        <div>
                            <div class="stat-num">News</div>
                            <div class="stat-lbl">Manage University News</div>
                        </div>
                    </div>
                </a>
                <a th:href="@{/admin/import-mezuns}" class="btn btn-secondary" style="background:#27ae60;color:white;border-color:#27ae60;">📥 Import Mezuns (Excel)</a>
      <form th:action="@{/admin/rankings/recalculate}" method="post" style="display:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-secondary" th:text="#{admin.recalculate}">Recalculate Rankings</button>
      </form>
    </div>

    <!-- Top 10 Leaderboard -->
    <section class="admin-section">
      <h3 th:text="#{admin.top10}">Global Top 10</h3>
      <table class="admin-table">
        <thead>
        <tr>
          <th>#</th>
          <th th:text="#{table.user}">User</th>
          <th th:text="#{table.role}">Role</th>
          <th th:text="#{table.points}">Points</th>
          <th th:text="#{table.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p, i : ${globalTop10}">
          <td th:text="${i.index + 1}">1</td>
          <td><a th:href="@{/admin/users/{id}(id=${p.user.id})}"
                 th:text="${p.user.fullName}">Name</a></td>
          <td><span class="role-badge" th:text="${p.user.role}">STUDENT</span></td>
          <td th:text="${p.totalPoints}">0</td>
          <td>
            <a th:href="@{/admin/users/{id}(id=${p.user.id})}"
               class="btn btn-sm btn-outline" th:text="#{common.view}">View</a>
          </td>
        </tr>
        </tbody>
      </table>
    </section>

  </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
