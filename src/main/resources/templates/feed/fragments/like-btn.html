<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="likeBtn(postId, liked, count)" th:id="${'like-' + postId}">
    <button class="btn-action"
            th:classappend="${liked} ? ' liked'"
            th:attr="data-post-id=${postId}"
            onclick="toggleLike(this.dataset.postId)">
        <span th:text="${liked} ? '❤️' : '🤍'">🤍</span>
        <span th:text="${count}">0</span>
    </button>
</div>
</body>
</html>
