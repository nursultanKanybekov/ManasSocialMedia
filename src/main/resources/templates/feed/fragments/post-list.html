<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="postList">

    <div th:each="post : ${posts}"
         class="fd-post"
         th:classappend="${post.isPinned} ? ' post-pinned'"
         th:attrappend="class=${' type-' + post.postType.name()}"
         th:id="'post-' + ${post.id}">

        <div th:if="${post.isPinned}" class="fd-pin-badge">📌 Pinned</div>

        <div class="fd-post-header">
            <a th:href="@{/mezun/{id}(id=${post.author.id})}">
                <img th:src="${post.author.profile != null and post.author.profile.avatarUrl != null
                               ? post.author.profile.avatarUrl : '/images/default-avatar.svg'}"
                     class="fd-post-avatar" alt="avatar"/>
            </a>
            <div style="flex:1;">
                <a th:href="@{/mezun/{id}(id=${post.author.id})}"
                   class="fd-post-author" th:text="${post.author.fullName}">Author</a>
                <div class="fd-post-meta-row">
                    <span class="fd-role-badge" th:text="${post.author.role}">ROLE</span>
                    <span class="fd-type-tag"
                          th:classappend="${post.postType.name() == 'NEWS'} ? ' news' :
                                         (${post.postType.name() == 'SUCCESS_STORY'} ? ' success' :
                                         (${post.postType.name() == 'ANNOUNCEMENT'} ? ' announce' : ' general'))"
                          th:switch="${post.postType.name()}">
                        <span th:case="'SUCCESS_STORY'">✨ Success</span>
                        <span th:case="'NEWS'">📰 News</span>
                        <span th:case="'ANNOUNCEMENT'">📢 Announcement</span>
                        <span th:case="*">💬 General</span>
                    </span>
                    <time class="fd-post-time"
                          th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy · HH:mm')}">Date</time>
                </div>
            </div>

            <!-- ⋮ menu -->
            <div th:if="${currentUserId != null and (post.author.id == currentUserId or isAdmin == true or canPin == true)}"
                 style="position:relative;">
                <button class="fd-menu-btn"
                        th:data-post-id="${post.id}"
                        onclick="togglePostMenu(this)">⋯</button>
                <div class="fd-dropdown">
                    <button th:if="${post.author.id == currentUserId}"
                            th:data-post-id="${post.id}"
                            onclick="startEditPost(this.dataset.postId)"
                            class="fd-dd-btn">✏️ Edit post</button>
                    <div th:if="${post.author.id == currentUserId}" class="fd-dd-divider"></div>
                    <button th:if="${canPin == true}"
                            th:data-post-id="${post.id}"
                            th:data-pinned="${post.isPinned}"
                            onclick="togglePinPost(this)"
                            class="fd-dd-btn">
                        <span th:text="${post.isPinned} ? '📌 Unpin post' : '📌 Pin post'">📌 Pin post</span>
                    </button>
                    <div th:if="${canPin == true}" class="fd-dd-divider"></div>
                    <button th:data-post-id="${post.id}"
                            onclick="deletePostAction(this.dataset.postId)"
                            class="fd-dd-btn danger">🗑 Delete post</button>
                </div>
            </div>
        </div>

        <!-- View mode -->
        <div th:id="'post-view-' + ${post.id}">
            <p class="fd-post-body fd-post-body-clamped"
               th:id="'post-body-' + ${post.id}"
               th:text="${post.getLocalizedContent(#locale.language)}">Content</p>
            <button class="fd-show-all-btn"
                    th:id="'show-all-' + ${post.id}"
                    th:attr="data-post-id=${post.id}"
                    onclick="togglePostExpand(this)">Show all ↓</button>
        </div>

        <!-- Edit mode (hidden) -->
        <div th:id="'post-edit-' + ${post.id}" class="fd-edit-wrap" style="display:none;">
            <textarea th:id="'post-edit-txt-' + ${post.id}" rows="4" class="fd-edit-textarea"
                      th:text="${post.getLocalizedContent(#locale.language)}"></textarea>
            <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;">
                <button th:data-post-id="${post.id}"
                        onclick="cancelEditPost(this.dataset.postId)"
                        class="fd-cancel-btn" th:text="#{common.cancel}">Cancel</button>
                <button th:data-post-id="${post.id}"
                        onclick="saveEditPost(this.dataset.postId)"
                        class="fd-submit-btn" style="padding:8px 20px;">💾 Save</button>
            </div>
        </div>

        <div th:if="${post.imageUrl != null}" style="overflow:hidden;border-radius:0 0 6px 6px;">
            <img th:src="${post.imageUrl}" class="fd-post-img"
                 onclick="openImageModal(this.src)" alt="post image"/>
        </div>

        <div class="fd-post-footer">
            <div th:id="'like-' + ${post.id}">
                <button class="fd-foot-btn"
                        th:classappend="${likedPostIds != null and #lists.contains(likedPostIds, post.id.toString())} ? ' liked'"
                        th:attr="data-post-id=${post.id}"
                        onclick="toggleLike(this.dataset.postId)">
                    <span th:text="${likedPostIds != null and #lists.contains(likedPostIds, post.id.toString())} ? '❤️' : '🤍'">🤍</span>
                    <span th:text="${post.likesCount}">0</span>
                </button>
            </div>
            <button class="fd-foot-btn" th:attr="data-post-id=${post.id}"
                    onclick="toggleComments(this.dataset.postId)">
                💬 <span th:id="'ccount-' + ${post.id}" th:text="${post.commentsCount}">0</span>
            </button>
            <button class="fd-foot-btn"
                    th:attr="data-post-id=${post.id},
                             data-post-author=${post.author.fullName},
                             data-post-content=${post.getLocalizedContent('en')},
                             data-post-image=${post.imageUrl}"
                    onclick="openShareModal(this.dataset.postId, this.dataset.postAuthor, this.dataset.postContent, this.dataset.postImage)">
                🔗 Share
            </button>
        </div>

        <div th:id="'comments-' + ${post.id}" class="fd-comments" style="display:none;"></div>
        <div th:id="'comment-row-' + ${post.id}" class="fd-comment-row" style="display:none;">
            <input type="text" th:id="'comment-input-' + ${post.id}"
                   th:attr="data-post-id=${post.id}" name="content"
                   th:placeholder="#{feed.comment.placeholder}" class="fd-comment-input"
                   onkeydown="if(event.key==='Enter') submitComment(this.dataset.postId)"/>
            <button class="fd-comment-send" th:attr="data-post-id=${post.id}"
                    onclick="submitComment(this.dataset.postId)">➤</button>
        </div>
    </div>

    <!-- ── Load More trigger ── -->
    <div th:if="${nextPage > -1}"
         th:attr="data-next-page=${nextPage}"
         class="load-more-trigger fd-load-more"
         style="display:flex;align-items:center;justify-content:center;padding:28px;">
        <div class="fd-spinner"></div>
    </div>

    <!-- ── Empty state ── -->
    <div th:if="${#lists.isEmpty(posts)}" class="fd-empty">
        <div class="fd-empty-icon">💬</div>
        <div class="fd-empty-title" th:text="#{feed.no_posts}">No posts yet</div>
    </div>

</th:block>
</body>
</html>
