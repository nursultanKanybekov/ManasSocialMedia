<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Feed')}"></head>
<body class="app-layout feed-light-mode">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap');

    /* ─── ROOT ─── */
    .feed-light-mode .main-content {
        background: #eef2f7;
        min-height: 100vh;
        padding: 28px 20px 70px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        position: relative;
    }

    /* soft ambient blobs */
    .feed-light-mode .main-content::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
                radial-gradient(ellipse 70% 55% at 10% 5%,  rgba(99,179,237,0.18)  0%, transparent 55%),
                radial-gradient(ellipse 55% 45% at 88% 85%, rgba(167,139,250,0.14) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 55% 45%, rgba(52,211,153,0.07)  0%, transparent 65%);
        pointer-events: none;
        z-index: 0;
    }
    .feed-light-mode .main-content > * { position: relative; z-index: 1; }

    /* ─── LAYOUT ─── */
    .fd-layout {
        display: grid;
        grid-template-columns: 264px 1fr;
        gap: 22px;
        max-width: 960px;
        margin: 0 auto;
        align-items: start;
    }
    /* ─── DESKTOP: left sidebar scrollable within viewport ─── */
    .fd-left { max-height: calc(100vh - 100px); overflow-y: auto; scrollbar-width: none; }
    .fd-left::-webkit-scrollbar { display: none; }

    /* ─── TABLET (≤900px): shrink left column ─── */
    @media(max-width:900px){
        .fd-layout { grid-template-columns: 200px 1fr; }
    }

    /* ─── MOBILE (≤768px): single scrollable column ─── */
    @media(max-width:768px){
        .fd-layout {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        /* 1 — profile + top-this-week first */
        .fd-left {
            display: flex;
            position: static;
            max-height: none;
            overflow-y: visible;
            order: 1;
        }
        /* 2 — creator box + posts below left sidebar */
        .fd-layout > div { order: 2; }

        /* Creator box sticks at top once reached while posts scroll */
        .fd-creator-wrap {
            position: sticky;
            top: 60px;
            z-index: 90;
            background: #eef2f7;
            padding-bottom: 6px;
            margin-bottom: 4px;
        }
    }

    /* ─── GLASS CARD ─── */
    .glass-card {
        background: rgba(255,255,255,0.72);
        border: 1px solid rgba(255,255,255,0.9);
        border-radius: 20px;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 4px 24px rgba(100,120,160,0.09), 0 1px 2px rgba(100,120,160,0.06);
        transition: box-shadow .25s, border-color .25s;
    }
    .glass-card:hover {
        box-shadow: 0 8px 36px rgba(100,120,160,0.14), 0 1px 2px rgba(100,120,160,0.06);
        border-color: rgba(255,255,255,1);
    }

    /* ─── LEFT SIDEBAR ─── */
    .fd-left { position: sticky; top: 84px; display: flex; flex-direction: column; gap: 16px; }

    .fd-user-card { padding: 0; overflow: visible; }

    .fd-user-banner {
        height: 70px;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
        position: relative;
        border-radius: 20px 20px 0 0;
    }
    .fd-user-banner::after {
        content: '';
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.07'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .fd-user-body { padding: 0 18px 20px; text-align: center; }
    .fd-user-avatar-wrap {
        margin: -30px auto 12px;
        width: 60px; height: 60px;
        border-radius: 50%;
        padding: 3px;
        background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
        box-shadow: 0 4px 16px rgba(139,92,246,0.3);
        position: relative;
        z-index: 10;
    }
    .fd-user-avatar-wrap img {
        width: 100%; height: 100%;
        border-radius: 50%; object-fit: cover;
        border: 3px solid #eef2f7;
    }
    .fd-user-name {
        font-family: 'Sora', sans-serif;
        font-weight: 700; font-size: 14px;
        color: #1e293b; margin-bottom: 4px;
    }
    .fd-user-role {
        display: inline-block; font-size: 10px;
        font-family: 'Sora', sans-serif; font-weight: 700;
        letter-spacing: .07em; padding: 3px 12px; border-radius: 20px;
        background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(139,92,246,0.12));
        color: #6366f1; border: 1px solid rgba(99,102,241,0.25);
        margin-bottom: 14px; text-transform: uppercase;
    }
    .fd-view-profile-btn {
        display: block; text-align: center; padding: 8px 0; border-radius: 12px;
        background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08));
        border: 1px solid rgba(99,102,241,0.2);
        color: #6366f1; font-size: 12px; font-weight: 700;
        font-family: 'Sora', sans-serif; text-decoration: none;
        transition: all .2s;
    }
    .fd-view-profile-btn:hover {
        background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
        border-color: rgba(99,102,241,0.4);
        box-shadow: 0 4px 14px rgba(99,102,241,0.15);
    }
    .fd-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .fd-stat {
        background: linear-gradient(135deg, rgba(99,102,241,0.06), rgba(139,92,246,0.06));
        border-radius: 12px; padding: 12px 6px;
        border: 1px solid rgba(99,102,241,0.12);
    }
    .fd-stat strong {
        display: block; font-family: 'Sora', sans-serif;
        font-weight: 800; font-size: 20px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .fd-stat small { font-size: 10px; color: #94a3b8; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }

    /* Top widget */
    .fd-widget-title {
        font-family: 'Sora', sans-serif; font-weight: 700; font-size: 11px;
        letter-spacing: .08em; text-transform: uppercase; color: #94a3b8;
        padding: 16px 18px 12px; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .fd-top-list { list-style: none; padding: 10px 0 6px; margin: 0; }
    .fd-top-item { display: flex; align-items: center; gap: 10px; padding: 8px 18px; transition: background .18s; cursor: pointer; border-radius: 10px; margin: 0 6px; }
    .fd-top-item:hover { background: rgba(99,102,241,0.06); }
    .fd-rank { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-weight: 800; font-size: 10px; flex-shrink: 0; }
    .fd-rank.r1 { background: linear-gradient(135deg,#ffd700,#f59e0b); color: #fff; box-shadow: 0 2px 8px rgba(245,158,11,0.4); }
    .fd-rank.r2 { background: linear-gradient(135deg,#c0c9d4,#94a3b8); color: #fff; box-shadow: 0 2px 8px rgba(148,163,184,0.4); }
    .fd-rank.r3 { background: linear-gradient(135deg,#cd7f32,#a0522d); color: #fff; box-shadow: 0 2px 8px rgba(160,82,45,0.3); }
    .fd-rank.rn { background: rgba(99,102,241,0.1); color: #6366f1; }
    .fd-top-name { flex: 1; font-size: 12px; font-weight: 600; color: #475569; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fd-top-name:hover { color: #6366f1; }
    .fd-top-pts { font-size: 11px; font-weight: 700; color: #f59e0b; font-family: 'Sora', sans-serif; background: rgba(245,158,11,0.1); padding: 2px 7px; border-radius: 8px; }

    /* ─── POST CREATOR ─── */
    .fd-creator-wrap {
        position: relative; border-radius: 22px; padding: 2px; margin-bottom: 8px;
        background: linear-gradient(135deg, rgba(59,130,246,0.6), rgba(139,92,246,0.6), rgba(236,72,153,0.5));
        background-size: 300% 300%;
        animation: gradientShift 5s ease infinite;
        box-shadow: 0 6px 28px rgba(99,102,241,0.2);
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .fd-creator {
        background: rgba(255,255,255,0.92);
        border-radius: 20px; padding: 18px 20px;
        backdrop-filter: blur(20px);
    }
    .fd-creator-row { display: flex; align-items: center; gap: 12px; }
    .fd-creator-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(99,102,241,0.3); flex-shrink: 0; }
    .fd-creator-input {
        flex: 1; background: rgba(238,242,247,0.9);
        border: 1.5px solid rgba(99,102,241,0.15);
        border-radius: 24px; padding: 11px 20px; font-size: 14px; color: #64748b;
        cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
        transition: all .2s; resize: none; overflow: hidden; min-height: 44px;
    }
    .fd-creator-input:focus {
        outline: none; border-color: rgba(99,102,241,0.45);
        background: rgba(255,255,255,0.95); color: #1e293b;
        box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
    }
    .fd-creator-expanded { margin-top: 14px; display: none; }
    .fd-creator-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .fd-action-btn {
        display: flex; align-items: center; gap: 6px; padding: 8px 16px;
        border-radius: 20px; border: 1.5px solid rgba(99,102,241,0.18);
        background: rgba(99,102,241,0.06); color: #6366f1;
        font-size: 12px; font-weight: 600; cursor: pointer;
        font-family: 'Plus Jakarta Sans', sans-serif; transition: all .18s;
    }
    .fd-action-btn:hover { background: rgba(99,102,241,0.14); border-color: rgba(99,102,241,0.35); }
    .fd-type-select {
        padding: 8px 14px; border-radius: 20px;
        border: 1.5px solid rgba(99,102,241,0.18); background: rgba(99,102,241,0.06);
        color: #6366f1; font-size: 12px; font-weight: 600;
        cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .fd-type-select option { background: #fff; color: #1e293b; }
    .fd-submit-btn {
        margin-left: auto; padding: 9px 24px; border-radius: 20px; border: none;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff;
        font-family: 'Sora', sans-serif; font-weight: 700; font-size: 13px;
        cursor: pointer; transition: all .2s;
        box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    .fd-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.45); }
    .fd-cancel-btn {
        padding: 9px 18px; border-radius: 20px;
        border: 1.5px solid rgba(0,0,0,0.1); background: transparent;
        color: #94a3b8; font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 600; font-size: 13px; cursor: pointer; transition: all .18s;
    }
    .fd-cancel-btn:hover { color: #64748b; border-color: rgba(0,0,0,0.2); }
    .fd-img-preview-wrap { position: relative; display: inline-block; margin-bottom: 10px; }
    .fd-img-preview-wrap img { max-width: 100%; max-height: 280px; border-radius: 14px; object-fit: cover; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .fd-img-remove { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .fd-error { padding: 11px 16px; background: rgba(239,68,68,0.08); border: 1.5px solid rgba(239,68,68,0.25); border-radius: 12px; color: #ef4444; font-size: 13px; margin: 8px 0; }

    /* ─── TABS ─── */
    .fd-tabs { display: flex; gap: 8px; padding: 16px 0 8px; overflow-x: auto; }
    .fd-tabs::-webkit-scrollbar { display: none; }
    .fd-tab {
        padding: 9px 20px; border-radius: 20px;
        border: 1.5px solid rgba(0,0,0,0.08);
        background: rgba(255,255,255,0.7);
        color: #94a3b8; font-family: 'Sora', sans-serif;
        font-weight: 700; font-size: 12px; cursor: pointer;
        white-space: nowrap; transition: all .2s;
        backdrop-filter: blur(10px);
    }
    .fd-tab:hover { color: #6366f1; border-color: rgba(99,102,241,0.3); background: rgba(255,255,255,0.9); }
    .fd-tab.active {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-color: transparent;
        color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }

    /* ─── POSTS ─── */
    .fd-post {
        background: rgba(255,255,255,0.78);
        border: 1.5px solid rgba(255,255,255,0.95);
        border-radius: 20px;
        margin-bottom: 16px;
        overflow: visible;
        position: relative;
        transition: border-color .25s, transform .2s, box-shadow .25s;
        animation: cardIn .4s ease both;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 4px 20px rgba(100,120,160,0.08), 0 1px 3px rgba(100,120,160,0.06);
    }
    .fd-post:hover {
        border-color: rgba(255,255,255,1);
        box-shadow: 0 10px 40px rgba(100,120,160,0.14), 0 2px 6px rgba(100,120,160,0.08);
        transform: translateY(-1px);
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .fd-post:nth-child(1){animation-delay:.04s}.fd-post:nth-child(2){animation-delay:.09s}.fd-post:nth-child(3){animation-delay:.14s}
    .fd-post:nth-child(4){animation-delay:.19s}.fd-post:nth-child(5){animation-delay:.24s}.fd-post:nth-child(6){animation-delay:.29s}

    /* type left accents */
    .fd-post.type-NEWS          { border-left: 4px solid #3b82f6; }
    .fd-post.type-SUCCESS_STORY { border-left: 4px solid #10b981; }
    .fd-post.type-ANNOUNCEMENT  { border-left: 4px solid #f59e0b; }
    .fd-post.type-GENERAL       { border-left: 4px solid rgba(99,102,241,0.25); }
    .fd-post.post-pinned        { border-left: 4px solid #ec4899; }

    .fd-pin-badge {
        position: absolute; top: -1px; left: 16px; font-size: 10px;
        font-family: 'Sora', sans-serif; font-weight: 800; letter-spacing: .06em;
        text-transform: uppercase; color: #ec4899;
        background: rgba(236,72,153,0.1); border: 1px solid rgba(236,72,153,0.25);
        padding: 3px 12px; border-radius: 0 0 10px 10px;
    }
    .fd-post-header { display: flex; align-items: center; gap: 12px; padding: 18px 20px 12px; position: relative; overflow: visible; }
    .fd-post-avatar {
        width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
        border: 2px solid rgba(255,255,255,0.9);
        box-shadow: 0 2px 10px rgba(100,120,160,0.15);
        flex-shrink: 0; transition: box-shadow .2s;
    }
    .fd-post-avatar:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.25); }
    .fd-post-author {
        font-family: 'Sora', sans-serif; font-weight: 700; font-size: 14px;
        color: #1e293b; text-decoration: none; display: block;
    }
    .fd-post-author:hover { color: #6366f1; }
    .fd-post-meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
    .fd-role-badge {
        font-size: 9px; font-family: 'Sora', sans-serif; font-weight: 700;
        letter-spacing: .06em; text-transform: uppercase; padding: 2px 8px;
        border-radius: 10px; background: rgba(99,102,241,0.08);
        color: #6366f1; border: 1px solid rgba(99,102,241,0.18);
    }
    .fd-type-tag { font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 10px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .fd-type-tag.news    { background:rgba(59,130,246,0.1);  color:#2563eb; border:1px solid rgba(59,130,246,0.2);  }
    .fd-type-tag.success { background:rgba(16,185,129,0.1);  color:#059669; border:1px solid rgba(16,185,129,0.2);  }
    .fd-type-tag.announce{ background:rgba(245,158,11,0.1);  color:#d97706; border:1px solid rgba(245,158,11,0.2);  }
    .fd-type-tag.general { background:rgba(99,102,241,0.08); color:#6366f1; border:1px solid rgba(99,102,241,0.18); }
    .fd-post-time { font-size: 11px; color: #cbd5e1; font-weight: 500; }
    .fd-post-body { padding: 4px 20px 16px; font-size: 14px; line-height: 1.75; color: #475569; }
    .fd-post-img { width: 100%; max-height: 420px; object-fit: cover; cursor: zoom-in; display: block; }
    .fd-edit-wrap { padding: 0 20px 16px; }
    .fd-edit-textarea {
        width: 100%; background: rgba(238,242,247,0.8);
        border: 1.5px solid rgba(99,102,241,0.3); border-radius: 14px;
        padding: 12px 16px; font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 14px; color: #1e293b; resize: vertical; box-sizing: border-box;
    }
    .fd-edit-textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }

    /* footer */
    .fd-post-footer {
        display: flex; align-items: center; gap: 8px;
        padding: 10px 20px 14px;
        border-top: 1px solid rgba(0,0,0,0.05);
    }
    .fd-foot-btn {
        display: flex; align-items: center; gap: 6px; padding: 8px 16px;
        border-radius: 20px; border: 1.5px solid rgba(0,0,0,0.08);
        background: rgba(238,242,247,0.8); color: #94a3b8;
        font-size: 13px; font-weight: 600; cursor: pointer;
        font-family: 'Plus Jakarta Sans', sans-serif; transition: all .18s;
    }
    .fd-foot-btn:hover { background: rgba(99,102,241,0.08); color: #6366f1; border-color: rgba(99,102,241,0.25); }
    .fd-foot-btn.liked { color: #ef4444; border-color: rgba(239,68,68,0.25); background: rgba(239,68,68,0.07); }

    /* dropdown */
    .fd-menu-btn {
        margin-left: auto; background: none; border: none; cursor: pointer;
        color: #94a3b8; font-size: 22px; padding: 2px 8px; border-radius: 10px;
        line-height: 1; transition: all .15s;
    }
    .fd-menu-btn:hover { background: rgba(99,102,241,0.08); color: #6366f1; }
    .fd-dropdown {
        display: none; position: absolute; right: 10px; top: 52px;
        background: rgba(255,255,255,0.96); border: 1.5px solid rgba(255,255,255,1);
        border-radius: 16px; box-shadow: 0 16px 48px rgba(100,120,160,0.22);
        z-index: 500; min-width: 158px; overflow: hidden;
        backdrop-filter: blur(20px);
    }
    .fd-dd-btn {
        display: flex; align-items: center; gap: 8px; width: 100%;
        padding: 11px 18px; border: none; background: transparent;
        font-size: 13px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif;
        cursor: pointer; color: #475569; transition: background .15s;
    }
    .fd-dd-btn:hover { background: rgba(99,102,241,0.07); color: #6366f1; }
    .fd-dd-btn.danger { color: #ef4444; }
    .fd-dd-btn.danger:hover { background: rgba(239,68,68,0.07); }
    .fd-dd-divider { height: 1px; background: rgba(0,0,0,0.06); }

    /* comments */
    .fd-comments { padding: 0 20px 8px; }
    .fd-comment-row { display: flex; align-items: center; gap: 10px; padding: 10px 20px 18px; }
    .fd-comment-input {
        flex: 1; background: rgba(238,242,247,0.9);
        border: 1.5px solid rgba(99,102,241,0.15); border-radius: 22px;
        padding: 10px 18px; font-size: 13px; color: #475569;
        font-family: 'Plus Jakarta Sans', sans-serif; transition: all .18s;
    }
    .fd-comment-input:focus { outline: none; border-color: rgba(99,102,241,0.4); background: #fff; box-shadow: 0 0 0 4px rgba(99,102,241,0.08); }
    .fd-comment-input::placeholder { color: #cbd5e1; }
    .fd-comment-send {
        width: 38px; height: 38px; border-radius: 50%; border: none;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff;
        font-size: 14px; cursor: pointer; display: flex; align-items: center;
        justify-content: center; flex-shrink: 0; transition: all .18s;
        box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }
    .fd-comment-send:hover { transform: scale(1.1); box-shadow: 0 6px 18px rgba(99,102,241,0.45); }



    /* ─── EMPTY ─── */
    .fd-empty { text-align: center; padding: 70px 20px; color: #cbd5e1; }
    .fd-empty-icon { font-size: 52px; margin-bottom: 14px; opacity: .7; }
    .fd-empty-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 17px; color: #94a3b8; margin-bottom: 8px; }

    /* ─── LOAD MORE ─── */
    .load-more-trigger { display: flex; align-items: center; justify-content: center; padding: 28px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fd-spinner { width: 26px; height: 26px; border: 2.5px solid rgba(99,102,241,0.18); border-top-color: #6366f1; border-radius: 50%; animation: spin .7s linear infinite; }
</style>

<main class="main-content">
    <div class="fd-layout">

        <!-- LEFT -->
        <aside class="fd-left">
            <div class="glass-card fd-user-card">
                <div class="fd-user-banner"></div>
                <div class="fd-user-body">
                    <div class="fd-user-avatar-wrap">
                        <img th:src="${currentUser.profile != null and currentUser.profile.avatarUrl != null ? currentUser.profile.avatarUrl : '/images/default-avatar.svg'}" alt="avatar"/>
                    </div>
                    <div class="fd-user-name" th:text="${currentUser.fullName}">Name</div>
                    <div class="fd-user-role" th:text="${currentUser.role}">ROLE</div>
                    <a th:href="@{/profile/{id}(id=${currentUser.id})}" class="fd-view-profile-btn" th:text="#{feed.view_profile}">View Profile →</a>
                    <div class="fd-stats" th:if="${currentUser.profile != null}">
                        <div class="fd-stat">
                            <strong th:text="${currentUser.profile.totalPoints}">0</strong>
                            <small>Points</small>
                        </div>
                        <div class="fd-stat">
                            <strong th:text="${currentUser.profile.rankPosition != null ? '#' + currentUser.profile.rankPosition : '—'}">—</strong>
                            <small>Rank</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div class="fd-widget-title">🏆 Top This Week</div>
                <ul class="fd-top-list">
                    <li th:each="p, i : ${topUsers}" class="fd-top-item">
                        <span class="fd-rank"
                              th:classappend="${i.index == 0} ? ' r1' : (${i.index == 1} ? ' r2' : (${i.index == 2} ? ' r3' : ' rn'))"
                              th:text="${i.index + 1}">1</span>
                        <a th:href="@{/mezun/{id}(id=${p.user.id})}" class="fd-top-name" th:text="${p.user.fullName}">Name</a>
                        <span class="fd-top-pts" th:text="${p.totalPoints} + ' pts'">0 pts</span>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- CENTER -->
        <div>
            <div class="fd-creator-wrap">
                <div class="fd-creator">
                    <div class="fd-creator-row">
                        <img th:src="${currentUser.profile != null and currentUser.profile.avatarUrl != null ? currentUser.profile.avatarUrl : '/images/default-avatar.svg'}" class="fd-creator-avatar" alt="avatar"/>
                        <textarea id="postContent" name="content" class="fd-creator-input" th:placeholder="#{feed.whats_on_your_mind}" rows="1" onclick="expandPostBox()"></textarea>
                    </div>
                    <div id="postExpanded" class="fd-creator-expanded">
                        <div id="imagePreviewWrap" style="display:none;" class="fd-img-preview-wrap">
                            <img id="imagePreview" src="" alt="preview"/>
                            <button onclick="removeImage()" class="fd-img-remove">✕</button>
                        </div>
                        <div class="fd-creator-actions">
                            <label for="postImage" class="fd-action-btn" style="cursor:pointer;">
                                <span th:text="#{feed.photo}">📷 Photo</span>
                                <input type="file" id="postImage" name="image" accept="image/*" style="display:none;" onchange="previewImage(this)"/>
                            </label>
                            <select id="postType" name="postType" class="fd-type-select">
                                <option value="GENERAL"   th:text="#{feed.post.general}">💬 General</option>
                                <option value="SUCCESS_STORY" th:text="#{feed.post.success}">✨ Success Story</option>
                                <option value="NEWS"      th:text="#{feed.post.news}">📰 News</option>
                                <option value="ANNOUNCEMENT" th:text="#{feed.post.announcement}">📢 Announcement</option>
                            </select>
                            <button onclick="cancelPost()" class="fd-cancel-btn" th:text="#{feed.post.cancel}">Cancel</button>
                            <button id="postSubmitBtn" class="fd-submit-btn" onclick="submitPost()" th:text="#{feed.post.submit}">🚀 Post</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="postError" style="display:none;" class="fd-error"></div>

            <div class="fd-tabs">
                <button class="fd-tab active" onclick="loadFeedTab(this, '')"     th:text="#{feed.tab.all}">All</button>
                <button class="fd-tab"        onclick="loadFeedTab(this, 'NEWS')" th:text="#{feed.tab.news}">📰 News</button>
                <button class="fd-tab"        onclick="loadFeedTab(this, 'SUCCESS_STORY')" th:text="#{feed.tab.success}">✨ Success</button>
                <button class="fd-tab"        onclick="loadFeedTab(this, 'ANNOUNCEMENT')" th:text="#{feed.tab.announcements}">📢 Announcements</button>
            </div>

            <div id="feed-list">
                <div th:each="post : ${initialPosts}"
                     class="fd-post"
                     th:classappend="${post.isPinned} ? ' post-pinned'"
                     th:attrappend="class=${' type-' + post.postType.name()}"
                     th:id="'post-' + ${post.id}">

                    <div th:if="${post.isPinned}" class="fd-pin-badge">📌 Pinned</div>

                    <div class="fd-post-header">
                        <a th:href="@{/mezun/{id}(id=${post.author.id})}">
                            <img th:src="${post.author.profile != null and post.author.profile.avatarUrl != null ? post.author.profile.avatarUrl : '/images/default-avatar.svg'}" class="fd-post-avatar" alt="avatar"/>
                        </a>
                        <div style="flex:1;">
                            <a th:href="@{/mezun/{id}(id=${post.author.id})}" class="fd-post-author" th:text="${post.author.fullName}">Author</a>
                            <div class="fd-post-meta-row">
                                <span class="fd-role-badge" th:text="${post.author.role}">ROLE</span>
                                <span class="fd-type-tag"
                                      th:classappend="${post.postType.name() == 'NEWS'} ? ' news' : (${post.postType.name() == 'SUCCESS_STORY'} ? ' success' : (${post.postType.name() == 'ANNOUNCEMENT'} ? ' announce' : ' general'))"
                                      th:switch="${post.postType.name()}">
                                    <span th:case="'SUCCESS_STORY'">✨ Success</span>
                                    <span th:case="'NEWS'">📰 News</span>
                                    <span th:case="'ANNOUNCEMENT'">📢 Announcement</span>
                                    <span th:case="*">💬 General</span>
                                </span>
                                <time class="fd-post-time" th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy · HH:mm')}">Date</time>
                            </div>
                        </div>
                        <div th:if="${currentUserId != null and (post.author.id == currentUserId or isAdmin == true or canPin == true)}" style="position:relative;">
                            <button class="fd-menu-btn" th:data-post-id="${post.id}" onclick="togglePostMenu(this)">⋯</button>
                            <div class="fd-dropdown">
                                <button th:if="${post.author.id == currentUserId}" th:data-post-id="${post.id}" onclick="startEditPost(this.dataset.postId)" class="fd-dd-btn">✏️ Edit post</button>
                                <div th:if="${post.author.id == currentUserId}" class="fd-dd-divider"></div>
                                <button th:if="${canPin == true}"
                                        th:data-post-id="${post.id}"
                                        th:data-pinned="${post.isPinned}"
                                        onclick="togglePinPost(this)"
                                        class="fd-dd-btn">
                                    <span th:text="${post.isPinned} ? '📌 Unpin post' : '📌 Pin post'">📌 Pin post</span>
                                </button>
                                <div th:if="${canPin == true}" class="fd-dd-divider"></div>
                                <button th:data-post-id="${post.id}" onclick="deletePostAction(this.dataset.postId)" class="fd-dd-btn danger">🗑 Delete post</button>
                            </div>
                        </div>
                    </div>

                    <div th:id="'post-view-' + ${post.id}">
                        <p class="fd-post-body" th:text="${post.getLocalizedContent(#locale.language)}">Content</p>
                    </div>

                    <div th:id="'post-edit-' + ${post.id}" class="fd-edit-wrap" style="display:none;">
                        <textarea th:id="'post-edit-txt-' + ${post.id}" rows="4" class="fd-edit-textarea"
                                  th:text="${post.getLocalizedContent(#locale.language)}"></textarea>
                        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;">
                            <button th:data-post-id="${post.id}" onclick="cancelEditPost(this.dataset.postId)" class="fd-cancel-btn">Cancel</button>
                            <button th:data-post-id="${post.id}" onclick="saveEditPost(this.dataset.postId)" class="fd-submit-btn" style="padding:8px 20px;">💾 Save</button>
                        </div>
                    </div>

                    <div th:if="${post.imageUrl != null}" style="overflow:hidden;border-radius:0 0 6px 6px;">
                        <img th:src="${post.imageUrl}" class="fd-post-img" onclick="openImageModal(this.src)" alt="post image"/>
                    </div>

                    <div class="fd-post-footer">
                        <div th:id="${'like-' + post.id}">
                            <button class="fd-foot-btn"
                                    th:classappend="${initialLikedIds != null and #lists.contains(initialLikedIds, post.id.toString())} ? ' liked'"
                                    th:attr="data-post-id=${post.id}" onclick="toggleLike(this.dataset.postId)">
                                <span th:text="${initialLikedIds != null and #lists.contains(initialLikedIds, post.id.toString())} ? '❤️' : '🤍'">🤍</span>
                                <span th:text="${post.likesCount}">0</span>
                            </button>
                        </div>
                        <button class="fd-foot-btn" th:attr="data-post-id=${post.id}" onclick="toggleComments(this.dataset.postId)">
                            💬 <span th:id="${'ccount-' + post.id}" th:text="${post.commentsCount}">0</span>
                        </button>
                        <button class="fd-foot-btn"
                                th:attr="data-post-id=${post.id}, data-post-author=${post.author.fullName}, data-post-content=${post.getLocalizedContent('en')}, data-post-image=${post.imageUrl}"
                                onclick="openShareModal(this.dataset.postId, this.dataset.postAuthor, this.dataset.postContent, this.dataset.postImage)">
                            🔗 Share
                        </button>
                    </div>

                    <div th:id="${'comments-' + post.id}" class="fd-comments" style="display:none;"></div>
                    <div th:id="${'comment-row-' + post.id}" class="fd-comment-row" style="display:none;">
                        <input type="text" th:id="${'comment-input-' + post.id}" name="content"
                               th:placeholder="#{feed.comment.placeholder}" class="fd-comment-input"
                               th:attr="data-post-id=${post.id}"
                               onkeydown="if(event.key==='Enter') submitComment(this.dataset.postId)"/>
                        <button class="fd-comment-send" th:attr="data-post-id=${post.id}" onclick="submitComment(this.dataset.postId)">➤</button>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(initialPosts)}" class="fd-empty">
                    <div class="fd-empty-icon">💬</div>
                    <div class="fd-empty-title">Nothing here yet</div>
                    <div style="font-size:13px;color:#cbd5e1;">Be the first to share something! 🎉</div>
                </div>

                <div th:if="${initialNextPage > -1}"
                     th:attr="data-next-page=${initialNextPage}"
                     class="load-more-trigger fd-load-more"
                     style="display:flex;align-items:center;justify-content:center;padding:28px;">
                    <div class="fd-spinner"></div>
                </div>
            </div>
        </div>



    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    // ── Infinite scroll via IntersectionObserver (more reliable than hx-trigger) ──
    const _feedObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (!entry.isIntersecting) return;
            const trigger = entry.target;
            const page = parseInt(trigger.dataset.nextPage, 10);
            if (isNaN(page) || trigger.dataset.loading === 'true') return;

            trigger.dataset.loading = 'true';
            _feedObserver.unobserve(trigger);   // stop watching this one

            const type = trigger.dataset.type || '';
            const url  = '/feed/posts?page=' + page + (type ? '&type=' + type : '');

            fetch(url)
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    const feedList = document.getElementById('feed-list');
                    if (!feedList) return;

                    // Parse and insert each child of the fragment
                    const tmp = document.createElement('div');
                    tmp.innerHTML = html;
                    // fragment is wrapped in a <th:block> which becomes nothing;
                    // Thymeleaf returns children directly
                    const nodes = Array.from(tmp.childNodes);
                    trigger.remove();   // remove spinner FIRST

                    nodes.forEach(function(node) {
                        if (node.nodeType === Node.ELEMENT_NODE || node.nodeType === Node.TEXT_NODE) {
                            feedList.appendChild(node);
                        }
                    });

                    // Observe any new load-more trigger that appeared
                    _observeLoadMore();
                })
                .catch(function() {
                    trigger.dataset.loading = 'false';
                    _feedObserver.observe(trigger); // retry on next intersect
                });
        });
    }, { rootMargin: '200px' });

    function _observeLoadMore() {
        document.querySelectorAll('.fd-load-more[data-next-page]').forEach(function(el) {
            if (!el.dataset.loading) {
                _feedObserver.observe(el);
            }
        });
    }

    // Start observing on page load
    _observeLoadMore();
    function expandPostBox() {
        document.getElementById('postExpanded').style.display = 'block';
        document.getElementById('postContent').style.minHeight = '80px';
        document.getElementById('postContent').focus();
    }
    function cancelPost() {
        document.getElementById('postContent').value = '';
        document.getElementById('postContent').style.minHeight = '';
        document.getElementById('postExpanded').style.display = 'none';
        document.getElementById('imagePreviewWrap').style.display = 'none';
        document.getElementById('imagePreview').src = '';
        document.getElementById('postImage').value = '';
        document.getElementById('postError').style.display = 'none';
    }
    function previewImage(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = e => { document.getElementById('imagePreview').src = e.target.result; document.getElementById('imagePreviewWrap').style.display = 'block'; };
        reader.readAsDataURL(file);
    }
    function removeImage() {
        document.getElementById('imagePreview').src = '';
        document.getElementById('imagePreviewWrap').style.display = 'none';
        document.getElementById('postImage').value = '';
    }
    function setActiveTab(btn) {
        document.querySelectorAll('.fd-tab').forEach(b => b.classList.remove('active')); btn.classList.add('active');
    }
    async function loadFeedTab(btn, type) {
        setActiveTab(btn);
        const list = document.getElementById('feed-list');
        // Show spinner while loading
        list.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;padding:48px;"><div class="fd-spinner"></div></div>';

        const url = '/feed/posts?page=0' + (type ? '&type=' + type : '');
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const html = await res.text();

            const tmp = document.createElement('div');
            tmp.innerHTML = html;

            // Clear and re-populate feed-list with new nodes
            list.innerHTML = '';
            Array.from(tmp.childNodes).forEach(function(node) {
                if (node.nodeType === Node.ELEMENT_NODE || node.nodeType === Node.TEXT_NODE) {
                    // Tag load-more triggers with the current type so next pages stay filtered
                    if (node.nodeType === Node.ELEMENT_NODE && node.classList && node.classList.contains('fd-load-more')) {
                        if (type) node.dataset.type = type;
                    }
                    list.appendChild(node);
                }
            });

            // Start observing any load-more triggers in the new content
            _observeLoadMore();
        } catch(e) {
            list.innerHTML = '<div class="fd-empty"><div class="fd-empty-icon">⚠️</div><div class="fd-empty-title">Failed to load posts</div></div>';
        }
    }
    async function submitPost() {
        const content = document.getElementById('postContent').value.trim();
        if (!content) { showError('Post content cannot be empty.'); return; }
        const btn = document.getElementById('postSubmitBtn'); btn.disabled = true; btn.textContent = 'Posting…';
        const formData = new FormData();
        formData.append('content', content);
        formData.append('postType', document.getElementById('postType').value);
        const imgFile = document.getElementById('postImage').files[0];
        if (imgFile) formData.append('image', imgFile);
        try {
            const headers = {}; if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
            const res = await fetch('/feed/post/create', { method: 'POST', headers, body: formData });
            if (!res.ok) throw new Error('err');
            const html = await res.text();
            const list = document.getElementById('feed-list');
            const tmp = document.createElement('div'); tmp.innerHTML = html;
            list.insertBefore(tmp.firstElementChild, list.firstChild);
            if (window.htmx) htmx.process(list.firstElementChild);
            cancelPost();
        } catch (err) { showError('Failed to post. Please try again.'); }
        finally { btn.disabled = false; btn.textContent = '🚀 Post'; }
    }
    function showError(msg) {
        const el = document.getElementById('postError'); el.textContent = msg; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }
    async function toggleLike(postId) {
        const headers = {}; if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
        const res = await fetch('/feed/post/' + postId + '/like', {method: 'POST', headers});
        if (res.ok) { const html = await res.text(); const wrap = document.getElementById('like-' + postId); if (wrap) { wrap.outerHTML = html; if (window.htmx) htmx.process(document.getElementById('like-' + postId)); } }
    }
    function toggleComments(postId) {
        const section = document.getElementById('comments-' + postId);
        const row = document.getElementById('comment-row-' + postId);
        if (!section) return;
        const hidden = section.style.display === 'none';
        if (hidden && section.dataset.loaded !== 'true') {
            fetch('/feed/post/' + postId + '/comments').then(r=>r.text()).then(html=>{section.innerHTML=html;section.dataset.loaded='true';});
        }
        section.style.display = hidden ? 'block' : 'none';
        if (row) row.style.display = hidden ? 'flex' : 'none';
    }
    async function submitComment(postId) {
        const input = document.getElementById('comment-input-' + postId); if (!input) return;
        const content = input.value.trim(); if (!content) return;
        const headers = {'Content-Type': 'application/x-www-form-urlencoded'}; if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
        const res = await fetch('/feed/post/' + postId + '/comment', {method: 'POST', headers, body: 'content=' + encodeURIComponent(content)});
        if (!res.ok) return;
        const section = document.getElementById('comments-' + postId);
        if (section) section.insertAdjacentHTML('beforeend', await res.text());
        input.value = '';
        const ct = document.getElementById('ccount-' + postId); if (ct) ct.textContent = parseInt(ct.textContent||'0')+1;
    }
    function togglePostMenu(btn) {
        const dd = btn.nextElementSibling;
        const open = dd.style.display === 'block';
        document.querySelectorAll('.fd-dropdown').forEach(d => d.style.display = 'none');
        dd.style.display = open ? 'none' : 'block';
        event.stopPropagation();
    }
    document.addEventListener('click', () => document.querySelectorAll('.fd-dropdown').forEach(d => d.style.display = 'none'));
    function startEditPost(id) {
        document.querySelectorAll('.fd-dropdown').forEach(d => d.style.display = 'none');
        document.getElementById('post-view-' + id).style.display = 'none';
        const ed = document.getElementById('post-edit-' + id); ed.style.display = 'block';
        const ta = document.getElementById('post-edit-txt-' + id); ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
    }
    function cancelEditPost(id) {
        document.getElementById('post-view-' + id).style.display = 'block';
        document.getElementById('post-edit-' + id).style.display = 'none';
    }
    async function saveEditPost(id) {
        const txt = document.getElementById('post-edit-txt-' + id).value.trim(); if (!txt) return;
        const headers = {'Content-Type': 'application/x-www-form-urlencoded'}; if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
        const res = await fetch('/feed/post/' + id + '/edit', {method: 'POST', headers, body: 'content=' + encodeURIComponent(txt)});
        if (res.ok) { const html = await res.text(); const card = document.getElementById('post-' + id); if (card) card.outerHTML = html; }
    }
    async function deletePostAction(id) {
        if (!confirm('Delete this post?')) return;
        const headers = {}; if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
        const res = await fetch('/feed/post/' + id, {method: 'DELETE', headers});
        if (res.ok) { const card = document.getElementById('post-' + id); if (card) { card.style.cssText='opacity:0;transform:scale(0.97);transition:all 0.3s;'; setTimeout(()=>card.remove(),300); } }
    }
    async function togglePinPost(btn) {
        document.querySelectorAll('.fd-dropdown').forEach(d => d.style.display='none');
        const id = btn.dataset.postId;
        const headers = {'Content-Type':'application/json'}; if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
        try {
            const res = await fetch('/feed/post/' + id + '/pin', {method:'POST', headers});
            if (!res.ok) { showFeedToast('Pin failed ❌'); return; }
            const data = await res.json();
            const card = document.getElementById('post-' + id);
            if (!card) return;
            // Update pinned badge visibility
            let badge = card.querySelector('.fd-pin-badge');
            if (data.pinned) {
                card.classList.add('post-pinned');
                if (!badge) {
                    badge = document.createElement('div');
                    badge.className = 'fd-pin-badge';
                    badge.textContent = '📌 Pinned';
                    card.prepend(badge);
                }
                // Update button text
                const span = btn.querySelector('span') || btn;
                span.textContent = '📌 Unpin post';
                btn.dataset.pinned = 'true';
                showFeedToast('Post pinned! 📌');
            } else {
                card.classList.remove('post-pinned');
                if (badge) badge.remove();
                const span = btn.querySelector('span') || btn;
                span.textContent = '📌 Pin post';
                btn.dataset.pinned = 'false';
                showFeedToast('Post unpinned');
            }
        } catch(e) { showFeedToast('Pin failed ❌'); }
    }
    function openImageModal(src) {
        let m = document.getElementById('imgModal');
        if (!m) {
            m = document.createElement('div'); m.id='imgModal';
            m.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,0.85);backdrop-filter:blur(12px);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out;';
            m.innerHTML='<img style="max-width:92vw;max-height:92vh;border-radius:16px;box-shadow:0 0 80px rgba(0,0,0,0.4);"/>';
            m.onclick=()=>m.remove(); document.body.appendChild(m);
        }
        m.querySelector('img').src=src; m.style.display='flex';
    }
</script>

<!-- ── Share Post Modal ──────────────────────────────────────── -->
<div id="share-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:18px;width:420px;max-width:95vw;box-shadow:0 24px 72px rgba(0,0,0,.2);overflow:hidden;display:flex;flex-direction:column;max-height:90vh;">

        <!-- Header -->
        <div style="padding:18px 20px 14px;border-bottom:1.5px solid #f0f2f8;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
            <span style="font-family:Montserrat,sans-serif;font-weight:800;font-size:15px;color:#1b2a6b;">🔗 Share Post</span>
            <button onclick="closeShareModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#aaa;">✕</button>
        </div>

        <!-- Search input -->
        <div style="padding:12px 16px 8px;flex-shrink:0;">
            <div style="position:relative;">
                <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;"
                     width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#8a91a8" stroke-width="2.2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="share-user-search" type="text" th:placeholder="#{feed.share.search}"
                       autocomplete="off"
                       oninput="shareUserDebounce(this.value)"
                       style="width:100%;padding:9px 12px 9px 34px;border:1.5px solid #e0e3ef;border-radius:10px;
                              font-family:Montserrat,sans-serif;font-size:13px;outline:none;
                              box-sizing:border-box;transition:border-color .2s;"
                       onfocus="this.style.borderColor='#1b2a6b'"
                       onblur="this.style.borderColor='#e0e3ef'"/>
            </div>
        </div>

        <!-- User search results (shown when typing) -->
        <div id="share-user-results" style="display:none;overflow-y:auto;padding:0 8px 6px;max-height:200px;"></div>

        <!-- My Chats label + list -->
        <div id="share-chats-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
            <div style="padding:4px 16px 6px;flex-shrink:0;">
                <span style="font-family:Montserrat,sans-serif;font-weight:700;font-size:11px;
                             color:#8a91a8;text-transform:uppercase;letter-spacing:.05em;">My Chats</span>
            </div>
            <div id="share-rooms-list" style="flex:1;overflow-y:auto;padding:0 8px 10px;max-height:220px;"></div>
        </div>

        <!-- Copy link -->
        <div style="padding:10px 16px 14px;border-top:1.5px solid #f0f2f8;flex-shrink:0;">
            <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:11px;color:#8a91a8;
                        text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Or copy link</div>
            <div style="display:flex;gap:8px;">
                <input id="share-link-input" type="text" readonly
                       style="flex:1;padding:9px 12px;border:1.5px solid #e0e3ef;border-radius:10px;font-size:13px;color:#555;outline:none;font-family:Open Sans,sans-serif;"/>
                <button onclick="copyShareLink()"
                        style="padding:9px 16px;background:#1b2a6b;color:#fff;border:none;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">Copy</button>
            </div>
        </div>
    </div>
</div>
<style>
    .share-hint { padding:22px 12px;text-align:center;color:#8a91a8;
        font-size:13px;font-family:Montserrat,sans-serif; }
    .share-user-row { display:flex;align-items:center;gap:11px;padding:9px 12px;
        border-radius:10px;cursor:pointer;transition:background .13s; }
    .share-user-row:hover { background:#f0f2f8; }
    .su-avatar { width:40px;height:40px;border-radius:50%;object-fit:cover;
        border:2px solid #e8eaf6;flex-shrink:0; }
    .su-avatar-init { width:40px;height:40px;border-radius:50%;flex-shrink:0;
        background:linear-gradient(135deg,#1b2a6b,#2d4a9e);color:#fff;
        display:flex;align-items:center;justify-content:center;
        font-weight:700;font-size:16px;font-family:Montserrat,sans-serif; }
    .su-name  { font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;
        color:#1b2a6b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .su-meta  { display:flex;align-items:center;gap:6px;margin-top:2px; }
    .su-role  { padding:2px 7px;border-radius:20px;font-size:10px;
        font-family:Montserrat,sans-serif;font-weight:700;color:#555; }
    .su-email { font-size:11px;color:#8a91a8;overflow:hidden;text-overflow:ellipsis; }
    .su-send  { margin-left:auto;flex-shrink:0;font-size:11px;font-family:Montserrat,sans-serif;
        font-weight:700;color:#1b2a6b;background:#f0f2f8;padding:4px 10px;border-radius:8px; }
    .share-room-row { display:flex;align-items:center;gap:10px;padding:9px 12px;
        border-radius:10px;cursor:pointer;transition:background .13s; }
    .share-room-row:hover { background:#f0f2f8; }
</style>

<script th:inline="javascript">
    /*<![CDATA[*/
    // ── SHARE MODAL ──────────────────────────────────────────────
    let _sharePostId = null, _shareAuthor = null, _shareContent = null, _shareImageUrl = null;
    const SHARE_CSRF_TOKEN  = /*[[${_csrf != null ? _csrf.token : ''}]]*/ '';
    const SHARE_CSRF_HEADER = /*[[${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}]]*/ 'X-CSRF-TOKEN';

    const ROLE_BG = { STUDENT:'#e8f4fd', TEACHER:'#e8f5e9', MEZUN:'#fff3e0',
        ADMIN:'#fce4ec', SUPERADMIN:'#f3e5f5', SECRETARY:'#e0f7fa' };

    function openShareModal(postId, author, content, imageUrl) {
        _sharePostId  = postId;
        _shareAuthor  = author;
        _shareContent = content;
        _shareImageUrl = imageUrl || null;

        document.getElementById('share-link-input').value = window.location.origin + '/feed/post/' + postId;

        // Reset search
        document.getElementById('share-user-search').value = '';
        document.getElementById('share-user-results').style.display = 'none';
        document.getElementById('share-user-results').innerHTML = '';
        document.getElementById('share-chats-section').style.display = 'flex';

        loadShareRooms();
        document.getElementById('share-modal').style.display = 'flex';
        setTimeout(() => document.getElementById('share-user-search').focus(), 80);
    }

    function closeShareModal() {
        document.getElementById('share-modal').style.display = 'none';
    }
    document.getElementById('share-modal').addEventListener('click', function(e) {
        if (e.target === this) closeShareModal();
    });

    // ── USER SEARCH ───────────────────────────────────────────────
    let _suTimer = null;

    function shareUserDebounce(val) {
        clearTimeout(_suTimer);
        const res   = document.getElementById('share-user-results');
        const chats = document.getElementById('share-chats-section');

        if (val.trim().length < 2) {
            res.style.display = 'none';
            res.innerHTML = '';
            chats.style.display = 'flex';
            return;
        }
        // Show results area, hide rooms while searching
        res.style.display = 'block';
        res.innerHTML = '<div class="share-hint">Searching…</div>';
        chats.style.display = 'none';
        _suTimer = setTimeout(() => shareUserSearch(val.trim()), 300);
    }

    async function shareUserSearch(q) {
        const res = document.getElementById('share-user-results');
        try {
            const r = await fetch('/chat/users/search?q=' + encodeURIComponent(q),
                { headers: { [SHARE_CSRF_HEADER]: SHARE_CSRF_TOKEN } });
            const users = await r.json();
            if (!users.length) {
                res.innerHTML = '<div class="share-hint">No users found for "' + escHtml(q) + '"</div>';
                return;
            }
            res.innerHTML = users.map(u => {
                const init  = (u.fullName || '?').charAt(0).toUpperCase();
                const av    = u.avatarUrl
                    ? `<img src="${escHtml(u.avatarUrl)}" class="su-avatar" alt="av"/>`
                    : `<div class="su-avatar-init">${escHtml(init)}</div>`;
                const roleBg = ROLE_BG[u.role] || '#f0f2f8';
                return `<div class="share-user-row" onclick="shareToUser('${escHtml(String(u.id))}')">
                    ${av}
                    <div style="flex:1;min-width:0;">
                        <div class="su-name">${escHtml(u.fullName)}</div>
                        <div class="su-meta">
                            <span class="su-role" style="background:${roleBg};">${escHtml(u.role)}</span>
                            <span class="su-email">${escHtml(u.email)}</span>
                        </div>
                    </div>
                    <span class="su-send">Send</span>
                </div>`;
            }).join('');
        } catch(e) {
            res.innerHTML = '<div class="share-hint" style="color:#e74c3c;">Error — please try again</div>';
        }
    }

    async function shareToUser(userId) {
        closeShareModal();
        try {
            const dmRes = await fetch('/chat/direct/' + userId, {
                method: 'POST',
                headers: { [SHARE_CSRF_HEADER]: SHARE_CSRF_TOKEN }
            });
            const roomUrl = dmRes.url;
            const match = roomUrl.match(/\/chat\/room\/([a-f0-9-]+)/i);
            if (match) {
                const roomId = match[1];
                await fetch('/chat/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [SHARE_CSRF_HEADER]: SHARE_CSRF_TOKEN },
                    body: JSON.stringify({ roomId, postId: _sharePostId })
                });
                showFeedToast('Shared! Opening chat… 🔗');
                setTimeout(() => window.location.href = '/chat/room/' + roomId, 700);
            } else {
                showFeedToast('Share failed ❌');
            }
        } catch(e) { showFeedToast('Share failed ❌'); }
    }

    // ── ROOMS LIST ─────────────────────────────────────────────────
    async function loadShareRooms() {
        const list = document.getElementById('share-rooms-list');
        list.innerHTML = '<div class="share-hint">Loading…</div>';
        try {
            const res = await fetch('/chat/rooms', { headers: { [SHARE_CSRF_HEADER]: SHARE_CSRF_TOKEN } });
            const rooms = await res.json();
            if (!rooms.length) {
                list.innerHTML = '<div class="share-hint">No chats yet</div>';
                return;
            }
            list.innerHTML = rooms.map(room => {
                const emoji = room.roomType === 'DIRECT' ? '👤' : (room.roomType === 'FACULTY' ? '🏫' : (room.roomType === 'GLOBAL' ? '🌍' : '👥'));
                return `<div class="share-room-row" onclick="shareToRoom('${escHtml(String(room.id))}')">
                    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);
                                color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${emoji}</div>
                    <div style="font-family:Montserrat,sans-serif;font-weight:600;font-size:13px;color:#1b2a6b;
                                flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(room.name || 'Chat')}</div>
                    <span style="font-size:11px;font-family:Montserrat,sans-serif;font-weight:700;
                                 color:#1b2a6b;background:#f0f2f8;padding:4px 10px;border-radius:8px;flex-shrink:0;">Send</span>
                </div>`;
            }).join('');
        } catch(e) {
            list.innerHTML = '<div class="share-hint" style="color:#e74c3c;">Could not load chats</div>';
        }
    }

    async function shareToRoom(roomId) {
        closeShareModal();
        try {
            const res = await fetch('/chat/share', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', [SHARE_CSRF_HEADER]: SHARE_CSRF_TOKEN },
                body: JSON.stringify({ roomId, postId: _sharePostId })
            });
            if (res.ok) {
                showFeedToast('Shared to chat! 🔗');
                setTimeout(() => window.location.href = '/chat/room/' + roomId, 600);
            }
        } catch(e) { showFeedToast('Share failed ❌'); }
    }

    function copyShareLink() {
        const input = document.getElementById('share-link-input');
        navigator.clipboard.writeText(input.value).then(() => {
            showFeedToast('Link copied! 📋');
            closeShareModal();
        }).catch(() => { input.select(); document.execCommand('copy'); });
    }

    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function showFeedToast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(27,42,107,.92);color:#fff;padding:10px 22px;border-radius:30px;font-family:Montserrat,sans-serif;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.25);pointer-events:none;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    /*]]>*/
</script>

</body>
</html>
