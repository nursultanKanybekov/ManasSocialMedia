<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head(#{nav.mezun})}"></head>
<style>
    /* ══════════════════════════════════════════════════════
       ALUMNI CATALOG — Mobile-first redesign
       Desktop keeps the table. Mobile gets card layout.
    ══════════════════════════════════════════════════════ */

    /* ── Page header ── */
    .al-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 22px;
        gap: 12px;
        flex-wrap: wrap;
    }
    .al-header-title {
        font-family: Montserrat, sans-serif;
        font-weight: 900;
        font-size: 22px;
        color: #1b2a6b;
        margin: 0 0 4px;
    }
    .al-header-sub {
        color: #8a91a8;
        font-size: 13px;
        margin: 0;
    }
    .al-total {
        font-family: Montserrat, sans-serif;
        font-size: 13px;
        color: #8a91a8;
        background: white;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1.5px solid #e0e3ef;
        align-self: center;
        white-space: nowrap;
    }
    .al-total strong { color: #1b2a6b; }

    /* ── Filter card ── */
    .al-filters {
        background: white;
        border-radius: 16px;
        padding: 18px 20px;
        box-shadow: 0 2px 12px rgba(27,42,107,0.08);
        margin-bottom: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-end;
        border: 1.5px solid #f0f2f8;
    }
    .al-filter-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    .al-filter-group.grow { flex: 1; min-width: 160px; }
    .al-filter-group.fixed { min-width: 190px; }
    .al-filter-group.sm   { min-width: 110px; }
    .al-filter-label {
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 10px;
        color: #8a91a8;
        text-transform: uppercase;
        letter-spacing: 0.6px;
    }
    .al-filter-input,
    .al-filter-select {
        padding: 9px 12px;
        border: 1.5px solid #e0e3ef;
        border-radius: 9px;
        font-size: 13px;
        font-family: Montserrat, sans-serif;
        color: #1b2a6b;
        background: #fafbff;
        transition: border-color .18s, box-shadow .18s;
        width: 100%;
        box-sizing: border-box;
    }
    .al-filter-input:focus,
    .al-filter-select:focus {
        outline: none;
        border-color: #1b2a6b;
        box-shadow: 0 0 0 3px rgba(27,42,107,0.07);
    }
    .al-filter-actions {
        display: flex;
        gap: 8px;
        align-items: flex-end;
    }
    .al-btn-search {
        padding: 10px 20px;
        background: #1b2a6b;
        color: white;
        border: none;
        border-radius: 9px;
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: background .15s, transform .1s;
        white-space: nowrap;
    }
    .al-btn-search:hover { background: #2d43a6; transform: translateY(-1px); }
    .al-btn-reset {
        padding: 10px 14px;
        background: #f0f2f8;
        color: #1b2a6b;
        border-radius: 9px;
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 13px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        transition: background .15s;
    }
    .al-btn-reset:hover { background: #e0e3ef; }

    /* ── SORT LINKS ── */
    .sort-link {
        color: white;
        text-decoration: none;
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .sort-link:hover { color: #ffd700; }
    .sort-arrow { font-size: 9px; }

    /* ══ DESKTOP TABLE ══ */
    .mezun-table-wrap {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 2px 16px rgba(27,42,107,0.09);
        border: 1.5px solid #f0f2f8;
    }
    .mezun-table {
        width: 100%;
        border-collapse: collapse;
    }
    .mezun-table thead tr { background: linear-gradient(135deg, #1b2a6b, #2d43a6); }
    .mezun-table thead th {
        padding: 13px 16px;
        color: white;
        font-family: Montserrat, sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-align: left;
        white-space: nowrap;
    }
    .mezun-table tbody tr {
        border-bottom: 1px solid #f0f2f8;
        transition: background .13s;
    }
    .mezun-table tbody tr:last-child { border-bottom: none; }
    .mezun-table tbody tr:hover { background: #f7f8fc; }
    .mezun-table td {
        padding: 12px 16px;
        font-family: Montserrat, sans-serif;
        font-size: 13px;
        color: #2c3e50;
        vertical-align: middle;
    }
    .avatar-sm {
        width: 38px; height: 38px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #e0e3ef;
        display: block;
    }
    .faculty-badge {
        font-size: 10px;
        padding: 3px 9px;
        background: #e8ecf8;
        color: #1b2a6b;
        border-radius: 20px;
        font-weight: 700;
        font-family: Montserrat, sans-serif;
        white-space: nowrap;
    }
    .pts-badge {
        font-size: 12px;
        font-weight: 800;
        color: #c0392b;
        font-family: Montserrat, sans-serif;
    }
    .btn-chat {
        background: #1b2a6b;
        color: white;
        border: none;
        padding: 6px 13px;
        border-radius: 7px;
        font-family: Montserrat, sans-serif;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        transition: background .13s;
    }
    .btn-chat:hover { background: #2d43a6; }
    .btn-view {
        background: #f0f2f8;
        color: #1b2a6b;
        border: none;
        padding: 6px 13px;
        border-radius: 7px;
        font-family: Montserrat, sans-serif;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: background .13s;
    }
    .btn-view:hover { background: #dde2f0; }
    .action-cell { display: flex; gap: 6px; align-items: center; }

    /* ══ MOBILE CARDS ══ */
    .mezun-cards { display: none; flex-direction: column; gap: 12px; }

    .mezun-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(27,42,107,0.08);
        border: 1.5px solid #f0f2f8;
        overflow: hidden;
        transition: box-shadow .18s, transform .18s;
    }
    .mezun-card:active { transform: scale(0.99); }

    .mezun-card-top {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px 16px 12px;
    }
    .mezun-card-avatar {
        width: 52px; height: 52px;
        border-radius: 50%;
        object-fit: cover;
        border: 2.5px solid #e0e3ef;
        flex-shrink: 0;
        display: block;
    }
    .mezun-card-info { flex: 1; min-width: 0; }
    .mezun-card-name {
        font-family: Montserrat, sans-serif;
        font-weight: 800;
        font-size: 15px;
        color: #1b2a6b;
        text-decoration: none;
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 3px;
    }
    .mezun-card-name:hover { color: #c0392b; }
    .mezun-card-headline {
        font-size: 12px;
        color: #8a91a8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
    }
    .mezun-card-pts {
        font-family: Montserrat, sans-serif;
        font-weight: 800;
        font-size: 13px;
        color: #c0392b;
        white-space: nowrap;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .mezun-card-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding: 0 16px 12px;
    }
    .mezun-tag {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 20px;
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        white-space: nowrap;
    }
    .mezun-tag--faculty { background: #e8ecf8; color: #1b2a6b; }
    .mezun-tag--year    { background: #fce4ec; color: #c0392b; }
    .mezun-tag--empty   { color: #ccc; font-style: italic; font-weight: 400; }

    .mezun-card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        border-top: 1.5px solid #f0f2f8;
    }
    .mezun-card-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px;
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 13px;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: background .15s;
    }
    .mezun-card-btn--view {
        color: #1b2a6b;
        background: transparent;
        border-right: 1.5px solid #f0f2f8;
    }
    .mezun-card-btn--view:hover { background: #f7f8fc; }
    .mezun-card-btn--chat {
        color: white;
        background: #1b2a6b;
        border-bottom-right-radius: 14px;
    }
    .mezun-card-btn--chat:hover { background: #2d43a6; }

    /* ══ PAGINATION ══ */
    .al-pagination {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 22px;
        flex-wrap: wrap;
    }
    .al-page-link {
        padding: 8px 14px;
        background: white;
        border: 1.5px solid #e0e3ef;
        border-radius: 9px;
        font-family: Montserrat, sans-serif;
        font-weight: 700;
        font-size: 12px;
        color: #1b2a6b;
        text-decoration: none;
        transition: background .13s, border-color .13s;
        min-width: 38px;
        text-align: center;
        display: inline-block;
    }
    .al-page-link:hover { background: #e8ecf8; border-color: #1b2a6b; }
    .al-page-link--active {
        background: #1b2a6b !important;
        color: white !important;
        border-color: #1b2a6b !important;
    }

    /* ══ EMPTY STATE ══ */
    .al-empty {
        background: white;
        border-radius: 16px;
        padding: 56px 24px;
        text-align: center;
        box-shadow: 0 2px 12px rgba(27,42,107,0.08);
    }
    .al-empty-icon { font-size: 48px; margin-bottom: 16px; }
    .al-empty-title {
        font-family: Montserrat, sans-serif;
        font-weight: 800;
        color: #1b2a6b;
        font-size: 18px;
        margin-bottom: 8px;
    }
    .al-empty-sub { color: #8a91a8; font-size: 13px; }

    /* ══ RESPONSIVE BREAKPOINTS ══ */

    /* Tablet: hide less important columns */
    @media (max-width: 900px) {
        .mezun-table .col-profession { display: none; }
    }

    @media (max-width: 700px) {
        /* Switch from table to cards */
        .mezun-table-wrap { display: none; }
        .mezun-cards { display: flex; }

        .al-filters { padding: 14px; gap: 10px; }
        .al-filter-group.fixed { min-width: 140px; }
        .al-filter-group.sm { min-width: 90px; }
        .al-filter-actions { width: 100%; }
        .al-btn-search { flex: 1; justify-content: center; }
        .al-btn-reset  { flex-shrink: 0; }

        .al-header { flex-direction: column; gap: 8px; }
        .al-total { align-self: flex-start; }
    }

    @media (max-width: 420px) {
        .al-filters { gap: 8px; }
        .al-filter-group.grow,
        .al-filter-group.fixed,
        .al-filter-group.sm { min-width: 100%; }
        .mezun-card-top { gap: 10px; }
        .mezun-card-avatar { width: 44px; height: 44px; }
        .mezun-card-name { font-size: 14px; }
    }
</style>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">

    <!-- ── Header ── -->
    <div class="al-header">
        <div>
            <h1 class="al-header-title" th:text="#{mezun.catalog.title}">Alumni Catalog</h1>
            <p class="al-header-sub" th:text="#{mezun.catalog.subtitle}">Connect with Manas graduates worldwide</p>
        </div>
        <div th:if="${mezunPage != null}" class="al-total">
            Total: <strong th:text="${mezunPage.totalElements}">0</strong> alumni
        </div>
    </div>

    <!-- ── Filters ── -->
    <form th:action="@{/mezun}" method="get" class="al-filters">
        <input type="hidden" name="sortBy"  th:value="${sortBy}"/>
        <input type="hidden" name="sortDir" th:value="${sortDir}"/>

        <div class="al-filter-group grow">
            <label class="al-filter-label" th:text="#{mezun.filter.name}">NAME / SURNAME</label>
            <input type="text" name="name" th:value="${searchName}"
                   class="al-filter-input" th:placeholder="#{mezun.filter.name_ph}"/>
        </div>
        <div class="al-filter-group fixed">
            <label class="al-filter-label" th:text="#{mezun.filter.faculty}">FACULTY</label>
            <select name="facultyId" class="al-filter-select">
                <option value="" th:text="#{mezun.filter.all_faculties}">All Faculties</option>
                <option th:each="f : ${faculties}" th:value="${f.id}" th:text="${f.name}"
                        th:selected="${selectedFaculty != null and selectedFaculty == f.id}">Faculty</option>
            </select>
        </div>
        <div class="al-filter-group sm">
            <label class="al-filter-label" th:text="#{mezun.filter.year}">YEAR</label>
            <input type="number" name="graduationYear" th:value="${selectedYear}"
                   min="1990" max="2030" class="al-filter-input" placeholder="2018"/>
        </div>
        <div class="al-filter-actions">
            <button type="submit" class="al-btn-search" th:text="#{mezun.filter.search}">Search</button>
            <a th:href="@{/mezun}" class="al-btn-reset" th:text="#{mezun.filter.reset}">Reset</a>
        </div>
    </form>

    <!-- ════════════════════ RESULTS ════════════════════ -->
    <div th:if="${mezunPage != null and not mezunPage.empty}">

        <!-- ── DESKTOP TABLE ── -->
        <div class="mezun-table-wrap">
            <table class="mezun-table">
                <thead>
                <tr>
                    <th style="width:46px;"></th>
                    <th>
                        <a th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy='name',sortDir=${sortBy=='name'?reverseSortDir:'asc'})}" class="sort-link">
                            Full Name
                            <span class="sort-arrow" th:if="${sortBy=='name'}" th:text="${sortDir=='asc'?'▲':'▼'}"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy='faculty',sortDir=${sortBy=='faculty'?reverseSortDir:'asc'})}" class="sort-link">
                            Faculty <span class="sort-arrow" th:if="${sortBy=='faculty'}" th:text="${sortDir=='asc'?'▲':'▼'}"></span>
                        </a>
                    </th>
                    <th>
                        <a th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy='year',sortDir=${sortBy=='year'?reverseSortDir:'asc'})}" class="sort-link">
                            Year <span class="sort-arrow" th:if="${sortBy=='year'}" th:text="${sortDir=='asc'?'▲':'▼'}"></span>
                        </a>
                    </th>
                    <th class="col-profession" th:text="#{mezun.col.profession}">Profession</th>
                    <th>
                        <a th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy='points',sortDir=${sortBy=='points'?reverseSortDir:'desc'})}" class="sort-link">
                            Points <span class="sort-arrow" th:if="${sortBy=='points'}" th:text="${sortDir=='asc'?'▲':'▼'}"></span>
                        </a>
                    </th>
                    <th th:text="#{mezun.col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${mezunPage.content}">
                    <td>
                        <img th:src="${u.profile != null and u.profile.avatarUrl != null ? u.profile.avatarUrl : '/images/default-avatar.svg'}"
                             class="avatar-sm" alt="avatar"/>
                    </td>
                    <td>
                        <a th:href="@{/mezun/{id}(id=${u.id})}" style="font-weight:700;color:#1b2a6b;text-decoration:none;" th:text="${u.fullName}">Name</a>
                    </td>
                    <td>
                        <span th:if="${u.faculty != null}" class="faculty-badge" th:text="${u.faculty.code}">ENG</span>
                        <span th:if="${u.faculty == null}" style="color:#ccc;">—</span>
                    </td>
                    <td>
                        <span th:if="${u.graduationYear != null}" th:text="${u.graduationYear}">2020</span>
                        <span th:if="${u.graduationYear == null}" style="color:#ccc;">—</span>
                    </td>
                    <td class="col-profession">
                        <span th:if="${u.profile != null and u.profile.headline != null}" style="font-size:12px;color:#5a6380;" th:text="${u.profile.headline}">Profession</span>
                        <span th:if="${u.profile == null or u.profile.headline == null}" style="color:#ccc;">—</span>
                    </td>
                    <td>
                        <span class="pts-badge" th:text="${(u.profile != null ? u.profile.totalPoints : 0) + ' pts'}">0 pts</span>
                    </td>
                    <td>
                        <div class="action-cell">
                            <a th:href="@{/mezun/{id}(id=${u.id})}" class="btn-view">View</a>
                            <form th:action="@{/chat/direct/{uid}(uid=${u.id})}" method="post" style="margin:0;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn-chat">💬 Chat</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ── MOBILE CARDS ── -->
        <div class="mezun-cards">
            <div th:each="u : ${mezunPage.content}" class="mezun-card">
                <div class="mezun-card-top">
                    <img th:src="${u.profile != null and u.profile.avatarUrl != null ? u.profile.avatarUrl : '/images/default-avatar.svg'}"
                         class="mezun-card-avatar" alt="avatar"/>
                    <div class="mezun-card-info">
                        <a th:href="@{/mezun/{id}(id=${u.id})}" class="mezun-card-name" th:text="${u.fullName}">Name</a>
                        <span class="mezun-card-headline"
                              th:text="${u.profile != null and u.profile.headline != null ? u.profile.headline : (u.faculty != null ? u.faculty.name : 'Alumni')}">Headline</span>
                    </div>
                    <div class="mezun-card-pts">
                        🏆 <span th:text="${u.profile != null ? u.profile.totalPoints : 0}">0</span>
                    </div>
                </div>

                <div class="mezun-card-tags">
                    <span th:if="${u.faculty != null}" class="mezun-tag mezun-tag--faculty" th:text="${u.faculty.code}">ENG</span>
                    <span th:if="${u.graduationYear != null}" class="mezun-tag mezun-tag--year" th:text="'Class of ' + ${u.graduationYear}">Class of 2020</span>
                    <span th:if="${u.faculty == null and u.graduationYear == null}" class="mezun-tag mezun-tag--empty">No info</span>
                </div>

                <div class="mezun-card-actions">
                    <a th:href="@{/mezun/{id}(id=${u.id})}" class="mezun-card-btn mezun-card-btn--view">
                        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        View Profile
                    </a>
                    <form th:action="@{/chat/direct/{uid}(uid=${u.id})}" method="post" style="margin:0;display:contents;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="mezun-card-btn mezun-card-btn--chat">
                            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                            </svg>
                            Message
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ── Pagination ── -->
        <div class="al-pagination" th:if="${mezunPage.totalPages > 1}">
            <a th:if="${not mezunPage.first}"
               th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy=${sortBy},sortDir=${sortDir},page=${mezunPage.number-1})}"
               class="al-page-link">← Prev</a>
            <span th:each="i : ${#numbers.sequence(0, mezunPage.totalPages-1)}">
                <a th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy=${sortBy},sortDir=${sortDir},page=${i})}"
                   th:text="${i+1}"
                   th:classappend="${i == mezunPage.number ? 'al-page-link--active' : ''}"
                   class="al-page-link">1</a>
            </span>
            <a th:if="${not mezunPage.last}"
               th:href="@{/mezun(name=${searchName},facultyId=${selectedFaculty},graduationYear=${selectedYear},sortBy=${sortBy},sortDir=${sortDir},page=${mezunPage.number+1})}"
               class="al-page-link" th:text="#{page.next}">Next →</a>
        </div>
    </div>

    <!-- ── Empty state ── -->
    <div th:if="${mezunPage == null or mezunPage.empty}" class="al-empty">
        <div class="al-empty-icon">🎓</div>
