<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="ManasMezun — Manas University Alumni Ecosystem"/>
    <title th:text="${title} + ' | ManasMezun'">ManasMezun</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&amp;family=Open+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

    <!-- App CSS -->
    <link rel="stylesheet" th:href="@{/css/app.css}"/>

    <!-- HTMX -->
    <script th:src="@{/js/htmx.min.js}"></script>

    <!-- App JS -->
    <script th:src="@{/js/app.js}"></script>

    <!-- CSRF tokens for fetch() and HTMX requests -->
    <meta name="_csrf"        th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}"/>

    <!-- Auto-inject CSRF into every HTMX request -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        (function () {
            var csrfToken  = /*[[${_csrf != null ? _csrf.token : ''}]]*/ '';
            var csrfHeader = /*[[${_csrf != null ? _csrf.headerName : 'X-CSRF-TOKEN'}]]*/ 'X-CSRF-TOKEN';
            if (csrfToken) {
                document.addEventListener('htmx:configRequest', function (e) {
                    e.detail.headers[csrfHeader] = csrfToken;
                });
            }
        })();
        /*]]>*/
    </script>

    <!-- WebSocket libs (only when needed) -->
    <th:block th:if="${includeChat}">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    </th:block>
</head>
</html>
