<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar">

    <!-- Brand -->
    <div class="navbar-brand" id="app-navbar-brand">
        <img th:src="@{/images/university_logo.png}" alt="Manas"
             onerror="this.style.display='none';document.getElementById('brand-fb').style.display='flex'"/>
        <div id="brand-fb" style="display:none" class="brand-logo-fallback">
            <span>M</span>
        </div>
        <div class="brand-name">Manas<span>Link</span></div>
    </div>

    <!-- Mobile burger -->
    <button class="burger-btn" onclick="toggleMobileSidebar()" aria-label="Menu">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <!-- Search -->
    <div class="navbar-search" sec:authorize="isAuthenticated()">
        <span class="search-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </span>
        <input type="text" th:placeholder="#{navbar.search.placeholder}" id="global-search"/>
    </div>

    <!-- Right side -->
    <div class="navbar-right">

        <!-- Language switcher -->
        <div class="lang-switcher" id="lang-switcher">
            <button class="lang-btn" id="lb-kg" onclick="setLang('kg')">KG</button>
            <button class="lang-btn" id="lb-ru" onclick="setLang('ru')">RU</button>
            <button class="lang-btn" id="lb-tr" onclick="setLang('tr')">TR</button>
            <button class="lang-btn" id="lb-en" onclick="setLang('en')">EN</button>
        </div>

        <!-- Notification bell -->
        <div sec:authorize="isAuthenticated()" class="notif-bell-wrap dropdown-wrap">
            <button class="icon-btn notif-bell-btn"
                    onclick="toggleDropdown('notif-dd'); loadNotifDropdown();"
                    title="Notifications">
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 01-3.46 0"/>
                </svg>
                <span id="notif-badge" class="notif-badge" style="display:none;"></span>
            </button>
            <div class="dropdown" id="notif-dd" style="min-width:320px;">
                <div class="dropdown-header">
                    <span th:text="#{notif.title}">Notifications</span>
                    <span class="mark-all" onclick="markAllNotifRead()" style="cursor:pointer;"
                          th:text="#{notif.mark_all}">Mark all read</span>
                </div>
                <div id="notif-dropdown-body">
                    <div style="padding:16px;text-align:center;color:var(--muted)">...</div>
                </div>
                <a th:href="@{/notifications}" class="notif-see-all" th:text="#{notif.see_all}">See all notifications</a>
            </div>
        </div>

        <script th:inline="none">
            /*<![CDATA[*/
            window._notifItems = window._notifItems || [];
            window.escH = function(s) {
                return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            };
            window.loadNotifications = function() {
                fetch('/notifications/api/list', {credentials: 'same-origin'})
                    .then(function(r){ if (!r.ok || r.redirected) return null; return r.json(); })
                    .then(function(data) {
                        if (!data) return;
                        window._notifItems = data.notifications || [];
                        var badge = document.getElementById('notif-badge');
                        if (!badge) return;
                        var count = data.unreadCount || 0;
                        if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.style.display = 'flex'; }
                        else badge.style.display = 'none';
                    }).catch(function(){});
            };
            window.loadNotifDropdown = function() {
                fetch('/notifications/api/list', {credentials: 'same-origin'})
                    .then(function(r){ if (!r.ok || r.redirected) return null; return r.json(); })
                    .then(function(data) {
                        if (!data) return;
                        window._notifItems = data.notifications || [];
                        window.renderNotifDropdown();
                    }).catch(function(){});
            };
            window.renderNotifDropdown = function() {
                var body = document.getElementById('notif-dropdown-body');
                if (!body) return;
                var items = window._notifItems;
                if (!items || items.length === 0) {
                    body.innerHTML = '<div style="padding:20px;text-align:center;color:#8a91a8;font-size:13px;">No new notifications</div>';
                    return;
                }
                var html = '';
                items.slice(0, 8).forEach(function(n) {
                    var link = window.escH(n.link || '#');
                    var bg   = n.isRead ? '' : 'background:#f0f4ff;border-left:3px solid #1B2A6B;';
                    var dot  = n.isRead ? '#ccc' : '#1B2A6B';
                    var fw   = n.isRead ? '400' : '600';
                    var id   = n.id ? window.escH(n.id) : '';
                    html += '<a href="' + link + '"'
                        + (id ? ' onclick="window.markNotifRead(event,\'' + id + '\')"' : '')
                        + ' style="' + bg + 'display:flex;align-items:flex-start;gap:10px;padding:12px 16px;text-decoration:none;border-bottom:1px solid #f0f2f8;color:inherit;">'
                        + '<span style="width:8px;height:8px;border-radius:50%;background:' + dot + ';margin-top:6px;flex-shrink:0;display:inline-block;"></span>'
                        + '<div style="flex:1;min-width:0;">'
                        + '<div style="font-size:11px;color:#8a91a8;margin-bottom:3px;">' + window.escH(n.icon||'🔔') + ' ' + window.escH(n.createdAt||'') + '</div>'
                        + '<div style="font-size:13px;color:#1B2A6B;font-weight:' + fw + ';line-height:1.45;word-break:break-word;">' + window.escH(n.message||'') + '</div>'
                        + '</div></a>';
                });
                body.innerHTML = html;
            };
            window.markNotifRead = function(e, id) {
                if (e) e.stopPropagation();
                if (!id) return;
                fetch('/notifications/' + id + '/read', {method:'POST', credentials:'same-origin'}).then(function() {
                    window._notifItems.forEach(function(n){ if(n.id===id) n.isRead=true; });
                    var unread = window._notifItems.filter(function(n){return !n.isRead;}).length;
                    var badge = document.getElementById('notif-badge');
                    if (badge) {
                        if (unread > 0) { badge.textContent = unread; badge.style.display = 'flex'; }
                        else badge.style.display = 'none';
                    }
                }).catch(function(){});
            };
            window.markAllNotifRead = function() {
                fetch('/notifications/mark-all-read', {method:'POST', credentials:'same-origin'}).then(function() {
                    window._notifItems.forEach(function(n){ n.isRead=true; });
                    var badge = document.getElementById('notif-badge');
                    if (badge) badge.style.display = 'none';
                    window.renderNotifDropdown();
                }).catch(function(){});
            };
            document.addEventListener('manasNotification', function(e) {
                var d = e.detail || {};
                window._notifItems.unshift({ id: null, icon: d.icon||'🔔', message: d.message||'', link: d.link||'#', isRead: false,
                    createdAt: new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) });
                window.renderNotifDropdown();
                var badge = document.getElementById('notif-badge');
                if (badge) { var cur = parseInt(badge.textContent)||0; badge.textContent = cur+1; badge.style.display='flex'; }
            });
            (function init() {
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', function() { window.loadNotifications(); setInterval(window.loadNotifications, 30000); });
                } else { window.loadNotifications(); setInterval(window.loadNotifications, 30000); }
            })();
            /*]]>*/
        </script>

        <!-- Timetable shortcut -->
        <a th:href="@{/timetable}" class="icon-btn"
           sec:authorize="hasAnyRole('ROLE_STUDENT','ROLE_MEZUN','ROLE_ADMIN','ROLE_SUPER_ADMIN')"
           title="Timetable">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </a>

        <!-- Chat shortcut -->
        <a th:href="@{/chat}" class="icon-btn" sec:authorize="isAuthenticated()" title="Chat">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
        </a>

        <!-- User menu -->
        <div sec:authorize="isAuthenticated()" class="dropdown-wrap">
            <button class="avatar-btn" onclick="toggleDropdown('av-dd')">
                <div class="avatar-circle" id="nav-avatar">
                    <img th:if="${#authentication.principal.avatarUrl != null}"
                         th:src="${#authentication.principal.avatarUrl}" alt="avatar"/>
                    <span th:unless="${#authentication.principal.avatarUrl != null}"
                          th:text="${#strings.substring(#authentication.principal.fullName, 0, 2).toUpperCase()}">UN</span>
                </div>
                <div class="avatar-info">
                    <div class="av-name" th:text="${#strings.abbreviate(#authentication.principal.fullName, 18)}">User</div>
                    <div class="av-role" th:text="${#authentication.principal.role}">STUDENT</div>
                </div>
                <svg class="avatar-chevron" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6,9 12,15 18,9"/>
                </svg>
            </button>
            <div class="dropdown avatar-dropdown" id="av-dd">
                <div class="av-profile-row">
                    <div class="av-big">
                        <img th:if="${#authentication.principal.avatarUrl != null}"
                             th:src="${#authentication.principal.avatarUrl}" alt="avatar"/>
                        <span th:unless="${#authentication.principal.avatarUrl != null}"
                              th:text="${#strings.substring(#authentication.principal.fullName, 0, 2).toUpperCase()}">UN</span>
                    </div>
                    <div class="av-detail">
                        <strong th:text="${#authentication.principal.fullName}">Full Name</strong>
                        <span th:text="${#authentication.principal.role}">STUDENT</span>
                    </div>
                </div>
                <a th:href="@{/profile/{id}(id=${#authentication.principal.id})}" class="av-menu-item">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    <span th:text="#{nav.my_profile}">My Profile</span>
                </a>
                <a th:href="@{/profile/me/edit}" class="av-menu-item">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                    </svg>
                    <span th:text="#{nav.settings}">Settings</span>
                </a>
                <a th:href="@{/notifications}" class="av-menu-item">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 01-3.46 0"/>
                    </svg>
                    <span th:text="#{nav.notifications}">Notifications</span>
                </a>
                <form th:action="@{/auth/logout}" method="post" style="display:contents">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="av-menu-item logout">
                        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                            <polyline points="16,17 21,12 16,7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        <span th:text="#{nav.logout}">Logout</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Login (not authenticated) -->
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/auth/login}" class="btn btn-primary btn-sm" th:text="#{nav.login}">Login</a>
        </div>

    </div>

    <!-- ═══════════════════════════════════════════
         Google Translate — hidden widget container
         Placed outside nav so it never leaks into it
    ═══════════════════════════════════════════════ -->

    <!-- Language switcher — uses Spring SessionLocaleResolver via ?lang= param -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        (function () {
            var currentLang = /*[[${#locale.language}]]*/ 'en';
            // Map locale code → button id suffix
            var codeMap = { 'en': 'en', 'ru': 'ru', 'tr': 'tr', 'ky': 'kg' };
            var activeCode = codeMap[currentLang] || 'en';

            function highlightActive() {
                ['en','ru','tr','kg'].forEach(function(l) {
                    var btn = document.getElementById('lb-' + l);
                    if (btn) btn.classList.toggle('active', l === activeCode);
                });
            }

            window.setLang = function(lang) {
                // lang is 'en','ru','tr','kg'
                var paramCode = (lang === 'kg') ? 'ky' : lang;
                // Add ?lang= to current URL, preserving existing path/query
                var url = new URL(window.location.href);
                url.searchParams.set('lang', paramCode);
                window.location.href = url.toString();
            };

            document.addEventListener('DOMContentLoaded', highlightActive);
        })();
        /*]]>*/
    </script>

</nav>
</body>
</html>
