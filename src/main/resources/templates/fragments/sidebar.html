<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="sidebar" class="sidebar" id="app-sidebar">

    <!-- Collapse toggle -->
    <div class="sidebar-collapse-btn">
        <button class="collapse-btn" onclick="toggleSidebarCollapse()" title="Toggle sidebar">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <polyline points="15,18 9,12 15,6"/>
            </svg>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">

        <!-- MAIN -->
        <div class="nav-section-label">MAIN</div>
        <a th:href="@{/main}" class="sidebar-link" data-label="Home"
           th:classappend="${currentURI == '/main'} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                <polyline points="9,22 9,12 15,12 15,22"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.home}">Home</span>
        </a>
        <a th:href="@{/feed}" class="sidebar-link" data-label="Feed"
           th:classappend="${currentURI != null and currentURI.startsWith('/feed')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/>
                <line x1="12" y1="8" x2="16" y2="8"/><line x1="12" y1="12" x2="16" y2="12"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.feed}">Feed</span>
        </a>
        <a th:href="@{/university-news}" class="sidebar-link" data-label="University News"
           th:classappend="${currentURI != null and currentURI.startsWith('/university-news')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.university_news}">University News</span>
        </a>

        <!-- COMMUNITY -->
        <div class="nav-section-label">COMMUNITY</div>
        <a th:href="@{/mezun}" class="sidebar-link" data-label="Alumni"
           th:classappend="${currentURI != null and currentURI.startsWith('/mezun')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.mezun}">Alumni</span>
        </a>
        <a sec:authorize="isAuthenticated()"
           th:href="@{/profile/{id}(id=${#authentication.principal.id})}"
           class="sidebar-link" data-label="My Profile">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.my_profile}">My Profile</span>
        </a>
        <a th:href="@{/chat}" class="sidebar-link" data-label="Chat"
           th:classappend="${currentURI != null and currentURI.startsWith('/chat')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.chat}">Chat</span>
        </a>
        <a th:href="@{/channels}" class="sidebar-link" data-label="Channels"
           th:classappend="${currentURI != null and currentURI.startsWith('/channels')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07A19.5 19.5 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6z"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.channels}">Channels</span>
        </a>

        <!-- CAREER -->
        <div class="nav-section-label">CAREER</div>
        <a th:href="@{/career/jobs}" class="sidebar-link" data-label="Jobs"
           th:classappend="${currentURI != null and currentURI.startsWith('/career/jobs')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2"/>
                <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.career}">Jobs</span>
        </a>
        <a th:href="@{/career/mentorship}" class="sidebar-link" data-label="Mentorship"
           th:classappend="${currentURI != null and currentURI.startsWith('/career/mentorship')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/>
                <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.mentorship}">Mentorship</span>
        </a>
        <a th:href="@{/articles}" class="sidebar-link" data-label="Articles"
           th:classappend="${currentURI != null and currentURI.startsWith('/articles')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
                <line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.articles}">Articles</span>
        </a>

        <!-- EDUCATION -->
        <div class="nav-section-label">EDUCATION</div>
        <a th:href="@{/edu}" class="sidebar-link" data-label="Tutorials"
           th:classappend="${currentURI != null and currentURI.startsWith('/edu')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <polygon points="5,3 19,12 5,21"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.education}">Tutorials</span>
        </a>
        <a th:href="@{/gaming}" class="sidebar-link" data-label="Gamification"
           th:classappend="${currentURI != null and currentURI.startsWith('/gaming')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="2" y="6" width="20" height="12" rx="2"/>
                <path d="M12 12h.01M8 12h.01"/>
                <path d="M17 10v4M15 12h4"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.gamification}">Gamification</span>
        </a>
        <a th:href="@{/leaderboard}" class="sidebar-link" data-label="Rankings"
           th:classappend="${currentURI != null and currentURI.startsWith('/leaderboard')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/>
                <polyline points="17,6 23,6 23,12"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.leaderboard}">Rankings</span>
        </a>

        <!-- GAME ZONE -->
        <a th:href="@{/games}" class="sidebar-link" data-label="Game Zone"
           th:classappend="${currentURI != null and currentURI.startsWith('/games')} ? ' active'"
           style="position:relative">
            <span class="nav-icon">🎮</span>
            <span class="nav-label">Game Zone</span>
        </a>

        <!-- EVENTS -->
        <div class="nav-section-label">EVENTS</div>
        <a th:href="@{/competitions}" class="sidebar-link" data-label="Competitions"
           th:classappend="${currentURI != null and currentURI.startsWith('/competitions')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M8 21h8m-4-4v4M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.5l-4.9 2.7.9-5.5L4 8.8z"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.competitions}">Competitions</span>
        </a>
        <a th:href="@{/events}" class="sidebar-link" data-label="Events"
           th:classappend="${currentURI != null and currentURI.startsWith('/events')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.events}">Events</span>
        </a>

        <!-- ADMIN (role-based) -->
        <div sec:authorize="hasAnyRole('SECRETARY','ADMIN')" class="nav-section-label">ADMIN</div>
        <a sec:authorize="hasAnyRole('SECRETARY','ADMIN')"
           th:href="@{/secretary}" class="sidebar-link" data-label="Secretary"
           th:classappend="${currentURI != null and currentURI.startsWith('/secretary')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.secretary}">Secretary</span>
        </a>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin}" class="sidebar-link" data-label="Admin"
           th:classappend="${currentURI != null and currentURI.startsWith('/admin')} ? ' active'">
        <span class="nav-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
        </span>
            <span class="nav-label" th:text="#{nav.admin}">Admin</span>
        </a>
        <a th:href="@{/admin/news}" class="nav-item"
           sec:authorize="hasRole('ADMIN')"
           th:classappend="${currentURI != null and #strings.contains(currentURI, '/admin/news')} ? ' active'">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/>
            </svg>
            <span>University News</span>
        </a>
    </nav>

    <!-- Bottom user card -->
    <div class="sidebar-user" sec:authorize="isAuthenticated()">
        <div class="sidebar-avatar">
            <img th:if="${#authentication.principal.avatarUrl != null}"
                 th:src="${#authentication.principal.avatarUrl}" alt="avatar"/>
            <span th:unless="${#authentication.principal.avatarUrl != null}"
                  th:text="${#strings.substring(#authentication.principal.fullName, 0, 2).toUpperCase()}">UN</span>
        </div>
        <div class="sidebar-user-info">
            <strong th:text="${#authentication.principal.fullName}">Full Name</strong>
            <span th:text="${#authentication.principal.role}">STUDENT</span>
        </div>
    </div>

</aside>

<!-- Mobile overlay -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>
</body>
</html>
