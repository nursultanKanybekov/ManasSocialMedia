<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('AI Study Assistant')}"></head>
<body>
<div class="app-shell" id="app-shell">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main-content">
        <style>
            .ai-page{background:#F2F0EB;min-height:100vh;display:flex;flex-direction:column}
            .ai-hero{background:linear-gradient(135deg,#002366,#1a3f8f);color:#fff;padding:24px 28px 20px;position:relative;overflow:hidden;flex-shrink:0}
            .ai-hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 10px);pointer-events:none}
            .ai-hero-inner{position:relative;max-width:900px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
            .ai-hero h1{font-size:1.4rem;font-weight:700;margin:0 0 2px}
            .ai-hero p{font-size:.85rem;color:rgba(255,255,255,.72);margin:0}
            .course-selector{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 12px;font-size:.875rem;cursor:pointer;min-width:220px}
            .course-selector option{color:#111;background:#fff}
            .chat-wrap{max-width:900px;margin:0 auto;padding:20px 18px;flex:1;display:flex;flex-direction:column;min-height:0}
            .chat-box{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:4px 0 8px;min-height:300px;max-height:calc(100vh - 340px)}
            .msg{display:flex;gap:10px;align-items:flex-start}
            .msg.user{flex-direction:row-reverse}
            .msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem}
            .msg-avatar.ai{background:#eef2ff;color:#3730a3}
            .msg-avatar.user{background:#002366;color:#fff;font-size:.8rem;font-weight:700}
            .msg-bubble{max-width:75%;padding:12px 16px;border-radius:16px;font-size:.875rem;line-height:1.6;white-space:pre-wrap}
            .msg.ai .msg-bubble{background:#fff;border:1px solid #e8e4dc;border-radius:4px 16px 16px 16px;color:#222}
            .msg.user .msg-bubble{background:#002366;color:#fff;border-radius:16px 4px 16px 16px}
            .msg-bubble code{background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px;font-size:.82rem}
            .msg-bubble pre{background:rgba(0,0,0,.06);padding:10px;border-radius:8px;overflow-x:auto;font-size:.8rem}
            .typing{display:none;align-items:center;gap:4px;padding:8px 14px;background:#fff;border:1px solid #e8e4dc;border-radius:16px;width:fit-content}
            .typing span{width:7px;height:7px;background:#aaa;border-radius:50%;animation:bounce .9s infinite}
            .typing span:nth-child(2){animation-delay:.15s}
            .typing span:nth-child(3){animation-delay:.3s}
            @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
            .input-row{display:flex;gap:10px;margin-top:14px;align-items:flex-end}
            .chat-input{flex:1;border:1.5px solid #e8e4dc;border-radius:12px;padding:11px 16px;font-size:.9rem;resize:none;min-height:46px;max-height:120px;overflow-y:auto;outline:none;font-family:inherit;background:#fff;transition:border-color .2s}
            .chat-input:focus{border-color:#002366}
            .send-btn{background:#002366;color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:.9rem;font-weight:600;cursor:pointer;flex-shrink:0;transition:opacity .2s}
            .send-btn:hover{opacity:.88}
            .send-btn:disabled{opacity:.4;cursor:default}
            .clear-btn{background:#fff;border:1.5px solid #e8e4dc;color:#666;border-radius:10px;padding:10px 14px;font-size:.82rem;cursor:pointer;flex-shrink:0}
            .clear-btn:hover{border-color:#999}
            .empty-hint{text-align:center;padding:40px 20px;color:#aaa;font-size:.875rem}
            .empty-hint .icon{font-size:2.5rem;margin-bottom:10px}
            .course-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:.78rem;white-space:nowrap}
        </style>

        <div class="ai-page">
            <div class="ai-hero">
                <div class="ai-hero-inner">
                    <div style="flex:1">
                        <h1>🤖 AI Study Assistant</h1>
                        <p>Ask anything about your course — explanations, examples, study tips</p>
                    </div>
                    <div>
                        <label style="font-size:.72rem;color:rgba(255,255,255,.7);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em">Course</label>
                        <select class="course-selector" id="courseSelect" onchange="selectCourse(this)">
                            <option value="" data-name="General Studies" data-desc="">📚 General (no course selected)</option>
                            <!-- STUDENT: enrolled courses -->
                            <optgroup label="My Courses" sec:authorize="hasRole('ROLE_STUDENT')"
                                      th:if="${!enrollments.isEmpty()}">
                                <option th:each="e : ${enrollments}"
                                        th:value="${e.course.id}"
                                        th:data-name="${e.course.name}"
                                        th:data-code="${e.course.code}"
                                        th:data-desc="${e.course.description != null ? e.course.description : ''}"
                                        th:text="${e.course.code + ' — ' + e.course.name}"
                                        th:selected="${selectedCourseId != null and selectedCourseId == e.course.id}">Course</option>
                            </optgroup>
                            <!-- TEACHER: their courses -->
                            <optgroup label="My Courses" sec:authorize="hasRole('ROLE_TEACHER')"
                                      th:if="${!teacherCourses.isEmpty()}">
                                <option th:each="c : ${teacherCourses}"
                                        th:value="${c.id}"
                                        th:data-name="${c.name}"
                                        th:data-code="${c.code}"
                                        th:data-desc="${c.description != null ? c.description : ''}"
                                        th:text="${c.code + ' — ' + c.name}"
                                        th:selected="${selectedCourseId != null and selectedCourseId == c.id}">Course</option>
                            </optgroup>
                        </select>
                    </div>
                    <span class="course-badge" id="courseBadge">📚 General</span>
                </div>
            </div>

            <div class="chat-wrap">
                <div class="chat-box" id="chatBox">
                    <div class="empty-hint" id="emptyHint">
                        <div class="icon">🎓</div>
                        <p>Select a course above and ask your first question.<br>I'll help you understand any topic, solve problems, or prepare for exams.</p>
                    </div>
                </div>
                <div class="typing" id="typingIndicator">
                    <span></span><span></span><span></span>
                </div>
                <div class="input-row">
        <textarea class="chat-input" id="chatInput" placeholder="Ask a question about your course…" rows="1"
                  onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                    <button class="clear-btn" onclick="clearChat()" title="Clear chat">↺</button>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send ↑</button>
                </div>
            </div>
        </div>

        <script>
            let conversationHistory = [];
            let selectedCourse = { name: 'General Studies', description: '' };

            function selectCourse(sel) {
                const opt = sel.options[sel.selectedIndex];
                selectedCourse = {
                    name: opt.dataset.name || 'General Studies',
                    description: opt.dataset.desc || ''
                };
                const code = opt.dataset.code ? opt.dataset.code + ' — ' : '';
                document.getElementById('courseBadge').textContent = '📘 ' + (opt.dataset.code ? code + selectedCourse.name : 'General');
                clearChat();
            }

            function clearChat() {
                conversationHistory = [];
                const box = document.getElementById('chatBox');
                box.innerHTML = '<div class="empty-hint" id="emptyHint"><div class="icon">🎓</div><p>Select a course above and ask your first question.<br>I\'ll help you understand any topic, solve problems, or prepare for exams.</p></div>';
            }

            function appendMsg(role, text) {
                const box = document.getElementById('chatBox');
                const hint = document.getElementById('emptyHint');
                if (hint) hint.remove();

                const div = document.createElement('div');
                div.className = 'msg ' + role;

                const av = document.createElement('div');
                av.className = 'msg-avatar ' + role;
                av.textContent = role === 'ai' ? '🤖' : 'ME';

                const bub = document.createElement('div');
                bub.className = 'msg-bubble';
                // Simple markdown: **bold**, `code`, ```blocks```
                bub.innerHTML = text
                    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');

                div.appendChild(av);
                div.appendChild(bub);
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            }

            async function sendMessage() {
                const input = document.getElementById('chatInput');
                const btn   = document.getElementById('sendBtn');
                const text  = input.value.trim();
                if (!text) return;

                input.value = '';
                input.style.height = 'auto';
                appendMsg('user', text);
                conversationHistory.push({ role: 'user', content: text });

                btn.disabled = true;
                document.getElementById('typingIndicator').style.display = 'flex';

                try {
                    const res = await fetch('/ai/study/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            courseName: selectedCourse.name,
                            courseDescription: selectedCourse.description,
                            messages: conversationHistory
                        })
                    });
                    const data = await res.json();
                    document.getElementById('typingIndicator').style.display = 'none';

                    if (data.error) {
                        appendMsg('ai', '⚠️ ' + data.error);
                    } else {
                        appendMsg('ai', data.reply);
                        conversationHistory.push({ role: 'assistant', content: data.reply });
                    }
                } catch (e) {
                    document.getElementById('typingIndicator').style.display = 'none';
                    appendMsg('ai', '⚠️ Connection error. Please try again.');
                }
                btn.disabled = false;
                input.focus();
            }

            // Auto-resize textarea
            document.getElementById('chatInput').addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            // Auto-select course if passed via URL
            window.addEventListener('DOMContentLoaded', () => {
                const sel = document.getElementById('courseSelect');
                if (sel.value) selectCourse(sel);
            });
        </script>
    </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
