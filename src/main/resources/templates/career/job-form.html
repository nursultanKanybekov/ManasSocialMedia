<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{career.post_job_title})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">

    <div class="page-header">
        <h2 th:text="#{career.post_job_title}">Post a New Job</h2>
        <a th:href="@{/career/jobs}" class="btn btn-outline"><span th:text="#{career.jobs.title}">← Back to Jobs</span></a>
    </div>

    <div class="form-card">
        <form th:action="@{/career/jobs/new}" th:object="${createJobRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div th:if="${#fields.hasErrors('*')}" class="alert alert-error">
                <span th:text="#{form.errors}">Please fix the errors below.</span>
            </div>

            <h4 th:text="#{career.jobs.title}">Job Title</h4>
            <div class="form-group">
                <label>Title (English)</label>
                <input type="text" name="titleI18n[en]" class="form-control" required placeholder="e.g. Java Developer"/>
            </div>
            <div class="form-group">
                <label>Title (Russian)</label>
                <input type="text" name="titleI18n[ru]" class="form-control" placeholder="e.g. Java Разработчик"/>
            </div>
            <div class="form-group">
                <label>Title (Kyrgyz)</label>
                <input type="text" name="titleI18n[ky]" class="form-control" placeholder="e.g. Java Иштеп чыгуучу"/>
            </div>

            <h4>Job Description</h4>
            <div class="form-group">
                <label>Description (English)</label>
                <textarea name="descriptionI18n[en]" class="form-control" rows="4" required placeholder="Describe the role, requirements..."></textarea>
            </div>
            <div class="form-group">
                <label>Description (Russian)</label>
                <textarea name="descriptionI18n[ru]" class="form-control" rows="4" placeholder="Опишите роль и требования..."></textarea>
            </div>
            <div class="form-group">
                <label>Description (Kyrgyz)</label>
                <textarea name="descriptionI18n[ky]" class="form-control" rows="4" placeholder="Ролду жана талаптарды сүрөттөңүз..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Job Type</label>
                    <select name="jobType" class="form-control" required>
                        <option value="">-- Select type --</option>
                        <option th:each="t : ${jobTypes}" th:value="${t.name()}" th:text="${t.name()}">TYPE</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" class="form-control" th:placeholder="#{career.job.location_ph}"/>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Salary Range</label>
                    <input type="text" name="salaryRange" class="form-control" th:placeholder="#{career.job.salary_ph}"/>
                </div>
                <div class="form-group">
                    <label>Application Deadline</label>
                    <input type="date" name="deadline" class="form-control"/>
                </div>
            </div>

            <!-- Target Faculty -->
            <div class="form-group">
                <label>Target Faculty <span style="font-size:12px;color:#8a91a8;font-weight:400;">(optional — select to notify that faculty's administration)</span></label>
                <select name="targetFacultyId" class="form-control">
                    <option value="">— All faculties / General posting —</option>
                    <option th:each="f : ${faculties}"
                            th:value="${f.id}"
                            th:text="${f.name}">Faculty</option>
                </select>
                <small style="color:#94a3b8;font-size:11px;margin-top:4px;display:block;">
                    📢 When a faculty is selected, its Faculty Administration will receive a notification.
                    The job will still be visible to everyone in CareerHub.
                </small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" th:text="#{career.job.submit}">Post Job</button>
                <a th:href="@{/career/jobs}" class="btn btn-outline" th:text="#{common.cancel}">Cancel</a>
            </div>
        </form>
    </div>

</main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
