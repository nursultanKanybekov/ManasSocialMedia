<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="applyBtn">
    <div th:if="${applied}" class="alert alert-success"><span th:text="#{career.already_applied}">&#10003; You have already applied for this job.</span></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>
    <form th:if="${!applied and jobId != null}" th:action="@{/career/jobs/{id}/apply(id=${jobId})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <textarea name="coverLetter" class="form-control" rows="3"
                      th:placeholder="#{career.cover_letter_ph}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" th:text="#{career.apply_now}">Apply Now</button>
    </form>
</div>
</body>
</html>
