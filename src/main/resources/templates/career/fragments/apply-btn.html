<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="applyBtn">
    <div th:if="${applied}" class="alert alert-success">&#10003; You have already applied for this job.</div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>
    <form th:if="${!applied and jobId != null}" th:action="@{/career/jobs/{id}/apply(id=${jobId})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <textarea name="coverLetter" class="form-control" rows="3"
                      placeholder="Write a short cover letter (optional)..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Apply Now</button>
    </form>
</div>
</body>
</html>
