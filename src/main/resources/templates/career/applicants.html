<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Applicants')}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<main class="main-content">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <a th:href="@{/career/jobs/{id}(id=${job.id})}"
         style="color:#8a91a8;font-size:13px;text-decoration:none;font-family:Montserrat,sans-serif;">
        &#8592; Back to Job
      </a>
      <h2 style="font-family:Montserrat,sans-serif;font-weight:800;font-size:20px;color:#1b2a6b;margin:6px 0 2px;"
          th:text="${job.getLocalizedTitle(lang)}">Job Title</h2>
      <span style="font-size:13px;color:#8a91a8;font-family:Montserrat,sans-serif;">
        &#128100; <span th:text="${#lists.size(applications)}">0</span> applicant(s)
      </span>
    </div>
    <!-- Status filter pills -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button onclick="filterCards('ALL')"    class="filter-pill active" id="pill-ALL">All</button>
      <button onclick="filterCards('APPLIED')"    class="filter-pill" id="pill-APPLIED">Applied</button>
      <button onclick="filterCards('REVIEWING')"  class="filter-pill" id="pill-REVIEWING">Reviewing</button>
      <button onclick="filterCards('ACCEPTED')"   class="filter-pill" id="pill-ACCEPTED">Accepted</button>
      <button onclick="filterCards('REJECTED')"   class="filter-pill" id="pill-REJECTED">Rejected</button>
    </div>
  </div>

  <!-- Empty state -->
  <div th:if="${#lists.isEmpty(applications)}"
       style="text-align:center;padding:80px 24px;background:#fff;border-radius:16px;border:1.5px solid #e2e5f0;">
    <div style="font-size:48px;margin-bottom:12px;">&#128084;</div>
    <h3 style="font-family:Montserrat,sans-serif;color:#1b2a6b;margin-bottom:8px;">No applications yet</h3>
    <p style="color:#8a91a8;font-size:14px;">Share your job posting to attract candidates.</p>
  </div>

  <!-- Applicant cards -->
  <div id="applicants-grid" style="display:flex;flex-direction:column;gap:14px;">
    <div th:each="app : ${applications}"
         th:attr="data-status=${app.status}"
         class="applicant-card"
         style="background:#fff;border:1.5px solid #e2e5f0;border-radius:14px;padding:20px 24px;display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap;">

      <!-- Avatar -->
      <a th:href="@{/profile/{id}(id=${app.applicant.id})}" style="flex-shrink:0;text-decoration:none;">
        <img th:if="${app.applicant.profile != null and app.applicant.profile.avatarUrl != null}"
             th:src="${app.applicant.profile.avatarUrl}"
             style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #e2e5f0;" alt="avatar"/>
        <div th:if="${app.applicant.profile == null or app.applicant.profile.avatarUrl == null}"
             style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);
                    color:#fff;display:flex;align-items:center;justify-content:center;
                    font-family:Montserrat,sans-serif;font-weight:700;font-size:20px;"
             th:text="${#strings.substring(app.applicant.fullName,0,1)}">A</div>
      </a>

      <!-- Info -->
      <div style="flex:1;min-width:220px;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
          <a th:href="@{/profile/{id}(id=${app.applicant.id})}"
             style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;color:#1b2a6b;text-decoration:none;"
             th:text="${app.applicant.fullName}">Name</a>
          <!-- Role badge -->
          <span style="background:#eef1fb;color:#1b2a6b;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:Montserrat,sans-serif;"
                th:text="${app.applicant.role}">STUDENT</span>
          <!-- Status badge -->
          <span th:text="${app.status}"
                th:classappend="${app.status.name() == 'ACCEPTED'} ? ' status-accepted' :
                                 (${app.status.name() == 'REJECTED'} ? ' status-rejected' :
                                 (${app.status.name() == 'REVIEWING'} ? ' status-reviewing' : ' status-applied'))"
                class="status-badge">APPLIED</span>
        </div>

        <!-- Headline / job title -->
        <div th:if="${app.applicant.profile != null and app.applicant.profile.headline != null}"
             style="font-size:13px;color:#64748b;margin-bottom:4px;"
             th:text="${app.applicant.profile.headline}">Headline</div>

        <!-- Current position -->
        <div th:if="${app.applicant.profile != null
                      and app.applicant.profile.currentJobTitle != null
                      and app.applicant.profile.currentCompany != null}"
             style="font-size:12px;color:#8a91a8;">
          &#128188;
          <span th:text="${app.applicant.profile.currentJobTitle}">Title</span> at
          <span th:text="${app.applicant.profile.currentCompany}">Company</span>
        </div>

        <!-- Faculty + year -->
        <div style="font-size:12px;color:#8a91a8;margin-top:3px;">
          <span th:if="${app.applicant.faculty != null}">&#127979; <span th:text="${app.applicant.faculty.name}">Faculty</span></span>
          <span th:if="${app.applicant.graduationYear != null}"> &bull; Class of <span th:text="${app.applicant.graduationYear}">Year</span></span>
          <span> &bull; Applied <span th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">Date</span></span>
        </div>

        <!-- Cover letter -->
        <div th:if="${app.coverLetter != null and !app.coverLetter.isEmpty()}"
             style="margin-top:10px;background:#f7f8fc;border-left:3px solid #1b2a6b;padding:10px 14px;border-radius:0 8px 8px 0;font-size:12px;color:#334155;line-height:1.5;max-width:600px;"
             th:text="${app.coverLetter}">Cover letter</div>
      </div>

      <!-- Actions -->
      <div style="display:flex;flex-direction:column;gap:8px;min-width:160px;align-items:flex-end;">

        <!-- Download CV with standard picker -->
        <div style="position:relative;">
          <button onclick="toggleCvMenu(this)"
                  style="background:#1b2a6b;color:#fff;border:none;padding:8px 14px;border-radius:8px;
                         font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;cursor:pointer;
                         display:flex;align-items:center;gap:6px;">
            &#11015; Download CV &#9660;
          </button>
          <div class="cv-dropdown" style="display:none;position:absolute;right:0;top:36px;background:#fff;
               border:1.5px solid #e2e5f0;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);
               z-index:100;min-width:170px;overflow:hidden;">
            <a th:href="@{/profile/resume/{id}(id=${app.applicant.id}, standard='US', lang='en')}"
               style="display:block;padding:10px 16px;font-size:12px;font-family:Montserrat,sans-serif;color:#1b2a6b;text-decoration:none;font-weight:600;"
               onmouseover="this.style.background='#f0f2f8'" onmouseout="this.style.background='#fff'">
              &#127482;&#127480; US Standard
            </a>
            <a th:href="@{/profile/resume/{id}(id=${app.applicant.id}, standard='EU', lang='en')}"
               style="display:block;padding:10px 16px;font-size:12px;font-family:Montserrat,sans-serif;color:#1b2a6b;text-decoration:none;font-weight:600;border-top:1px solid #f0f2f8;"
               onmouseover="this.style.background='#f0f2f8'" onmouseout="this.style.background='#fff'">
              &#127466;&#127482; European
            </a>
            <a th:href="@{/profile/resume/{id}(id=${app.applicant.id}, standard='ASIA', lang='en')}"
               style="display:block;padding:10px 16px;font-size:12px;font-family:Montserrat,sans-serif;color:#1b2a6b;text-decoration:none;font-weight:600;border-top:1px solid #f0f2f8;"
               onmouseover="this.style.background='#f0f2f8'" onmouseout="this.style.background='#fff'">
              &#127760; Asian
            </a>
          </div>
        </div>

        <!-- View profile -->
        <a th:href="@{/profile/{id}(id=${app.applicant.id})}"
           style="background:#f0f2f8;color:#1b2a6b;border:none;padding:8px 14px;border-radius:8px;
                  font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;text-decoration:none;text-align:center;">
          &#128100; View Profile
        </a>

        <!-- Status update -->
        <form th:action="@{/career/applications/{id}/status(id=${app.id})}" method="post" style="width:100%;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <select name="status" onchange="this.form.submit()"
                  style="width:100%;padding:7px 10px;border:1.5px solid #e2e5f0;border-radius:8px;
                         font-family:Montserrat,sans-serif;font-size:12px;color:#1b2a6b;cursor:pointer;background:#fff;">
            <option value="APPLIED"   th:selected="${app.status.name() == 'APPLIED'}">&#128203; Applied</option>
            <option value="REVIEWING" th:selected="${app.status.name() == 'REVIEWING'}">&#128269; Reviewing</option>
            <option value="ACCEPTED"  th:selected="${app.status.name() == 'ACCEPTED'}">&#9989; Accepted</option>
            <option value="REJECTED"  th:selected="${app.status.name() == 'REJECTED'}">&#10060; Rejected</option>
          </select>
        </form>

      </div>
    </div>
  </div>

</main>
<div th:replace="~{fragments/footer :: footer}"></div>

<style>
  .filter-pill {
    background:#f0f2f8;color:#1b2a6b;border:none;padding:6px 14px;border-radius:20px;
    font-family:Montserrat,sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;
  }
  .filter-pill:hover { background:#dde2f4; }
  .filter-pill.active { background:#1b2a6b;color:#fff; }
  .status-badge {
    font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;
    padding:3px 9px;border-radius:20px;
  }
  .status-applied   { background:#fef9c3;color:#92400e; }
  .status-reviewing { background:#dbeafe;color:#1e40af; }
  .status-accepted  { background:#dcfce7;color:#166534; }
  .status-rejected  { background:#fee2e2;color:#991b1b; }
</style>

<script>
  function filterCards(status) {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    document.getElementById('pill-' + status)?.classList.add('active');
    document.querySelectorAll('.applicant-card').forEach(card => {
      card.style.display = (status === 'ALL' || card.dataset.status === status) ? 'flex' : 'none';
    });
  }

  function toggleCvMenu(btn) {
    const dropdown = btn.nextElementSibling;
    const isOpen = dropdown.style.display === 'block';
    // Close all other dropdowns
    document.querySelectorAll('.cv-dropdown').forEach(d => d.style.display = 'none');
    dropdown.style.display = isOpen ? 'none' : 'block';
  }

  // Close dropdowns when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('[onclick="toggleCvMenu(this)"]')) {
      document.querySelectorAll('.cv-dropdown').forEach(d => d.style.display = 'none');
    }
  });
</script>
</body>
</html>
