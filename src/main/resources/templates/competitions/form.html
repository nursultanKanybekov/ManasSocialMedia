<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{competition.create})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div style="max-width:700px;margin:0 auto;">
            <h1 style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;color:#1b2a6b;margin-bottom:24px;" th:text="#{competition.create}">Create Competition</h1>
            <div style="background:white;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(27,42,107,0.1);">
                <form th:action="@{/competitions/new}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{competition.field.title}">TITLE *</label>
                        <input type="text" name="title" required style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;" th:placeholder="#{competition.field.title_ph}"/>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{competition.field.description}">DESCRIPTION</label>
                        <textarea name="description" rows="4" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;" th:placeholder="#{competition.field.description_ph}"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;">
                        <div>
                            <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{competition.field.prize}">PRIZE</label>
                            <input type="text" name="prize" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;" th:placeholder="#{competition.field.prize_ph}"/>
                        </div>
                        <div>
                            <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{competition.field.organizer}">ORGANIZER</label>
                            <input type="text" name="organizer" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                        </div>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{mezun.filter.faculty}">FACULTY</label>
                        <select name="facultyId" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;">
                            <option value="" th:text="#{mezun.filter.all_faculties}">All Faculties</option>
                            <option th:each="f : ${faculties}" th:value="${f.id}" th:text="${f.name}">Faculty</option>
                        </select>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
                        <div>
                            <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{competition.start_date}">START DATE</label>
                            <input type="date" name="startDate" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                        </div>
                        <div>
                            <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{competition.end_date}">END DATE</label>
                            <input type="date" name="endDate" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                        </div>
                    </div>
                    <div style="display:flex;gap:12px;">
                        <button type="submit" style="flex:1;padding:12px;background:#c0392b;color:white;border:none;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;cursor:pointer;" th:text="#{competition.create}">Create</button>
                        <a th:href="@{/competitions}" style="padding:12px 20px;background:#f0f2f8;color:#1b2a6b;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;text-decoration:none;" th:text="#{form.cancel}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
