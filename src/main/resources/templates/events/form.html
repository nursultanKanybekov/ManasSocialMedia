<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{event.create})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- layout-body removed: sidebar is now fixed positioned -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div style="max-width:700px;margin:0 auto;">
            <h1 style="font-family:Montserrat,sans-serif;font-weight:900;font-size:22px;color:#1b2a6b;margin-bottom:24px;" th:text="#{event.create}">Create Event</h1>
            <div style="background:white;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(27,42,107,0.1);">
                <form th:action="@{/events/new}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;">TITLE *</label>
                        <input type="text" name="title" required style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;" th:text="#{event.type}">TYPE</label>
                        <select name="eventType" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;">
                            <option value="OFFLINE" th:text="#{event.type.offline}">Offline</option>
                            <option value="ONLINE" th:text="#{event.type.online}">Online</option>
                            <option value="HYBRID" th:text="#{event.type.hybrid}">Hybrid</option>
                        </select>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;">DESCRIPTION</label>
                        <textarea name="description" rows="4" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;">
                        <div>
                            <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;">EVENT DATE</label>
                            <input type="datetime-local" name="eventDate" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                        </div>
                        <div>
                            <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;">MAX PARTICIPANTS</label>
                            <input type="number" name="maxParticipants" min="1" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                        </div>
                    </div>
                    <div style="margin-bottom:18px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;">LOCATION</label>
                        <input type="text" name="location" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;"/>
                    </div>
                    <div style="margin-bottom:24px;">
                        <label style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#8a91a8;display:block;margin-bottom:6px;">MEETING LINK</label>
                        <input type="url" name="meetingLink" style="width:100%;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:8px;font-size:14px;" placeholder="https://zoom.us/j/..."/>
                    </div>
                    <div style="display:flex;gap:12px;">
                        <button type="submit" style="flex:1;padding:12px;background:#c0392b;color:white;border:none;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;cursor:pointer;" th:text="#{event.create}">Create</button>
                        <a th:href="@{/events}" style="padding:12px 20px;background:#f0f2f8;color:#1b2a6b;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;text-decoration:none;" th:text="#{form.cancel}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
