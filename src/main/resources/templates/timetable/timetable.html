<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head('Расписание')}"></head>

<body>
<div class="app-shell" id="app-shell">
  <nav th:replace="~{fragments/navbar :: navbar}"></nav>
  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
  <main class="main-content" style="padding:0;display:flex;flex-direction:column;">

    <style>
      .tt-iframe-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .tt-iframe-wrap iframe {
        flex: 1;
        width: 100%;
        border: none;
        min-height: calc(100vh - 60px);
      }
    </style>

    <div class="tt-iframe-wrap">
      <iframe
              src="https://manas-timetable.vercel.app"
              title="Манас | Расписание"
              allow="fullscreen"
              loading="lazy">
      </iframe>
    </div>

  </main>
</div>
</body>
</html>
