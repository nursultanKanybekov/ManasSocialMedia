<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Check In')}"></head>
<body>
<div class="app-shell" id="app-shell">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main-content">
        <style>
            .ci-page{background:#F2F0EB;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 18px}
            .ci-card{background:#fff;border:1.5px solid #e8e4dc;border-radius:20px;padding:40px 32px;text-align:center;max-width:420px;width:100%}
            .ci-icon{font-size:3.5rem;margin-bottom:16px;display:block}
            .ci-card h2{font-size:1.35rem;font-weight:700;margin:0 0 10px}
            .ci-card p{font-size:.9rem;color:#555;line-height:1.6;margin:0 0 20px}
            .course-pill{background:#eef2ff;color:#002366;border-radius:8px;padding:8px 16px;font-size:.875rem;font-weight:600;display:inline-block;margin-bottom:20px}
            .btn{border:none;border-radius:10px;padding:11px 24px;font-size:.9rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
            .btn-navy{background:#002366;color:#fff}.btn-navy:hover{opacity:.88}
            .btn-outline{background:#fff;border:1.5px solid #e8e4dc;color:#444;margin-top:10px}
            .btn-outline:hover{border-color:#002366;color:#002366}
        </style>

        <div class="ci-page">
            <div class="ci-card">
                <!-- Success -->
                <div th:if="${success}">
                    <span class="ci-icon">✅</span>
                    <div class="course-pill" th:if="${course}" th:text="${course}">Course Name</div>
                    <h2>Attendance Marked!</h2>
                    <p>You have been successfully checked in for today's session.</p>
                    <a href="/academic/attendance/my" class="btn btn-navy">View My Attendance</a>
                    <br>
                    <a href="/main" class="btn btn-outline" style="border-radius:10px;padding:11px 24px;font-size:.9rem;font-weight:700;text-decoration:none;display:inline-block;margin-top:10px;color:#444;border:1.5px solid #e8e4dc">Go Home</a>
                </div>

                <!-- Info (not a student, or other message) -->
                <div th:if="${info != null and success == null}">
                    <span class="ci-icon">ℹ️</span>
                    <h2>Check-In Info</h2>
                    <p th:text="${info}">Message</p>
                    <div th:if="${session != null}">
                        <div class="course-pill" th:text="${session.course.name}">Course</div>
                    </div>
                    <a href="/main" class="btn btn-navy">Go Home</a>
                </div>

                <!-- Error -->
                <div th:if="${error != null}">
                    <span class="ci-icon">❌</span>
                    <h2>Check-In Failed</h2>
                    <p th:text="${error}">Error message</p>
                    <a href="/main" class="btn btn-navy">Go Home</a>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
