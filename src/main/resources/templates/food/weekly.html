<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/header :: head(#{food.weekly.page.title})}"></head>

<body>
<div class="app-shell" id="app-shell">
  <nav th:replace="~{fragments/navbar :: navbar}"></nav>
  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
  <main class="main-content">

    <style>
      :root {
        --navy:   #002366;
        --crimson:#8B0000;
        --gold:   #D4A017;
        --ivory:  #FAF9F6;
        --border: #E8E4DC;
        --muted:  #8A867E;
      }

      .food-page { background: #F2F0EB; min-height: 100vh; padding: 0 0 48px; }

      /* ── Hero ── */
      .food-hero {
        background: linear-gradient(135deg, #6B0000 0%, var(--crimson) 60%, #A00000 100%);
        padding: 28px 32px; position: relative; overflow: hidden;
      }
      .food-hero::after {
        content: ''; position: absolute; inset: 0;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='170' cy='30' r='90' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E") no-repeat right top;
        pointer-events: none;
      }
      .food-hero-badge {
        display: inline-flex; align-items: center; gap: 7px;
        background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
        color: #fff; font-size: 11px; font-weight: 700;
        letter-spacing: .08em; text-transform: uppercase;
        padding: 4px 14px; border-radius: 20px; margin-bottom: 12px;
      }
      .food-hero-back {
        display: inline-flex; align-items: center; gap: 6px;
        color: rgba(255,255,255,.8); font-size: 12.5px; font-weight: 600;
        text-decoration: none; margin-bottom: 10px;
        transition: color .15s;
      }
      .food-hero-back:hover { color: #fff; }
      .food-hero-title { color: #fff; font-size: 24px; font-weight: 700; margin: 0 0 4px; }
      .food-hero-sub   { color: rgba(255,255,255,.7); font-size: 13px; margin: 0; }

      /* ── Body ── */
      .food-body { padding: 28px 28px 0; }

      /* ── Day accordion card ── */
      .week-day-card {
        background: #fff; border: 1px solid var(--border);
        border-radius: 16px; margin-bottom: 20px;
        overflow: hidden;
      }
      .week-day-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 22px; cursor: pointer;
        transition: background .15s;
        user-select: none;
      }
      .week-day-header:hover { background: var(--ivory); }
      .week-day-header.open   { border-bottom: 1px solid var(--border); }
      .week-day-left  { display: flex; align-items: center; gap: 14px; }
      .week-day-num {
        width: 44px; height: 44px; border-radius: 12px;
        background: rgba(0,35,102,.07); color: var(--navy);
        display: flex; align-items: center; justify-content: center;
        font-size: 15px; font-weight: 800; flex-shrink: 0;
      }
      .week-day-name  { font-size: 15px; font-weight: 700; color: #1C1C2E; }
      .week-day-date  { font-size: 12px; color: var(--muted); margin-top: 1px; }
      .week-day-cal   {
        display: inline-flex; align-items: center; gap: 5px;
        background: rgba(139,0,0,.07); color: var(--crimson);
        font-size: 11.5px; font-weight: 700;
        padding: 4px 12px; border-radius: 20px; margin-right: 12px;
      }
      .week-day-toggle {
        width: 28px; height: 28px; border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        background: var(--ivory); border: 1px solid var(--border);
        transition: transform .2s;
      }
      .week-day-toggle.open { transform: rotate(180deg); }

      /* ── Dish grid inside day ── */
      .week-dish-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        padding: 20px 22px;
      }
      .week-dish-card {
        display: flex; flex-direction: column;
        border: 1px solid var(--border); border-radius: 12px;
        overflow: hidden; background: var(--ivory);
        transition: box-shadow .15s, transform .15s;
      }
      .week-dish-card:hover {
        box-shadow: 0 8px 24px rgba(0,0,0,.09);
        transform: translateY(-2px);
      }
      .week-dish-img {
        width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block;
      }
      .week-dish-placeholder {
        width: 100%; aspect-ratio: 16/10;
        background: linear-gradient(135deg, #eeece9, #e4e0d8);
        display: flex; align-items: center; justify-content: center;
        color: var(--muted);
      }
      .week-dish-body { padding: 10px 12px 12px; flex: 1; }
      .week-dish-name {
        font-size: 12.5px; font-weight: 700; color: #1C1C2E;
        margin: 0 0 6px; line-height: 1.35;
        display: -webkit-box; -webkit-line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden;
      }
      .week-dish-cal {
        font-size: 11px; color: var(--crimson); font-weight: 600;
      }

      /* ── Empty ── */
      .food-empty {
        text-align: center; padding: 64px 20px; color: var(--muted);
      }
      .food-empty svg { opacity: .3; margin-bottom: 12px; }

      /* ── Responsive ── */
      @media (max-width: 1100px) { .week-dish-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 767px)  {
        .food-body      { padding: 16px 16px 0; }
        .food-hero      { padding: 20px; }
        .week-dish-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 14px 16px; }
        .week-day-header { padding: 14px 16px; }
      }
      @media (max-width: 480px)  { .week-dish-grid { grid-template-columns: 1fr; } }
    </style>

    <div class="food-page">

      <!-- ── Hero ── -->
      <div class="food-hero">
        <a th:href="@{/food}" class="food-hero-back">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <polyline points="15,18 9,12 15,6"/>
          </svg>
          <span th:text="#{food.back}">Back to Today</span>
        </a>
        <div class="food-hero-badge">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span th:text="#{food.weekly.badge}">Weekly Schedule</span>
        </div>
        <h1 class="food-hero-title" th:text="#{food.weekly.title}">Weekly Menu</h1>
        <p class="food-hero-sub" th:text="#{food.source}">info.manas.edu.kg · Manas University Cafeteria</p>
      </div>

      <div class="food-body">

        <!-- Empty state -->
        <div class="food-empty" th:if="${weeklyMenus == null or weeklyMenus.isEmpty()}">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <p th:text="#{food.empty}">Menu not available yet.</p>
        </div>

        <!-- Day accordion cards -->
        <div th:each="day, iter : ${weeklyMenus}" class="week-day-card">
          <div class="week-day-header"
               th:id="'day-header-' + ${iter.index}"
               onclick="toggleDay(this)"
               th:classappend="${iter.index == 0} ? ' open' : ''">
            <div class="week-day-left">
              <div class="week-day-num" th:text="${iter.index + 1}">1</div>
              <div>
                <div class="week-day-name" th:text="${day.dayName}">Çarşamba</div>
                <div class="week-day-date" th:text="${day.date}">25.03.2026</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;">
              <span class="week-day-cal" th:if="${day.totalCalories() > 0}">
                <svg width="10" height="10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/><path d="M12 8v4l3 3"/>
                </svg>
                <span th:text="${day.totalCalories()} + ' kcal'">833 kcal</span>
              </span>
              <div class="week-day-toggle" th:classappend="${iter.index == 0} ? ' open' : ''">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <polyline points="6,9 12,15 18,9"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Dish grid — first day open by default -->
          <div th:id="'day-body-' + ${iter.index}"
               th:style="${iter.index == 0} ? '' : 'display:none'">
            <div class="week-dish-grid">
              <div class="week-dish-card" th:each="item : ${day.items}">
                <a th:href="${item.searchUrl}" target="_blank" rel="noopener noreferrer"
                   style="text-decoration:none;color:inherit;display:block;">
                  <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                       th:src="${item.imageUrl}"
                       th:alt="${item.name}"
                       class="week-dish-img"
                       loading="lazy"
                       onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
                  <div class="week-dish-placeholder"
                       th:if="${item.imageUrl == null or item.imageUrl.isEmpty()}">
                    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                      <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/>
                    </svg>
                  </div>
                  <!-- hidden fallback -->
                  <div class="week-dish-placeholder" style="display:none;">
                    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                      <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/>
                    </svg>
                  </div>
                </a>
                <div class="week-dish-body">
                  <p class="week-dish-name" th:text="${item.name}">Dish Name</p>
                  <span class="week-dish-cal"
                        th:if="${item.calories > 0}"
                        th:text="${item.calories} + ' kcal'">217 kcal</span>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /food-body -->
    </div><!-- /food-page -->

    <script>
      function toggleDay(header) {
        const idx   = header.id.replace('day-header-', '');
        const body  = document.getElementById('day-body-' + idx);
        const toggle = header.querySelector('.week-day-toggle');
        const isOpen = body.style.display !== 'none';
        body.style.display   = isOpen ? 'none' : '';
        header.classList.toggle('open',   !isOpen);
        toggle.classList.toggle('open',   !isOpen);
      }
    </script>

  </main>
</div>
</body>
</html>
