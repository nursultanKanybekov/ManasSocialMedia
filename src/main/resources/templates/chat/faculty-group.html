<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${room.name})}"></head>
<body class="app-layout">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<main class="main-content" style="padding:0; display:flex; height:calc(100vh - var(--navbar-h)); overflow:hidden;">
    <div style="display:flex;width:100%;height:100%;">

        <!-- Chat Main Area -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8f9ff;position:relative;">

            <!-- Chat Header -->
            <div style="padding:14px 20px;background:#fff;border-bottom:1.5px solid #e8eaf6;display:flex;align-items:center;gap:12px;min-height:60px;position:relative;">
                <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);color:white;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🏫</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;color:#1b2a6b;" th:text="${room.name}">Faculty Group</div>
                    <div style="font-size:11px;color:#8a91a8;">
                        <span th:text="${members.size() + ' members'}">0 members</span>
                    </div>
                </div>
                <!-- Members toggle -->
                <button onclick="toggleMembers()" title="Show members"
                        style="background:#f0f2f8;border:none;border-radius:10px;padding:7px 13px;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:600;font-size:12px;color:#1b2a6b;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:background .15s;"
                        onmouseover="this.style.background='#e8eaf6'" onmouseout="this.style.background='#f0f2f8'">
                    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    Members
                </button>
                <!-- Back to chat -->
                <a href="/chat" style="background:#f0f2f8;border:none;border-radius:10px;padding:7px 13px;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:600;font-size:12px;color:#1b2a6b;display:flex;align-items:center;gap:6px;text-decoration:none;transition:background .15s;"
                   onmouseover="this.style.background='#e8eaf6'" onmouseout="this.style.background='#f0f2f8'">
                    ← Back
                </a>
            </div>

            <!-- Members Panel (slide-in from right) -->
            <div id="members-panel"
                 style="position:absolute;top:0;right:0;width:260px;height:100%;background:#fff;border-left:1.5px solid #e8eaf6;z-index:100;display:none;flex-direction:column;overflow:hidden;box-shadow:-4px 0 20px rgba(0,0,0,0.08);">
                <div style="padding:16px 16px 12px;border-bottom:1.5px solid #e8eaf6;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);">
                    <span style="font-family:Montserrat,sans-serif;font-weight:700;font-size:14px;color:#fff;">
                        Members (<span th:text="${members.size()}">0</span>)
                    </span>
                    <button onclick="toggleMembers()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px;line-height:1;">✕</button>
                </div>
                <div style="flex:1;overflow-y:auto;padding:8px;">
                    <div th:each="m : ${members}">
                        <a th:href="@{/profile/{id}(id=${m.id})}"
                           style="display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;text-decoration:none;color:inherit;transition:background .15s;"
                           onmouseover="this.style.background='#f0f2f8'" onmouseout="this.style.background='transparent'">
                            <div style="position:relative;flex-shrink:0;">
                                <img th:if="${m.profile != null and m.profile.avatarUrl != null}"
                                     th:src="${m.profile.avatarUrl}"
                                     style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid #e8eaf6;" alt="avatar"/>
                                <div th:if="${m.profile == null or m.profile.avatarUrl == null}"
                                     style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;font-family:Montserrat,sans-serif;"
                                     th:text="${#strings.substring(m.fullName,0,1)}">A</div>
                            </div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-family:Montserrat,sans-serif;font-weight:600;font-size:13px;color:#1b2a6b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
                                     th:text="${m.fullName}">Name</div>
                                <div style="font-size:11px;color:#8a91a8;" th:text="${m.role}">STUDENT</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Message History -->
            <div id="chatMessages" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;">
                <div th:each="msg : ${messages}"
                     style="display:flex;gap:10px;max-width:75%;"
                     th:style="${msg.sender.id == currentUser.id} ? 'align-self:flex-end;flex-direction:row-reverse;' : 'align-self:flex-start;'">
                    <img th:src="${msg.sender.profile != null and msg.sender.profile.avatarUrl != null ? msg.sender.profile.avatarUrl : '/images/default-avatar.svg'}"
                         style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #e8eaf6;" alt="avatar"/>
                    <div>
                        <div style="font-size:11px;color:#8a91a8;margin-bottom:3px;font-family:Montserrat,sans-serif;font-weight:600;"
                             th:style="${msg.sender.id == currentUser.id} ? 'text-align:right;' : ''"
                             th:text="${msg.sender.fullName}">Sender</div>
                        <div style="padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;"
                             th:style="${msg.sender.id == currentUser.id} ? 'background:linear-gradient(135deg,#1b2a6b,#2d4a9e);color:white;border-bottom-right-radius:4px;' : 'background:white;color:#2c3e50;border:1.5px solid #e8eaf6;border-bottom-left-radius:4px;'"
                             th:text="${msg.content}">Content</div>
                        <div style="font-size:10px;color:#aaa;margin-top:3px;"
                             th:style="${msg.sender.id == currentUser.id} ? 'text-align:right;' : ''"
                             th:text="${#temporals.format(msg.createdAt,'HH:mm')}">12:00</div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(messages)}" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#8a91a8;padding:60px 0;">
                    <div style="font-size:48px;">🏫</div>
                    <p style="font-family:Montserrat,sans-serif;font-size:14px;">Say hi to your faculty group!</p>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" style="padding:6px 20px;font-size:12px;color:#8a91a8;font-style:italic;display:none;">
                <span id="typingText"></span>
            </div>

            <!-- Message Input -->
            <div style="padding:14px 16px;background:#fff;border-top:1.5px solid #e8eaf6;display:flex;gap:10px;align-items:flex-end;">
                <textarea id="msgInput"
                          placeholder="Type a message..."
                          style="flex:1;padding:10px 14px;border:1.5px solid #e0e3ef;border-radius:12px;font-size:14px;font-family:Open Sans,sans-serif;resize:none;min-height:42px;max-height:120px;outline:none;transition:border-color .2s;"
                          rows="1"
                          onfocus="this.style.borderColor='#1b2a6b'"
                          onblur="this.style.borderColor='#e0e3ef'"
                          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button onclick="sendMessage()"
                        style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1b2a6b,#2d4a9e);border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    const roomId    = /*[[${roomId}]]*/ null;
    const currentUserId = /*[[${currentUser.id}]]*/ null;

    const chatMessages = document.getElementById('chatMessages');
    if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;

    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({}, function() {
        stompClient.subscribe('/topic/chat.' + roomId, function(frame) {
            appendMessage(JSON.parse(frame.body));
        });
        stompClient.subscribe('/topic/typing.' + roomId, function(frame) {
            const d = JSON.parse(frame.body);
            if (d.userId !== currentUserId) showTyping(d.userName);
        });
    });

    function appendMessage(msg) {
        if (!chatMessages) return;
        const isOwn = msg.senderId == currentUserId;
        const div = document.createElement('div');
        div.style.cssText = `display:flex;gap:10px;max-width:75%;${isOwn ? 'align-self:flex-end;flex-direction:row-reverse;' : 'align-self:flex-start;'}`;
        const time = msg.createdAt ? new Date(msg.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
        div.innerHTML = `
            <img src="${msg.senderAvatarUrl || '/images/default-avatar.svg'}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #e8eaf6;" />
            <div>
                <div style="font-size:11px;color:#8a91a8;margin-bottom:3px;font-family:Montserrat,sans-serif;font-weight:600;${isOwn?'text-align:right;':''}">${msg.senderName||''}</div>
                <div style="padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;${isOwn?'background:linear-gradient(135deg,#1b2a6b,#2d4a9e);color:white;border-bottom-right-radius:4px;':'background:white;color:#2c3e50;border:1.5px solid #e8eaf6;border-bottom-left-radius:4px;'}">${msg.content||''}</div>
                <div style="font-size:10px;color:#aaa;margin-top:3px;${isOwn?'text-align:right;':''}">${time}</div>
            </div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    let typingTimer;
    function showTyping(name) {
        const ind = document.getElementById('typingIndicator');
        document.getElementById('typingText').textContent = name + ' is typing...';
        if (ind) ind.style.display = 'block';
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => { if (ind) ind.style.display = 'none'; }, 3000);
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const content = input ? input.value.trim() : '';
        if (!content || !stompClient) return;
        stompClient.send('/app/chat.send/' + roomId, {}, JSON.stringify({ content, messageType: 'TEXT' }));
        input.value = '';
        input.style.height = 'auto';
    }

    function toggleMembers() {
        var panel = document.getElementById('members-panel');
        if (!panel) return;
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    document.addEventListener('click', function(e) {
        var panel = document.getElementById('members-panel');
        if (!panel || panel.style.display !== 'flex') return;
        if (!panel.contains(e.target) && !e.target.closest('button[onclick="toggleMembers()"]')) {
            panel.style.display = 'none';
        }
    });
</script>
</body>
</html>
