spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/manas_db
    username: postgres
    password: nurs
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
    show-sql: false

  messages:
    basename: i18n/messages
    fallback-to-system-locale: false
    encoding: UTF-8
    cache-duration: 3600

  thymeleaf:
    cache: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-must-be-32-chars-min}
    expiration-ms: 86400000
  upload:
    dir: ./uploads
    avatar-path: /uploads/avatars/
    post-path: /uploads/posts/
  cloudinary:
    cloud-name: dpkxkjwmy
    api-key: 952176747147999
    api-secret: CcGE7JYPNbPxTMkxi5gSK3vri9E
  gemini:
    api-key: AIzaSyBLxoCfHZ-OICAlVy3pA30JeViAXG-4-To
  # On Render: set APP_BASE_URL env var to https://your-app-name.onrender.com
  # This enables the keep-alive self-ping that prevents cold starts.
  base-url: ${APP_BASE_URL:http://localhost:8081}

server:
  port: ${PORT:8081}
  servlet:
    context-path: /

# Expose /actuator/health for the keep-alive ping (no auth needed for health)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.web.servlet.resource: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.com.manasuniversityecosystem: DEBUG